body:
  text: 周易參同契發揮卷中宋俞琰撰中篇乾剛坤柔配合相包大哉人之有息也張横渠正蒙云人之有息盖剛柔相摩乾坤闔闢之象也何謂息一呼一吸是也夫人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸一晝夜百刻之中總一萬三千五百息氣行八百一十丈上下灌注如環之無端莫知其紀極也且人之未生也居母之腹隨母呼吸無視無聽惟有一息存焉及其生也剪去臍帶則一㸃真元之氣聚於臍下日復一日神出氣移遂不復再守胎中之一息今夫神仙修煉之法使人囘光内照呼吸太和盖將返本還源而復歸於生身受氣之初也許旌陽醉思仙歌云内交真氣存呼吸自然造化返童顔靈源大道歌云千經萬論講𤣥微命蔕由來在真息外此皆邪說妄行非真要自然之道也今魏公謂乾剛坤柔配合相包言作丹之時以乾陽下交於坤隂使呼吸相含剛柔相當配為夫婦打成一片則神氣歸根性命合一而至藥孕於其中也或名之曰龍虎交媾又曰金木交併又曰龜蛇蟠虯又曰紅黑相投又曰天地交泰又曰𤣥黄相雜又曰金土混融又曰金汞同鼎又曰金火同爐又曰赤白相交又曰日月同宫又曰烏兔同穴又曰夫婦歡合又曰牛女相逢又曰牝牡相從又曰魂魄相投又曰水土同鄉究而言之不過心息相依而隂陽内感神氣交結爾陽稟隂受雄雌相須陽稟隂受者瓊瑶花發露珠凝花漸開苞露漸深也雄雌相須者甲龍庚虎鎮相隨鉛汞同爐始可為也所謂稟受所謂相須即交媾之說也天地以隂陽交媾而生物丹法以隂陽交媾而生藥盖未有不交媾而可以成造化者也玉芝書云𤣥黄若也無交媾爭得陽從坎下飛是乃作丹之大端修仙之第一義也元陽子大道歌云𤣥天汪汪配地黄兩情和合入洞房是此義也還金篇云先賢明露丹臺㫖幾度靈烏宿桂柯是此義也還元篇云西方金母最堅剛走入壬家水裏藏是此義也悟真篇云赤龍黑虎合西東四象交加戊巳中是此義也王良器悟解篇云好將魂就魄隂盡變純陽是此義也復命篇云要知大道希夷理太陽移在月中明是此義也崇正篇云兩般靈物天然合些子神機這裏求是此義也上清集云别無他術只要神水入華池是此義也知此乃可以産藥乃可以結胎更得火候之訣煉之則天鼓鼕鼕震地來玉塵糝糝散葭灰而升入泥丸矣若僅知有此而不得火候之訣則惟可煖其下元耳非還丹也古歌云從紅入黑是真修煉黑入紅天仙已盖丹法有先天後天無為有為之不同在先天則凝神入於坤臍而産藥至後天則移神入於乾頂而成丹先天則無為後天則有為不可以一律齊也偕以造化精氣乃舒翠虚篇云每常天地交合時奪取隂陽造化機是機即天人合發之機也夫人身中造化與天地造化相應今曰偕以造化者論其至妙全在天機與人機對舉人能虚心凝神與天地之機偕作則造化在吾掌握中矣天隱子云儻三百六十日内運自己之氣適合天地之真氣三兩次則自覺身體清和異於常時况乆乆習之積累冥契則神仙之道不難至矣或曰要坐便坐何必辨川源識時日兹盖不知有造化者耳未足與議也坎離冠首光耀垂敷坎離日月也丹法有内日月有外日月黄庭經云出日入月呼吸存此言内日月也又云三光煥照入子室此言外日月也二者盖可相有而不可相無者也指𤣥三十九章云外若交時内亦交三關通透不須勞作丹之時内日月交精於其内外日月交光於其外内外攅簇乆而不散則恍恍惚惚其中有物窈窈冥冥其中有精而滿空白雪亂參差也夫日月之照於天地間螺蚌吸之則生珠頑石蓄之則變玉何况人身自有日月豈不能囘光自照結自己之真珠産自己之真玉哉上清集云乾坤運用大都不過坎和離石裏縁何懐玉因甚珠藏蚌腹借此顯天機可謂道在眼前矣道在眼前而學者猶或弗悟只縁天機太近故昧者往往當面蹉過而莫之能見也𤣥冥難測不可畫圖聖人揆度參序元基赤龍大丹訣云有物號𤣥冥金丹向此生是物也寂兮寥兮眇不可測豈可得而畫圖哉既不可得而畫圖則惟可心知意會而已然在己者固可心知意會而示人者得不假象託文而使之默會其機乎聖人於是探賾索隱以發明先天之極𤣥廣譬曲喻以參序金丹之元基此丹經子書所以𫝊行於世而參同契所以凖易而作也元基即根基也悟真篇云要得谷神長不死須慿𤣥牝立根基盖伏鉛制汞全在𤣥牝所以𤣥牝為還丹之根基男子𤣥牝立則精氣固女子𤣥牝立則月事絶修煉若不知此則藥材從何而生還丹從何而結火候從何而運用哉四者渾沌徑入虚無四者即乾坤坎離也合而為一故曰渾沌指𤣥篇云苗苗裔裔綿綿理南北東西自合來此乾坤坎離之所以合而為一也合而為一則神氣歸根徑入虚無窈窈㝠㝠莫知其所以然矣靈源大道歌云混合為一復忘一可與化功同出没是也然而丹家所謂虚無非無心無念槁木死灰之謂也文子通𤣥真經云視於冥冥聽於無聲冥冥之中獨有曉焉寂寞之中獨有照焉此盖不可言傳之妙也或者不悟乃認為禪家之寂㓕則又謬矣若使金丹即禪學則徑自參禪可也何必從事乎乾坤坎離之多端而必須洞曉隂陽深達造化然後為得哉六十卦用張布為輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家丹法以乾坤為鼎器以坎離為藥物遂用其餘六十卦自屯蒙以至既濟未濟周囘列於鼎外以為周天火候故曰六十卦用張布為輿此輿張布則六十卦皆為吾用而龍馬歸吾駕御矣上清玉真胎息訣云吾以神為車以氣為馬終日御之而不倦不倦即綿綿若存用之不勤也不勤云者亦非忘亦非守似有似無而不至於勤勞迫切也善乎廣成子之告黄帝曰我守其一以處其和故我修身千二百嵗矣吾形未嘗衰夫身猶國也心猶君也心定則神凝氣和三宫自然升降百脈自然流通勤而行之無有不仙者谷神子了然論云治身之道以至神為本以至精為藥以冲和為用以無為為治無為則神凝神凝則和氣所鍾和氣所鍾則深根固柢深根固柢則長生乆視之道成矣若不由此即非金液大還丹之法也大抵氣血之寓於人身貴乎不撓修煉之功至簡至易不過抱元守一專氣致柔如嬰兒耳是故作丹之際亦無他術但虚心静默凝神入於氣穴順其往來綿綿延延勿令間斷乆之則神自凝息自定息定而氣聚氣聚而丹成更不用按摩導引吐納存想之勞也内指通𤣥秘訣云日往即往月來即來隨之出入不離丹臺自今觀之大丹之道惟一味元和之氣以成其變化餘無别徑也君子居其室出其言善則千里之外應之謂萬乗之主處九重之室發號施令順隂陽節人君居萬乗之尊處九重之邃出其言善則千里之外應之修煉之士含光默默返照於内虚極静篤則天地之氣自來歸之何者此有感則彼有應自然之理也發號施令順隂陽節者古之聖王孟春則命相布徳和令孟秋則命將𨕖士厲兵蓋亦依時應節而順夫天地之隂陽也治道如此丹道當何如哉藏器待時勿違卦日還金篇云莫教違漏刻長在一陽中蓋煉丹之法先當知時尤當待時時茍未至則惟含光默默虚以待之而已不可為之先也許旌陽三藥歌云存心絶念候晶凝指𤣥三十九章云塞兌垂簾默默窺即藏器待時之謂也嗚呼時辰若至不勞心内自相交自結凝入室按時須等着一輪黄道自騰昇豈可為之先也哉屯以子申蒙用寅戌六十卦用各自有日聊陳兩象未能究悉屯下震而上坎屯以子申者震之初九庚子爻坎之六四戊申爻也蒙下坎而上艮蒙用寅戌者坎之初六戊寅爻艮之六四丙戌爻也蓋子申寅戌即子午夘酉也即春夏秋冬也即金木水火也即龜蛇龍虎也皆寓言也今以六十卦觀之始於屯䝉終於既濟未濟其間隂爻陽爻互相交錯雖則各自不同而反體對體各自有合其實卦卦一般而魏公謂聊陳兩象未能究悉者欲使學者締觀屯蒙兩卦之象由此觸𩔖而長之自可黙會其餘諸卦之義也蓋卦有六爻兩卦計十二爻應一日十二時之數六十卦計三百六十爻應一月三百六十時之數魏公本意不過借此以論吾身火候之分至啓閉而已如移之需訟則曰需以子申訟用寅午移之師比則曰師以寅丑比用未申他卦皆倣此故曰聊陳兩象未能究悉也悟真篇云南北宗源翻卦象晨昏火候合天樞亦不過發明此義若使執文泥象而必欲推筭卦體之䇿數求合卦畫之隂陽吾恐終身役役而不見其成功然疲役而不知其所歸可不哀耶在義設刑當仁施徳西方為義東方為仁刑主殺伏徳主生起今曰在義設刑者所以煅西方之鉛也當仁施徳者所以煉東方之汞也鉛屬金其性至剛藏於坎中非猛烹極煅則不能飛上故用武火逼之而不可施以文汞屬木其性至柔隱於離中一見真鉛則自然不動故用文火煉之而不可施以武崇正篇云守城須假施文徳野戰當先著武功作用兩般明辨取順宜得吉逆成凶此之謂也按厯法令至誠專密髙鴻濛夢仙謡云採有時取有日採兮取兮須謹密故必按厯法令知下手之口訣至誠專密無纎毫之雜想然後神芝可錄乃若一年處室自朝至暮内運靈旗亦當至誠專密用志不分然後丹可成身可仙若將大道為兒戲而輕易竊弄天機則朝行暮輟又非誠矣黄庭經云積功成煉非自然是由精誠亦由專古今修丹之士固未有不誠而得之者亦未有不專心致志而可以成事者也昔者奕秋誨二人奕一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣夫奕之為數小數也弗專心致志則弗得也况於道乎司馬子微坐忘論云無事安閒方可修道蓋學道當得清静無為不可以一毫外物累其心若夫内接家事以自羈外綜王事以雜役此亦道之不專也張虚静大道歌云神馭氣氣留形不須雜術自長生術則易知道難遇縱然遇了不專行所以千人萬人學畢竟終無一二成其說信矣今之學者不知仙道由積累而成但欲以片餉功夫游戲而得之殊不思片餉乃結丹功夫而周年火候温養則一日之内行坐寢食總如如惟恐火冷丹力遲奚可須臾間斷哉謹候日辰審察消息悟真篇云天地盈虚自有時審觀消息始知機又云月虧盈應精神之衰盛日出没合榮衛之寒温蓋一月有一月之盈虚消息一日有一日之盈虛消息晦朔弦望一月之盈虚消息也晝夜晨昏一日之盈虚消息也人身法天象地其氣血之盈虚消息悉與天地造化同途素問云平旦人氣生日中而陽氣隆日西而陽氣已虚氣門乃閉又云月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉减經絡虚衛氣去形獨居是故天地有晝夜晨昏人身亦有晝夜晨昏天地有晦朔弦望人身亦有晦朔弦望其間寒暑之推遷隂陽之代謝悉與天地胥似所以丹法以天為鼎以地為爐以月為藥之用而採取必按月之盈虧以日為火之候而動静必視日之出没自始至末無一不與天地合有如皇極經世書以寅為開物猶嵗之驚蟄數自此而始戌為閉物猶嵗之立冬數至此而止非丹法運火之候乎亥子丑三時則日入平地而不見有數而不行其間一陽初動處萬物未生時是聖人所以見天地之心又以範圍天地曲成萬物造化在我者也非丹法採藥之時乎凡而抽添運用沐浴交結一一取法天地造化而為之是以謂之至道若不依天地造化而别求他法則是旁門小術區區臆度之說非至道也淮南子云蛤蟹龜珠與月盛衰又云月虚而魚腦减月死而蠃蛖膲夫以至微之物尚或與天地造化相應而况於人乎於此見修丹於月望則氣血滿而藥力全望後則氣血减而藥力少所以翠虚篇謂月夜望中能採取天魂地魄結靈丹而又謂交加二八為丹母望逺徒勞覔虎龍也又如悟真篇云八月十五望蟾輝正是金精壯盛時若到一陽起復便堪進火莫延遲崇正篇云兌金萬寳正西成桂魄中秋倍様明便好煉頭施採取用功擬待一陽生金丹大成集云恰恰相當妙絶奇中秋天上月圓時陽生急採無令緩進火功夫要慮危即非以八月十五金精壯盛取譬亦非曰一年止有八月十五可以採取乃若白紫清廖蟾輝皆謂八月十五夜子時入室蓋以八月十五晝夜均隂陽分此時秋髙氣清金精正旺不寒不暖最宜修煉古仙於此時結胎所以盜天地之金精感天地之清氣也或者不得其傳弗知其的惟於八月十五夜吸採月光是乃懸以捕風握繩以繫影者也奚足語至道哉抑又有說焉晁文元公隨因紀述云唐中岳隱士栖真子施肩吾述靈響詞其序中云偶覧三静經云夫修煉之士當須入三静關陶煉神氣𥙷續年命大静三百日中静二百日小静一百日遂發至懇且試小静即以開成三年戊午嵗起自正月一日庚申閉户不交人事尅期百日方出静室未踰月而神光照目百靈集耳精爽不昩此三者皆應則知仙經秘典不虚設也今夫修煉大丹亦當如此蓋静乆則神清氣和鼎器内完方可以修煉如終日汨没於塵緣勞其筋骨役其心志而遽欲於八月十五一舉成功亦戛戛乎難矣纎芥不正悔吝為賊二至改度乖錯委曲隆冬大暑盛夏霰雪二分縱横不應漏刻風雨不節水旱相伐蝗蟲湧沸山崩地裂天見其怪羣異旁出悟真篇云縱識朱砂及黒鉛不知火候也如閒大都全藉修持力毫髮差殊不作丹所謂火者非存心想腎之火乃身中天然之真火也所謂候者非輪刻搯時之候乃身中天然之氣候也火之為性遇風則熾遇土則藏用之不可太過亦不可不及全在調其文武審其寒温微以巽風吹之熾以坤土藏之使之得中而無太過不及之患則大小無傷兩國全而片餉之間見丹頭矣調停運用正謂此也儻毫髮差殊則二至改度於南北二分縱横於東西隆冬變為大暑盛夏翻作霰雪而鉛汞飛走羣異旁出矣孝子用心感動皇極近出已口逺流殊域復命篇云一夫一婦資天地三女三男合始終蓋乾生三男坤生三女總曰六子今乾父坤母位乎上下而六子運用於其間往來上下一惟父母是從故名之曰孝子皇極者中央正位也周囘八方會歸之所也孝子能用心而感動之則虎嘯一聲龍出窟鸞飛鳳舞入金城矣如其舉動悖亂不協于極則𤣥珠迸散靈汞逃亡六子非孝子迺丹道之逆賊焉爾或以招禍或以致福或興太平或造兵革四者之來由乎胷臆悟真篇云火生於木本藏鋒不會鑚研莫强攻禍發總因斯害己要能制伏覔金公蓋有藥而行火候則金被火逼奔騰至於離宫化而為水反以尅火故火無炎上之患若無藥而行火候則虚陽上攻適所以自焚其軀此招禍致福之所由分也又云日月三旬一遇逢以時易日法神功守城野戰知㐫吉増得靈砂滿鼎紅蓋真鉛生於坎宫濁而不起欲其擒制離宫之真汞當用武火猛烹極煅然後飛騰而上及其至於離宫與真汞交結之後則宜守城沐浴更不可加以火此太平兵革之逈不同也或以招禍或以致福或興太平或造兵革其所以然者豈由他哉反求諸心而已矣動静有常奉其繩墨寂然不動反本復静坤之時也吾則静以待之静極而動陽氣濳萌於黄鍾之宫復之時也吾則動以應之故曰動静有常奉其繩墨當動而或雜之以静當静而或間之以動或助長於其先或忘失於其後則非奉其繩墨焉夫古之至人其動也天行其静也淵黙當動則動當静則静自有常法今之學者不知丹法之動静有常或專主乎動或專主乎静其所謂動者乃行氣之動其所謂静者乃禪定之静二者胥失之矣指𤣥三十九章不云乎人人氣血本通流榮衛隂陽百刻周豈在閉門學行氣正如頭上又安頭曷嘗以行氣為動哉翠虚篇不云乎惟此乾坤真運用不必兀兀徒無言無心無念神已昏安得凝聚為胎仙又豈以禪定為静哉金丹大成集云陽主動隂主静翠虚曰動中求静静中有為動静有作口口傳之學者殆未可以管見輕議也四時順宜與氣相得四時者身中之春夏秋冬也下功之時善調停而順其宜然後温凉寒暑各得其所吕純陽詩云水火均平方是藥隂陽差互不成丹其功皆在乎調停也剛柔斷矣不相渉入剛陽剛也柔隂柔也剛柔斷矣不相渉入者陽剛用事則一意在下不可渉於上也隂柔用事則一意在上不可渉於下也張紫陽石橋歌云水生火火生水水火須分前後隊此之謂也五行守界不妄盈縮王良器天童經頌云金木中央并水火五般守定一丹田孰謂不守而可得哉蓋此五者散則周身為氣聚則丹田成寳今以之凝然端守於丹田而不妄盈縮則相與混融化為一氣而凝成金液矣盈者太過之謂也縮者不及之謂也翠虚篇云靈汞通真變化多只宜存守不宜過蓋太過則傷物不及則又不能生物惟當綿綿若存以意守之而已守之之乆則時至氣化罐滿必溢神明當自來也易行周流詘信反覆易日月也日月行於黄道晝夜往來周流不息上半月陽伸隂屈魂長魄消下半月隂伸陽屈魂消魄長循環反覆無有窮巳人身首乾而腹坤儼如天地其二氣上升下降亦如天地内指通𤣥祕訣云日月常行黄赤道衆真學此作還丹其法即與天地無異然其所以效日月之運用與天地以同功其要在乎任督二脈蓋任督二脈為一身隂陽之海五氣真元此為機會任脈者起於中極之下以上毛際循腹裏上關元至咽喉屬隂脈之海督脈者起於下極之腧並於脊裏上至風府入腦上巔循額至鼻柱屬陽脈之海所以謂之任脈者女子得之以姙養也謂之督脈者以其督領經脈之海也鹿夀長生五百嵗為白鹿千嵗為青鹿蓋能通其督脈者也如龜鶴蟾蜍皆夀千嵗蓋能通其任脈者也南華真經云緣督以為經可以保身可以全生人能通此二脈則百脈皆通自然周身流轉無有停壅之患而長生乆視之道斷在此矣内指通𤣥祕訣云法水能朝有祕關逍遥日夜遣輪環於中壅滯生諸病决通流便駐顔其是之謂乎又如朗然子詩云泝流直上至泥丸關節通便駐顔又云常使氣衝關節透自然精滿谷神存豈皆虚言哉陳希夷以為改換腥肥氣脈行韓逍遥以為轉輪一月便契𤣥中𤣥若有作用實無作用似乎静定即非静定蓋自髙上元君密𫝊以來逓相付囑迄至于今除此道外更無别道有言環中者有言周天者兹蓋周身上下隂陽升降之正路也道徳經云谷神不死是謂𤣥牝𤣥牝之門是謂天地根綿綿若存用之不勤隂符經云三反晝夜用師萬倍黄庭經云皆在心内運天經晝夜存之自長生度人經云旋斗歴箕迴度五常天童經云三宫升降上下往來無窮無已上清玉真胎息訣云上至泥丸下至命門二景相隨可救殘老劉虚谷易傳云栖神上𤣥總氣下牝反覆運轉升降無窮白紫清東樓法語云上自天谷下及隂端二景相逢打成一塊崔公入藥鏡云歸根竅復命關貫尾閭通泥丸許旌陽三藥歌云三田内轉長流布青目烏髭髮黒時吴宗𤣥學仙歌云坎離反覆顛倒顛天地日月俱囘旋指𤣥篇云一馬自隨天變化六龍長駕日循環吕純陽詩云時人若要學長生先是樞機晝夜行静中吟云馳駕登天軸晝夜如車輪還金篇云黙運乾坤一合泰從他日月兩邊流玉芝書云東轉西流人莫測地騰天降鬼難知靈源大道歌云元和内運即成真呼吸外施終未了張鴻濛還元篇云十二時中子作頭般添運用勿停休悟真篇云五行妙用法乾坤乾坤運兮五行分復命篇云巡行十二位赤脚猛將軍劉髙尚法語云神存生氣氣非口鼻隂降陽升同流天地劉虚谷還丹篇云下降上升循轂軸左旋右覆合樞機崇正篇云般運有功連晝夜斡旋至妙體璣璇混元寳章云自强不息同乾運六尺身中抱九天翠虚篇云晝運靈旗夜火芝抽添運用切防危還源篇云誰能知運用大意要黄婆上清集云晝夜河車不暫停黙契大造同運行全真集云氣血轉流渾不漏漸悟集云斡運日月輪水雲集云常耕清静田三段定守無為舍一間劉長生仙藥集云住行坐臥運坎迎離鳴道集云安閒自得長生道晝夜無聲轉法輪王玉陽雲光集云斡運内丹慿火候載般烏兔走瓊輪太古集云周天度數還知道關節熏烝處處通不過皆是此道也或謂之翻筋斗或謂之轉心輪一曰法天之樞仙夀萬億一曰元和内運可保長生千經萬論無往不同引古證今若合符節即非行氣即非存想亦非肘後飛金精亦非運心思脊骨兹蓋呼吸太和保守自然真要之道也奈何世之學者每每悅難而不悅易求逺而不求近雖有道者欲與開發孰為之信内指通𤣥祕訣云世人不樂正法論東却樂說西茍非洞曉隂陽造化見得透徹莫之信也晦朔之間合符行中晦朔之間乃三十日半夜以前是也丹法以時易日則每日亥子之交即晦朔之間也天地開闢於此時日月合璧於此時草木孳萌於此時人身之隂陽交會於此時神仙於此時而作丹則内真外應若合符節不先不後正當其中在乾四徳為貞元之間在十二卦為坤之末復之初乃天地人之至妙至妙者也渾沌鴻濛牝牡相從渾沌鴻濛者一氣未分之時也牝牡相從者隂陽混於其中而未相離也當其未相離也神凝氣聚混融為一内不覺其一身外不知其宇宙與道冥一萬慮俱遺溟溟涬涬不可得而名强名之曰太一含真氣或名之曰先天一氣翠虚篇云大藥須慿神氣精採來一處結交成丹頭只是先天氣煉作黄芽發玉英蓋神仙之修煉别無他術只是採取先天一氣以為金丹之母勤而行之指日可與鍾吕並駕復命篇云採二儀未判之氣奪龍虎始媾之精閃入黄房煅成至寳又云採取須教密誠心辨醜妍至難尋意脈容易失寒泉特恐學者執於有為而不明大道之先天泥於採取而不能尋其意脈爾崇正篇云寒淵萬丈睡驪龍頷下藏珠炯炯紅謹密不驚方採得更依時日法神功蓋採者以不採而採之取者以不取而取之在於静定中有非動作可為也昔黄帝遺其𤣥珠使知索使離朱索使喫詬索索之皆不得乃使象罔象罔得之象罔者形之謂也必形罔象然後先天一氣可得擊壤集先天吟云一片先天號太虚當其無事見真腴又云若問先天一字無後天方要著功夫其說是已蓋太極未判隂陽未分此天地之先天也以丹法言之則寂然不動反本復静之時是也混元寳章云寂然不動感而通窺見隂陽造化功信乎寂然不動則心與天通而造化可奪也翠虚篇云莫向腎中求造化却須心裏覔先天可謂深切著明矣擊壤集思慮吟云思慮未起鬼神莫知還金篇云鬼神不見處龍虎定相尋先天大道須是致虚極守静篤不可以一毫思慮加乎其間當其寂然不動萬慮俱冺之時河海静黙山岳藏烟日月停景璇璣不行八脈歸源呼吸俱無既深入於窈㝠之中竟不知天之為蓋地之為輿亦不知世之有人已之有軀少焉三宫氣滿機動鳴則一劔鑿開渾沌兩手擘裂鴻濛是謂無中生有甯𤣥子詩云不在塵勞不在山直須求到窈㝠端豈不信然哉今人不知大道之祖或指真鉛為先天或指天一生水為先天或指兩腎中間一㸃明為先天或指臍間為先天或指鼻祖為先天或指目光為先天或指運氣為先天此皆尋枝摘葉之偏見非大道之先天也易曰先天而天弗違後天而奉天時夫先天而天弗違者純乎天理之自然雖天亦不能違也後天而奉天時者天時之至吾當奉承之也非天下之至通其孰能與於此哉滋液潤澤施化流通還丹篇云萬里隂沈春氣合九霄清徹露華凝妙矣哉其隂陽交感之真景象與斯時也精神四達並流無所不極上際於天下蟠於地冥冥兮如烟嵐之罩山濛濛兮如霧氣之籠水霏霏兮如冬雪之漸凝漸聚沈沈兮如漿水之漸矴漸清此乃身中之天地絪緼身中之男女構精也迨夫時至氣化感而遂通則倐爾火輪煎地脈愕然神瀵湧山椒天地之間被潤澤而大豐美矣擊壤集恍惚吟云恍惚隂陽初變化絪緼天地乍旋中間些子好光景安得功夫入語言茍非親造實詣又豈信有如此之真景象哉天地神靈不可度量隂陽相交而神煞藏没此天地神靈之時也龍虎相交而鬼神不知此吾身神靈之時也以吾身之神靈合天地之神靈則内真外應巽門於定中豁開而兩畔同升合為一矣還元篇云只於罔象無形處有箇長生不死根信乎惟忘形罔象然後可得見也若使可以存想存思計較度量而得之則不謂之神靈矣利用安身隱形而藏晦朔之間日月合璧於北方光耀隱而不見丹法以時易日於半夜坤復之交疊足端坐如山石之不動口緘舌氣如冬蛇之蟄伏此即利用安身隱形而藏也其時含光黙黙返照於其内一呼一吸悠悠綿綿迤邐歸於命蔕乆之但覺窈窈㝠㝠如臨萬丈不測之淵潭此乃神氣歸根身心復命金液凝結之時也翠虚篇云氣入丹田養白鵶斯時方曰結黄芽如其心猿不定意馬四馳則神氣散亂於外欲望結成還丹其可得乎始於東北箕斗之鄉旋而右轉嘔輪吐萌濳潭見象發散精光畢之上震出為徴陽氣造端初九濳龍陽以三立隂以八通故三日震動八日兊行九二見龍和平有明三五徳就乾體乃成九三夕惕虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主進止不得踰時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始韞養衆子世為𩔖母上九亢龍戰徳于野始於東北箕斗之鄉東北火候造端之地也畢之上震出為徴震亦火候造端之卦也翠虚篇云有一子母分胎路妙在尾箕牛斗女蓋謂此也此章引用先天六卦及乾六爻以象月體之盈虧又雜以二十八宿月所臨之位無非譬喻也學者未得其訣而冒然讀之其不心目俱眩者鮮矣夫修丹火候與月之消長無異月三日哉生明蓋始於東北箕斗之鄉旋而右轉至晚嘔輪吐萌於西南畢之上其象如震以乾卦言則應乾之初九此喻吾身陽火起緒之初也月初八上弦其光半明其象如兊以乾卦言則應乾之九二此喻吾身陽火用功之半也月三五十五與日相望魂盛光盈其象如乾以乾卦言則應乾之九三此喻吾身陽火圓滿之時也月十六望罷哉生魄其象如巽以乾卦言則應乾之九四此喻吾身隂符繼統之始也月二十三下弦其光半虧其象如艮以乾卦言則應乾之九五此喻吾身隂符用功之半也月六五三十光盡泯其象如坤以乾卦言則應乾之上九此喻吾身隂符結括之時也魏公以六卦喻火候而又配以乾之六爻何也蓋丹乃純陽之寳乾乃純陽之卦也於六卦之中乾稱九三夕惕虧折神符坤稱上九亢龍戰徳于野又何也蓋守城於乾而用文野戰於坤而用武皆當防危慮險也用九翩翩為道規矩陽數已訖訖則復起推情合性轉而相與循據璇璣昇降上下周流六爻難以察覩故無常位為易宗祖九陽數也易曰參天兩地而倚數蓋取五行之生數天一天三天五參天相倚而成九地二地四兩地相倚而成六此坤之所以用六而乾之所以用九也丹法之所謂用九乃刻中火候之九轉蓋法乾也用九翩翩為道規矩陽數已訖訖則復起者一爻過一爻又來而不敢毫髮差殊也復命篇云數中無走失火候莫教遲蓋謂此也情金情也性木性也一物分二間隔東西若得斗柄之機斡運則木性愛金金情戀木不間隔矣故曰推情合性轉而相與循據璇璣昇降上下也周流六爻難以察覩故無常位為易宗祖者周流一身濳天而天濳地而地如六爻之變動也六爻謂前乾卦之六爻也引而伸之觸𩔖而長之為六卦為六十卦其義一也還金篇云九轉極𤣥機開爐迸火飛蓋謂九轉功夫自寅而起至戍而止乃刻中火候之祕訣其間有抽添進退之妙沐浴交結之奥是故謂之極𤣥修煉若不知此則雖得真藥安能成丹此魏公所以不敢輕泄而姑借乾元用九之說以露其機也自今觀之神仙之還丹乃身中之易也火候之九轉乃身中之乾也身中之乾無爻畫之可觀無象數之可求迎之不見其首隨之不見其後又安有方體而得以察覩也哉朔旦為復陽氣始通出入無疾立表微剛黄鍾建子兆乃滋彰播施柔暖烝得常復一陽之卦也律應黄鍾以一日言之為夜半子以一月言之為初一至初三半以一嵗言之則斗杓建子之月是也此時陽氣始通喻身中陽火發動之初火氣至微要在不縱不拘不疾不緩使温温柔暖播施於鼎器間也崇正篇云黄鍾為子一陽興受氣之初數未増用火温温無煅制每愁龍弱虎威凌蓋初爻之運一陽始通止可輕輕地黙黙舉未堪用力故曰出入無疾然又不可太柔要當撥動頂門關捩微微挈之故曰立表微剛須臾火力熾盛逼出真鉛至于箕斗之鄉則河車不敢暫留停運入崑崙峯頂也金丹大成集云復卦起濳龍戊巳微調未可攻九二見龍臨卦主神通從此爐中次第紅㤗卦恰相逢猛火燒乾藉巽風煉就黄芽并白雪奇功還返歸坤道始窮火候之口訣盡於此矣臨爐施條開路生光光耀漸進日以益長丑之大吕結正低昻臨二陽之卦也律應大吕以一日言之為雞鳴丑以一月言之為初三半至初五以一嵗言之則斗杓建丑之月是也此時陽氣漸進喻身中陽火漸漸條暢而黄道漸漸開明故言光耀漸進日以益長也仰以成泰剛柔並隆隂陽交接小往大來輻輳於寅運而趨時泰三陽之卦也律應太簇以一日言之為平旦寅以一月言之為初六至初八半以一嵗言之則斗杓建寅之月是也此時陽氣出地喻身中三陽上升漸漸起漸漸仰當急駕河車般歸鼎内故言運而趨時也運而趨時者火候之運至此不可留停也然有一日之寅有一刻之寅朗然子詩云勤吞津液過千口長記存神聴五更此言一日之寅也金丹大成集云交得三陽逢泰卦便堪進火法神功此言一刻之寅也一日之寅固依天上之日辰以為期度世固有知之者矣若夫一刻之寅乃身中火候之祕古今丹書皆不敢明言真所謂千人萬人中一人兩人知者也𤣥哉𤣥哉漸歴大壯俠列夘門榆莢墮落還歸本根刑徳相負晝夜始分大壯四陽之卦也律應夾鍾以一日言之為日出夘以一月言之為初八半至初十以一嵗言之則斗杓建夘之月是也此時隂佐陽氣聚物而出喻身中陽火方半氣候停匀故言刑徳相負晝夜始分然萬物莫不當春而發生而榆莢至是墮落何也蓋陽中有隂也夬隂以退陽升而前洗濯羽翮振索宿塵夬五陽之卦也律應姑洗以一日言之為食時辰以一月言之為十一至十三半以一嵗言之則斗杓建辰之月是也此時陽氣既盛逼近天際喻身中陽火升上故言陽升而前而又言洗濯羽翮振索宿塵者蓋大鵬將徙天池則水擊而上其勢當奮發也乾健盛明廣被四鄰陽終於已中而相干乾六陽之卦也律應中吕以一日言之為禺中巳以一月言之為十三半至十五以一嵗言之則斗杓建巳之月是也此時陽氣盛極周遍宇内喻身中陽火圓滿而丹光發現山頭神瀵分為四埒注於山下經營一國無不周徧故言廣被四鄰而又言陽終於已中而相干者陽火數終則隂符用事也姤始紀緒履霜最先井底寒泉午為蕤賓賓服於隂隂為主人姤一隂之卦也律應蕤賓以一日言之為日中午以一月言之為十六至十八半以一嵗言之則斗杓建午之月是也此時隂氣方生喻身中隂符起緒之地靈丹既入口中囘來却入寒泉當馴致其道送歸丹田不可荒忙急速故言履霜最先井底寒泉而又言賓服於隂隂為主人者蓋一隂用事則衆陽為賓也賓者敬也防危慮險之謂也遯世去位收歛其精懐徳俟時栖遲昩冥遯二隂之卦也律應林鐘以一日言之為日昳未以一月言之為十八半至二十以一嵗言之則斗杓建未之月是也此時隂氣漸長喻身中隂符離去午位收歛而降下如賢者退隱僻處巖谷故言懐徳俟時栖遲昩冥也否塞不通萌者不生隂信陽詘毁傷姓名否三隂之卦也律應夷則以一日言之為晡時申以一月言之為二十一至二十三半以一嵗言之則斗杓建申之月是也此時陽氣漸衰喻身中隂符愈降愈下猶三隂肅殺之時草木黄落故言隂伸陽屈毁傷姓名也觀其權量察仲秋情任蓄微稚老枯復榮薺麥芽孽因冒以生觀四隂之卦也律應南吕以一日言之為日入酉以一月言之為二十三半至二十五以一嵗言之則斗杓建酉之月是也此時隂佐陽功物皆縮小而成喻身中隂符過半降而入於丹田如木之歛花就實故言任蓄微稚然萬物莫不逢秋而枯老而薺麥至此芽孽者何也蓋隂中有陽也剥爛肢體消滅其形化氣既竭亡失至神剥五隂之卦也律應亡射以一日言之為黄昏戌以一月言之為二十六至二十八半以一嵗言之則斗杓建戌之月是也此時陽氣衰滅枝頭之果皆潰爛而墜於地喻身中隂符將盡而神功無所施故言化氣既竭亡失至神也夫火生於寅旺於午墓於戌戌者閉物之時也一刻之火候至此而畢事復命篇謂東西動静合朝昏是也一日之火候亦至此而休功吕純陽詩云日日隨他出又沈是也區區旁門小術但知其一不知其二又安能究竟於此道窮則反歸乎坤元恒順地理承天布宣𤣥幽逺眇隔閡相連應度育種隂陽之原寥廓恍惚莫知其端先迷失軌後為主君坤六隂之卦也律應應鐘以一日言之為人定亥以一月言之為二十八半至三十以一嵗言之則斗杓建亥之月是也此時純隂用事萬物至此皆歸根而復命喻身中隂符窮極則寂然不動反本復静故言道窮則反歸乎坤元也恒順地理承天布宣與上篇金本從日生朔旦受日符義同蓋天地日月一也月受日光而日不為之虧然月之光乃日之光也天氣降而至於地地中生物者皆天氣也人身法天象地其間隂陽感合與天地無以異也還元篇云以神歸氣内丹道自然成人能返觀内照凝神入於氣穴則神存生氣凝成液迨夫天機一動則紅蓮含蘂露珠凝碧飛落華池滴滴而丹田結聚作丹樞也𤣥幽逺眇隔閡相連謂亥子之間乃隂陽交界之時當其六隂窮極一陽未生寂兮寥兮猶如天地未判之初神仙作丹於此時塞兊垂簾以神光下照於坎宫始者幽幽冥冥儼如寒潭之浸月次則神與氣合隔閡濳通猶如磁石之吸鐵也應度育種隂陽之原謂作丹之際正如亥月純坤用事之時其時萬物歸根閉塞成冬冬雖主藏然一嵗發育之功實肧胎於此特閉藏無迹人不得而見爾而古人以此純隂之月名為陽月者蓋小雪之日陽氣已生於六隂之下積而至於冬至遂滿一畫之陽變為復卦也丹道亦然當夜氣之未央但凝神聚氣端坐片時少焉神氣歸根自然無中生有漸凝漸聚積成一㸃金精翠虚篇云金精即是坤宫藥坤在西南為川源蟾光終日照西川即此便是藥之根蓋一陽不生於復而生於坤坤雖至隂然隂裏生陽實為産藥之川源也寥廓恍惚莫知其端者身心復命之時神入寥廓與太虚一體静定之乆候至心花發現則三宫氣滿但覺恍恍惚惚莫知其所以然也蓋恍恍惚惚其中有物窈窈冥冥其中有精乃修煉之要樞也玉芝書云此四句古今口誦者億兆明義理者能有幾人蓋非親造實詣無由知也是故狀其窈冥則如臨深俯幽論其恍惚則如晝夢初覺此乃真景象非譬喻也學者未曽經歴不知窈冥恍惚乃吾身之真景象往往槩以虚文視之惜哉當知窈冥者寂然不動吾身天地未判之時也恍惚者感而遂通吾身天地將判之時也作丹之妙莫妙乎此豈可以虚文視之哉赤龍大丹訣云無人明恍惚惟我識朦朧信乎明此者鮮有其人也先迷失軌後為主君者其先昏昏黙黙深入乎窈冥之中俄頃隂極而陽生静極而機發則面門豁開虚空迸裂一段風光破寂寥而化權歸手内也魏公此章顯言産藥之川源又極論存亡有無主客先後之祕如此詳盡無以加矣還金篇云渺邈但撈水裏月分明只採鏡中花蓋非深於道者不能識也無平不陂道之自然變易更盛消息相因終坤始復如循連環帝王乗御千秋常存無平不陂無往不復此乃道之自然也丹法静極而動動極而静一動一静互為其根亦出於自然如日月運行一寒一暑暑往則寒來寒往則暑來無非自然也夫金丹者身中之易也易窮則變變則通盛衰相禪消息相因蓋未有窮而不變變而不通者也陽始於復隂終於坤終始相接首尾相銜故曰終坤始復如循連環魏公以十二辟卦論火候又以律名辰名鋪叙而言皆譬喻也蓋輻輳即太簇俠列即夾鐘洗濯即姑洗中即中吕栖即林鐘任即南吕傷即夷則亡即亡射應即應鐘振即辰昩即未伸即申蓄即酉滅即戌閡即亥大率皆是假借蓋不必執文泥象而强生枝節也帝王乗御千秋常存謂君子終日乾乾與時偕行則真可以歴千秋而常存也矣將欲養性延命却期審思後末當慮其先人所稟軀體本一無元精流布因氣託初人無愚智同此性也亦同此命也君子知性之不可戕賊也於是存而養之知命之不可斵喪也於是保而延之雖不假修煉未有不安恬令終者况得修煉之法盜天地奪造化煉魂魄而為一合性命而雙修豈不能長生與夫欲求長生須求吾未生以前此身縁何而得然後可以論養性延命之道故曰審思後末當慮其先蓋人之生也以父母之氣交結而成形形乃受氣之本氣乃有形之根若氣不得形則無因而立形不得氣則無由而成故曰人所稟軀體本一無元精流布因氣託初今夫神仙之修丹以隂陽内感神氣交結於無中生有與男女胎孕之理實同其十月温養功夫真息綿綿晝夜如一亦與嬰兒未生以前無異靈源大道歌云但看嬰兒胎處時豈解將心濳筭計專氣致柔神乆留往來真息自休休蓋嬰兒之在母胎也母呼亦呼母吸亦吸口鼻皆閉而以臍達故臍者生之根氣之蔕也吕純陽𤣥牝歌云窮取生身受氣初莫怪天機都泄盡人能窮取一念生身之處返本還源囘光内照採藥於西南坤腹根蔕之地而與當來受氣之初相似何用他求奈何學者往往執文泥象各以己見為是其好髙者則認金丹為禪宗遂以宗性為𤣥牝以念頭動處為一陽生以掃除妄念為進火而竊笑延命之說為髑髏下光景其卑下者則認金丹為御女術遂以婦人為鼎器以産門為生身處以物為刀圭而反譏養性之說為蒲團上枯坐功夫一則淪於空寂一則陷於邪僻終身執而不悟深可為之浩歎也𩔖如雞子黑白相扶縱廣一寸以為始初四肢五臓筋骨乃具彌歴十月脫出其胞骨弱可卷肉滑若飴黑白者隂陽二氣也凡人結胎之初由父精母血隂陽二氣假合而成渾渾沌沌𩔖如雞子百日而男女分形然後四肢五臟筋骨乃具及期而育脫出其胞骨弱筋柔肌軟肉滑名曰嬰兒煉金丹者修吾身之嬰兒亦當彌歴十月翠虚篇云我昔功夫行一年六脈已息氣歸根有箇嬰兒在丹田與我形貌亦如然蓋修煉聖胎未有不用十月功夫而可以速成者也隂陽為度魂魄所居天有黄道為度三百六十五其運轉也一日一周日月行乎其間往來上下迭為出入此所以分晝夜而定寒暑也然天道密旋本無度數以日月經歴諸辰而為行度日月往來本無定居以朝暮出入之地而為所居明乎此然後知魏公所謂隂陽為度魂魄所居矣夫人身中黄道即隂符陽火所行之處也即日魂月魄所居之方也有能觀天之道執天之行識隂陽之行度知魂魄之所居則周天三百六十五度循環乎一息之頃而日月出入乎呼吸之微呼為陽吸為隂與天道同一妙用不必求之他也陽神日魂隂神月魄魂之與魄互為室宅古歌云日魂月魄若箇識識者便是真仙子此所謂日魂月魄非天地有形有象顯然之日魂月魄乃吾身無形無象隱然之日魂月魄也不遇真人指授焉能識之哉夫日為太陽晝以舒光故稱魂月為太隂夜以含景故稱魄然日魂屬陽謂之陽神固宜而月魄屬隂謂之隂精可也豈可以神言今皆謂之神者以其變動不居周流六虚往來既不定上下亦無常也魂東方木也魄西方金也金木本來無二體東鄰即便是西家往來東西迭為出入故曰互為室宅也性主處内立置鄞鄂情主營外恒為城郭城郭完全人物乃安於斯之時情合乾坤性之為言静也性主處内者端坐虚心向内觀也立置鄞鄂者捉得金精作命基也情之為言動也情主營外者先是樞機晝夜行也恒為城郭者八方周匝龍行火也城郭完全人物乃安者常使氣衝關節透自然精滿谷神存也於斯之時情合乾坤者晝夜河車不暫停黙契大造同運行也乾動而直氣布精流坤静而翕為道廬乾天也主乎動暢萬物而達於宇内故云直惟其動而直也故使精氣流動布滿三宫而無所不至坤地也主乎静歛萬物而藏於土中故云翕惟其静而翕也故使精氣歸於元海而為道廬大抵守於乾則動動則氣布精流守於坤則静静則氣聚精凝也剛施而退柔化以滋乾陽下濟於坤坤柔順而翕受之遂生藥既經起火烹煉則剛施而退隂柔上行而化作甘泉潤九垓矣九還七返八歸六居六七八九即水火木金也以卦言為坎離震兌以方言為東西南北以宿言為虚房星以象言為龜蛇龍虎以時言為春夏秋冬以辰言為子午夘酉皆是物也夫九曰還七曰返八曰歸同一㫖意而六獨曰居者北方坎位乃真鉛所居之本鄉也真鉛居於此則九金八木七火三方之正氣如輻之輳轂如水之朝宗皆聚於此也王保義註䟽金碧龍虎經云日有三照月有三移日月出於東而光耀於西則西方白虎金徳之正氣入於𤣥㝠之内化而為六戊日月入於西而光耀於東則東方青龍木徳之正氣入於𤣥㝠之内化而為六巳日月居於午而光耀於北則南方朱雀火徳之正氣入於𤣥㝠之内就土成形化而為黑鉛常居窈㝠之内為天地萬彚之根本王君此說與魏公之言可謂異世而同符矣男白女赤金火相拘拘則水定水五行初翠虚篇云怪事教人笑幾囘男兒今也會懐胎自家精血自交結身裏夫妻是妙哉蓋金丹聖胎以隂陽内感神氣交結而成曰男女曰赤白皆身中夫婦之異名也當其隂陽内感之時神與氣交猶金火之相拘金火相拘而止於北方坎水之中則神凝氣聚其水自定水定則藥物結矣還金篇云水澄凝琥珀是也水也者大丹之根源也天一生水其位在北其卦為坎居五行之首乃吾身藥物所産之鄉也人能光返照於此出息微微入息綿綿勿令間斷則神氣歸根漸漸入而漸漸柔漸漸和而漸漸定定之之乆則呼吸俱無藥物當自結也上善若水清而無瑕上善若水行其所無事金丹大道清静無為亦行其所無事馬丹陽語録云學道人行住坐臥不得少頃心不在道行則措足於坦途住則凝神於太虚坐則匀鼻端之息臥則抱臍下之珠乆而調習無有間斷而終日如愚方是端的功夫非干造作行持也丹陽此說豈非行其所無事耶悟真篇云謾守藥爐看火候但安神息任天然上清集云神仙伎倆無多子只是人間一味呆可謂行其所無事矣夫水之為性静定而矴之則清動亂而汨之則濁金丹之妙全是静定中來還源篇云能知藥與火定裏見丹成蓋未有不定而得之者也道無形象真一難圖變而分布各自獨居有物混成先天地生吾不知其名故彊字之曰道無形可求無象可覩矧可得而畫圖哉昔廣成子之告黄帝曰至道之精窈窈㝠㝠至道之極昏昏黙黙夫當其窈㝠昏黙之際一念不生萬慮俱泯渾渾淪淪如太極之未分溟溟涬涬如兩儀之未兆惟此一物湛兮獨存如清淵之印月寂然不動如止水之無波不知孰為鉛孰為汞夫是謂之真一迨夫時至氣化變而分布則輕清者騰而在上重濁者矴而在下於是坎宫有鉛離宫有汞而向之所謂渾渾淪淪溟溟涬涬者至此分而為二而各自獨居矣復命篇云一物分為二能知二者名鼎爐藏日月滴漏已三更蓋謂此也夫金丹大藥孕於先天産於後天其妙在乎太極將判未判之間静已極而未至於動陽將復而未離乎隂於此合天地之機識結丹之處知下手之訣則恍惚之中尋有物窈㝠之内吸真精方知大道於無中生有而真一之妙果不可以畫圖也然則真一之妙終無可以示人與曰有陽燧以取火非日不生光方諸非星月安能得水漿二氣至懸逺感化尚相通何况近存身切在于心胷隂陽配日月水火為效徴周禮秋官司烜氏掌以夫遂取明火于日以鑒取明水於月淮南子云方諸見月則津而為水髙誘註云方諸隂燧大蛤也熟摩拭令熱向月則有水生且地之去天不知幾千萬里日月懸於空中去地亦不知幾千萬里而陽燧見日則得火方諸見月則得水奚為感化相通如此其速哉何况近存身切在於心胷身中自有水火心中自有藥材得不光返照以求其感化之妙乎乃若八月十五月明之夜深山之結胎滄海之蚌結珠抑何為感化相通如此其妙哉人生天地間為萬物之靈反不能盜天地奪造化曽兔蚌之不若學仙者亦嘗於此致意否乎大抵隂陽得𩔖自然感化今魏公以陽燧取火方諸取水為證欲使學者濳心内觀於無中生有其感化亦如是也還丹篇云二氣纔交甘雨降兩神相會玉漿流信有之矣夫鑑之與珠皆光明瑩潔之物表裏透徹無纎毫痕瑕故能拘日月之光聚為一粟之明雖寥廓至逺隨即感應然而定則聚聚則有動則散散則無人能虚心凝神泰然内定無一毫之雜想以吾自已日月聚光不散乆之氣定時正自有竒效要之至道不逺恒在目前亦猶磁石吸鐵隔礙濳通極為切近但世人迷而㤀返不能求之於内爾甯𤣥子詩云慇懃好與師資論不在他途在目前又云當時一句師邊得宻密垂簾仔細看可謂切近之甚矣耳目口三寳固塞勿發揚隂符經云九竅之邪在乎三要何為三要耳目口是也今魏公以三要為三寳而曰固塞勿發揚者欲修煉之士歛耳目之聰明緘喉舌之真氣盡收歸裏不放出外如寳貝之珍藏也豈不見釡甑炊米關盖密於上薪火然於下外無纎毫之罅隙内有熱氣之盤鬱俄頃之間米皆烝熟為飯今夫入室修煉須是收視返聽閉口含津勿使纎毫真氣漏泄然後至藥滋生大丹成熟若使耳為聲引目為色牽重樓浩浩而出三者皆發揚而無餘何還丹之可求哉真人濳深淵浮游守規中真人即元神也深淵即太淵也異名衆多今試舉而言之曰泥丸宫流珠宫玉清宫紫清宫翠微宫太微宫太一宫太𤣥關𤣥門𤣥宫𤣥室𤣥谷𤣥田砂田第一關都關天關天門天谷天田天心天輪天軸天源天池天根天堂天宫乾宫乾家交感宫離宫神宫神室神關神京神都𤣥都故都故鄉故丘故林故宫紫府紫庭紫金城紫金鼎朱砂鼎汞鼎玉鼎玉室玉京玉宇瑶峯第一峯最髙峯祝融峯崑崙頂崆峒山蓬萊上島上京上宫上𤣥上元上谷上土釡上丹田其名雖衆其實則一也翠虚篇云天有七星地七寳人有七竅權歸腦太古集云金丹運至泥丸穴名姓先將記玉都是故帝一囘元之道泝流百脈上補泥丸腦實則神全神全則形全也今魏公謂真人濳深淵浮游守規中者隨真息之往來任真氣之升降自朝至暮元神常棲於泥丸也黄庭經云子欲不死修崑崙静中吟云我修崑崙得真訣復命篇云會向我家家裏栽培一畝天田還元篇云悟道顯然明廓落閒閒端坐運天關此乃至簡至易之道但撥動頂門關棙而匀匀地黙黙舉三宫自然升降百骸萬竅自然通達有如萬斛之舟而惟用一尋之木發千鈞之弩而惟用一寸之機且是不費絲毫力但昩者自不信爾或存老君在泥丸宫中而黙朝之又畫蛇添足矣旋曲以視覽開闔皆合同為已之軸轄動静不竭窮皇極經世書云天之神栖於日人之神發於目大矣哉人之神發於目也生身處此物先天地生没身處此物先天地没水火木金土之五行攅簇於此肝心脾肺腎之五者鍾靈於此唾涕精津氣血液之七物結秀於此其大也天地可容其小也纎塵不納兹非吾一身中之大寳也與内指通𤣥祕訣云含光便是長生藥變骨成金上品仙又云撮聚雙睛在眼前燒成便可㸃金仙如此直指示人而學者猶或未悟何其昧之甚耶蓋三宫升降上下往來無窮無已猶車之有輪也其運用在心猶輪之有軸也其鈐鍵在目猶軸之有轄也金華詩云仙童惟守洞門立三島真人長往還其說是已離氣内榮衛坎乃不用聰兌合不以談希言順鴻濛三者既關楗緩體處空房離氣内榮衛者收目内視而光不露也坎乃不用聰者返耳内聽而聰不泄也兌合不以談希言順鴻濛者安閒心曲冷如灰黙黙無言䕶聖胎也三者既如此關楗又當緩體處於空房斯可以為修煉也緩體者舒徐容與無勞爾形也處空房者入静室也其中不着他物惟設一香一燈一几一榻而已坐處不欲太明太明則傷魂不欲太暗太暗則傷魄蓋魂好明魄好暗明屬陽暗屬隂是故翠虚篇謂室宜向木對朝陽兌有明忩對夕光而又謂莫息明燈并百和也且夫入静室修煉乃一至大因縁誠非細事豈不見悟真篇云此道至神至聖憂君分薄難消是豈無徳行者所能妄覬也哉然静室亦不必拘以山林或在㕓中或居道鄉但得所託無往不可或疑悟真篇記有通邑大都依頼有力者之語蓋以大藥未成難當寒暑於一年之内四季要衣真氣未完而尚有飢渴於一日之内三餐要食如伍達靈之得張程二友張紫陽之得馬陸二公王冲熈之得富韓公李長源之得筠陽親舊於是咸底厥成實為周天火候須用一片功夫不可間斷必得同志有力者為之保䕶供給服事俾免飢寒困苦之竊其氣乃可以專志修煉也隂真君金液還丹歌云不得地莫妄為悟真篇云命寳不宜輕弄得斯道之正𫝊者當自知之委志歸虚无念念以為常委志歸虚无者心無雜念意不外遊而鎮日翫真空也念念以為常者念念相續勿令間斷而長將氣度隨天道也或疑此法與禪學稍同殊不知金丹於無中生有養就嬰兒蓋非塊然面壁槁木死灰之謂也白紫清語録云修丹口訣第一是聚氣凝神常常握固即聚氣念念守黙即凝神學者若徒知無心無念而不知聚氣凝神則墮於頑空又安得胎仙之成也證騐自推移心專不縱横修煉有三分功夫則有三分證驗有十分功夫則有十分證驗若能勤而行之夙夜不休以至百日功靈則兩腎如湯煎膀胱如火然目有神光耳有靈響鼻有異香口有甘津此身融融液液證驗逐日推移所貴乎心專而不可縱横者實恐燭理未透而於静定中似夢非夢之際或為魔境之所攝也指𤣥三十九章云不可着他境物去一心專守虎龍蟠其說是已丁靈陽心性訣云若静中抑按功深或是忽見仙佛鬼神樓臺光彩一切境界見於目前大不得起心生於憎愛師父云自己性中空廓任他千變萬化大抵一心無動萬邪自退但心火不生則神氣相聚子母相守自然水火既濟水見火而自然化為氣上騰薰蒸關竅無所不至自然百脈調攝四大沖和謹慎守之道自相契王栖雲盤山語録云修行之人静中境界甚有多般皆由自己識神所化因静而現誘引心君豈不聞古人云凡所有相皆是虚妄心欲遣識識神尚在便化形象神頭鬼面惑亂心主若主不動見如不見體同虚空無處捉摸自然消散關尹子云人之平日目忽見非常之物者皆精有所結而使之然人之病日目忽見非常之物者皆心有所歉而使之然茍知吾心能於無中示有則知吾心能於有中示無但不信之自然不神或曰厥識既昏孰能不信我應之曰如捕蛇師心不怖蛇彼雖夢蛇而無畏怖故黄帝曰道無鬼神獨往獨來即此諸說觀之則知魏公所謂心專不縱横誠為修煉者之要端也寢寐神相抱覺悟候存亡精生有時時至神知百刻之中切忌昏迷須是行住坐臥綿綿若存如雞抱卵煖氣不絶方可謂之修煉至於真積力乆功夫純熟晝夜如一更無夢覺之異雖當寢寐之間神亦不昩而精生之時神與天通雖不待喚醒亦自覺悟夏雲峯云自然時節夢裏也教知是也今魏公謂寢寐神相抱覺悟候存亡欲修煉之士常惺惺也蓋金丹大藥由神氣交結而成乃是無質生質結成聖胎辛勤保䕶十月如幼女之初懐孕似小龍之乍養珠蓋神氣始凝結極易踈失寢寐之際須當與神相抱切不可昏迷而沈於夢境覺悟之後惟恐火冷而丹力或遲故必候其存亡要在一日十二時中無晝無夜念茲在茲然後功夫純粹而藥材不至消耗火候不至虧闕焉可須臾離哉顔容寖以潤骨節益堅强顔容寖以潤骨節益堅强者至寳藴於中自然精華發於外亦猶玉在山而木潤淵生珠而崖不枯也辟却衆隂邪然後立正陽悟真篇云羣隂剥盡丹成熟跳出樊籠夀萬年夫人之一身徹上徹下凡屬有形者無非隂邪滓濁之物神仙修煉之法蓋是無中生有奪天地一㸃真陽結成丹頭於是晝夜運火煉去隂氣煉之十月而胎圓三年而功成然後體變純陽化形而仙也修之不輟休庶氣雲雨行淫淫若春澤液液象解氷從頭流達足究竟復上升往來洞無極弗弗被谷中内指通𤣥祕訣云晝夜無休作大丹精華透頂百神攅蓋一年處室夜以繼日功夫不輟自然效驗顯發其和氣周匝於一身溶溶然如山雲之騰太虚霏霏然似膏雨之徧原野淫淫然若春水之滿四澤液液然象河氷之將欲釋往來上下百脈沖融被於谷中暢於四肢拍拍滿懐都是春而其狀如微醉也入藥鏡云先天氣後天氣得之者常似醉靈光集云顛倒循環似醉人不憂不喜内全真是皆丹功之靈驗也丁靈陽囘光集云若一念無生則自然丹田氣海之内太隂之精渡過尾閭穴把夾脊雙關風府泥丸返下明堂鼻柱入於華池化為甘津嚥下重樓澆灌五臟六腑至丹田上下流轉充盈四大周而復始無不徧矣如其朝行暮輟用志弗専又安能進於是哉反者道之驗弱者徳之柄反者反復也道徳經云致虚極守靖篤萬物並作吾以觀其復蓋修丹效驗出乎虚之極靖之篤與天地冥合然後元氣從一陽而來復若使虚不極靖不篤則為山九仭功虧一簣從何而得效驗哉弱者柔弱也道徳經云専氣致柔能如嬰兒乎蓋修丹本柄在乎持其志無暴其氣如嬰兒之柔弱方可若使志無所守氣無所養則所得未錙銖所喪已山崖將何以為本柄哉芸鋤宿汙細微得調暢諸慮既息則百骸俱理㐫氣消散則道氣常存譬如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者伸矣今夫神仙之修丹芸鋤宿驅遣鬼尸安静六根空其五藴於正念中清静光明虚白晃耀乃得五臟清凉六腑調泰三百六十骨節無有滯礙八萬四千毫竅皆通暢也濁者清之路昏乆則昭明翠虚篇云精神冥合氣歸時骨肉融和都不知當斯之時三田氣滿恍然如在醉夢中得不謂之昏濁乎學者到此境界切不可放倒當知昏乆則必明濁乆則必清迨夫時至氣化而九天音信散肧腪則神水湛湛華池静白雪紛紛飛四山七寳樓臺十二層樓前黄花深可觀分分朗朗盡見於恍惚之間豈終於昏濁而已哉世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲不任杖聾者聽宫商没水捕雉兔登山索魚龍植麥欲穫黍運規以求方竭力勞精神終年不見功金丹大道以積精累氣而成斷不可以一蹴到也片餉結胎百日立基一年入室三年煉養自有節次功夫決無今日遇師明日便能升仙之理奈何世之學者往往惑於道聽塗說不審道之淺深不擇師之邪正務求速效惟好小術或知其一不知其二或得其體不得其用局於偏見自以為足甚至張皇邪說而反謗正道穿鑿真經以取信末學妄以授妄迷以𫝊迷如此者多矣間有聰明之士則又不肯屈已參訪惟鑚尋故紙以望得悟何異盲者之不任杖哉其愚暗之人不通至理强以臆說紐合丹書何異聾者之聴宫商哉乃若以臍内為𤣥關此猶捕雉兔而入水者也以兩目為華池此猶索魚龍而登山者也他如學採戰以望不死坐頑空而覬長生豈非植麥欲穫黍者乎運規以求方者乎是皆執迷不悟空費心力遂至皓首茫然迄無成效惜哉欲知服食法至約而不煩指𤣥三十九章云内裏明來是至真外邊入者即非親謂丹在身中不必求之外也今魏公乃有服食之說得非丹自外來而吞入口與曰非也丹生於坎中因火逼而出位徧歴三宫降而入口故曰服食也至約而不煩者口訣至簡至易也夫既謂之至簡至易則參同契不作可也何為連編累牘而不已耶又嘗見悟真篇云大丹之法至簡至易雖愚暗小人行之立超聖地而又云煉金丹者須洞曉隂陽深達造化何耶吁有説矣盖愚暗小人心無忖量易於取信暨有所遇則徑直奉行雖無講明亦可聰明之士則不然見聞既廣疑慮常多有一未明必欲窮究而後已茍不使之洞究隂陽造化之原彼將中道生疑一為旁門近似之說所撼則未免投杼下機而反謂吾道之不真矣此所以不得不為之講明也然則魏公之作是書也雖欲不鄭重其詞其可得乎太陽流珠常欲去人卒得金華轉而相因化為白液凝而至堅太陽流珠乃靈汞也靈源大道歌云此物何曽有定位隨時變化因心意在體感熱則為汗在鼻感風則為涕在腎感合則為精在眼感悲則為淚可見其常欲去人也金華即真鉛也汞得真鉛則轉而相依自然不飛不走留戀於内而化為金液凝而至堅也金華先倡有頃之間解化為水馬齒闌干陽乃往和情性自然真鉛生於坎位先液而後凝凝作黄芽故有馬齒闌干之喻翠虚篇云丹頭只是先天氣煉作黄芽發玉英是也夫鉛乃君也汞乃臣也鉛先動汞應之猶君倡而臣和也鉛屬金汞屬木木性愛金金情戀木隂陽得𩔖自然感合也迫促時隂拘畜禁門迫促時隂者時節正時須急採也拘畜禁門者採得歸來爐裏煅也還源篇云但要合天機誰識結丹處何謂合天機迫促時隂是也何謂結丹處拘畜禁門是也法當迫近隂極之時迎一陽初動之機以進火不可過之亦不可不及此之謂迫促時隂也進火之際促百脈以歸源窮九關而徹底君火相火民火皆拘聚於黄宫而煅成至寳此之謂拘蓄禁門也入藥鏡云天地靈造化慳茍非迫促時隂拘畜禁門安能盜其機哉慈母育養孝子報恩遂相銜嚥咀嚼相吞嚴父施令教敕子孫真鉛之生也孕於坤母之胞猶慈母之育養也迨夫飛上乾宫擒制真汞與真汞交結而成丹則又復囘於坤母之此即孝子之報恩慈烏之反哺也然非炎火為之猛烹極煅則真鉛不能飛起此嚴父所以施教敇之令也玉芝書云鉛不得火則不飛汞不得鉛則不結蓋有細微之㫖豈可以容易言哉五行錯王相据以生火性銷金金伐木榮金生水木生火此常道之順五行也今以丹法言之則木與火為侣火反生木金與水合處水反生金故曰五行錯王相据以生也火性銷金者運南方離宫之火以煉北方水中之金也金伐木榮者運北方水中之金以制南方火中之木也三五為一天地至精可以口訣難以書傳三者水一火二合而成三也五者土也三五為一者水火土相與混融化為一氣也斯時也𤣥黄相雜清濁未分猶如天地渾沌之初少焉時至氣化無中生有則窈窈冥冥生恍惚恍恍惚惚結成團而天地之至精孕於其中矣屈突神和云若明三五一且作地行仙其妙須是口𫝊心授難以盡形之於毫楮也子當右轉午乃東旋夘酉界隔主客二名子當右轉者自西方轉於子位而虎向水中生也午乃東旋者自東方轉於午位而龍從火裏出也子午即南北也南北即水火也夘酉即東西也東西即金木也右轉左旋一伏一起則水火相交金木不間隔矣還元篇云輪玉兔與金雞道在人身人自迷滿目盡知調水火到頭幾箇識東西蓋東西之與夘酉皆金木之異名即非天地方位亦非人身左右然又不可吾身而索之他也嗟夫近來世上人多詐盡着布袍稱道者問他金木是何般噤口不言如害啞茍非遇師真指授則徒自臆度而已終亦莫能知也龍呼於虎虎吸龍精兩相飲食俱相貪併龍南方離龍也虎北方坎虎也作丹之時驅龍下呼於虎虎乃吞吸龍精一呼一吸兩相飲食於是併合為一指𤣥三十九章云若解相吞歸一處神仙頃刻不勞功其法至神聖極容易但恐學者不識龍虎為何物爾熒惑守西太白經天殺氣所臨何有不傾熒惑守西者火入金鄉也太白經天者金過南方午位而出現也作丹之時運神火照入金鄉金被火逼遂飛騰而起現於南方還金篇云沈歸海底去抱出日頭來是也金即真鉛也殺氣所臨何有不傾者真鉛飛上擒真汞真汞自出投真鉛元陽子大道歌云白虎自兹相見後流珠那肯不相從是也貍犬守鼠鳥雀畏鸇各得其性何敢有聲神入氣而為胎如貍犬之守鼠藥得火而成丹如鳥雀之畏鸇由其物𩔖相制一見則自然降伏此所以不敢作聲也不得其理難以妄言竭殫家産妻子飢貧自古及今好者億人訖不諧遇希有能成廣求名藥與道乖殊還金篇云不達隂陽祖徒勞更議𤣥况乎不得其理又安可以臆見妄言哉夫自古及今好者億人廣求名藥與江湖藝客往來盡費家財使兄弟妻子離散乃至終身訖不諧遇而舉世希有能成何也蓋其入門差錯而與道乖殊不遇明師而未燭厥理故也如審遭逢睹其端緒以𩔖相况揆物終始旁門小術其法繁難易遇而難成金丹大道其法簡易難遇而易成如審遭逢睹其端緒即物𩔖以相况揆物理之終始則天地之間形生氣化洪纎髙下有情無情頭頭是道皆可觸𩔖而長之也有如鶴鳴夜半雞唱五更其故何也蓋與天地之氣相應也他如寒蟬之吸風犀牛之望星老蚌之含月頑石之懐玉蝶翅之開闔螢熖之明滅貓睛之舒歛鹿尾之逆運龜之納息鼈之射影風袋之鼓風水滴之吸水磁石之引針琥珀之拾芥桔橰轆轤之運水菖蒲稻花之凝露蛇之入蟄魚之在水蜣蜋之轉丸蠮螉之呪子雞之抱卵兔之懐胎牛之有黄龍之有珠梅核之生仁甜𤓰之脫蔕與夫芭蕉春風之機梧桐秋雨之祕碧潭之夜月青山之暮雲無非金丹法象張紫陽謂煉金丹者須洞曉隂陽深達造化豈不信哉五行相克更為父母母含滋液父主稟與丹法之要莫大乎五行五行之妙無出於坎離坎為水金水合處而水中有金離為火水火為侣而火中有木是為四象加以坎納戊土離納己土是為五行悟真篇云震龍汞出自離鄉兌虎鉛生在坎方二物總因兒産母五行金要入中央又云離坎若還無戊巳雖含四象不成丹只縁彼此懐真土遂使金丹有返還其說明矣丹法以火煉金以金伐木火盛則水沃之水盛則土遏之是謂五行相克金生水水乃金之子而水中生金木生火火乃木之子而水中生木是謂更為父母父猶天也母猶地也天氣降而至於地地受之而成生育之功故曰母含滋液父主稟與赤龍大丹訣云妙在天交地功能返與還翠虚篇云父精母血結胎成尚自他形似我形身内認吾真父母方捉得五行精修煉之士能以自己之天交自己之地以自己之五行攅簇於其内則相吞相㗖却相親始覺無中有孕而結成聖胎也凝精流形金石不朽五形之精凝結於天地間或為金或為石歴千百載而不朽人能反身而求之以吾自己五行之精凝結成寳則將與天地相為無窮金石奚足多哉審專不泄得成正道專者謝絶人事一心修煉念兹在兹而用志不分也不泄者終日黙黙如雞抱卵神若出便收來常在腔子之内也審如此則功夫純粹藥材不至銷耗火力不至間斷道乃成矣昩者惑於下術乃謂手按尾閭閉其淫泆感合之物謂之不泄不思精雖不泄神氣蓋已去矣徒留其底滯撓敗之物積於腰間以成竒僻之疾何其昧也如此楞嚴經云若不斷淫修禪定者如烝沙石欲其成飯經百千刼只名熱沙况此金丹大道以性命兼修宜如何耶翠虚篇云若欲延年救老殘斷除淫慾行旁門果將留形永住世除非運火煉神丹學者其審思之立竿見影呼谷𫝊響豈不靈哉天地至象立竿而影見呼谷而響𫝊盖未有感而不應者也乃若日月懸象於當天取火則火生取水則水至感應如此其速豈不至靈也哉然天下莫不見而莫能知也翠虚篇云日烏月兔兩輪圓根在先天採取難月夜望中能採取天魂地魄結靈丹學者誠能盜天地之機於日月相望之夜以自己日月交光於中央則内真外應丹自來而和他日月被烹煎矣若以野葛一寸巴豆一兩入喉輒僵不得俯仰當此之時雖周文揲蓍孔子占象扁鵲操鍼巫咸扣鼓安能令蘇復起馳走野葛巴豆草藥中之至毒者也若以野葛㗖至一寸巴豆服至一兩即時僵仆雖周文孔子為之揲蓍占象扁鵲巫咸為之操鍼扣鼔亦不能使之復蘇矣然而今人但信毒藥入口能使人速死而不信靈丹入口能使人長生是何不思之甚與河上姹女靈而最神見火則飛不見埃塵鬼隱龍匿莫知所存將欲制之黄芽為根真汞産於離離為女居午以分野言之午為三河故稱河上姹女究其所從來蓋由虚心凝神而得之實自心中出是以謂之靈汞又謂之神汞其性猛烈見火則飛走無蹤猶如鬼隱龍匿莫知所存非用黄芽為根何以制之黄芽即真鉛也汞得真鉛擒制交結然後不能飛走此所以用之為金丹之根也物無隂陽違天背原牝雞自卵其雛不全夫何故乎配合未連三五不交剛柔離分一隂一陽謂之道偏隂偏陽謂之疾譬之牝雞不牡而自卵則其無雛必矣何者獨陽不生獨隂不成也悟真篇云莫把孤隂為有陽獨修一物轉羸尫勞形按引已非道煉氣餐霞更是狂舉世謾求金汞伏何時得見虎龍降勸君窮取生身處返本還源是藥王人能光返照以吾自己隂陽交媾於内則剛柔配合三五歸一何必他求還元篇云自家燮理内隂陽玉芝書云隂陽非採他人物還丹篇云隂陽須採自家真豈可外吾身而求之他哉翠虚篇云寧可求師安樂法不可積涵採精血古云天地悉皆歸須學無為清静訣蓋金丹者清静無為之道也或者溺於邪僻之說以為金丹必用婦人惑之甚矣施化之道天地自然猶火動而炎上水流而潤下非有師導使其然者資始統政不可復改天地之施化水火之炎潤此豈人力使之乃自然而然爾吾身自有天地自有水火其施化炎潤亦豈人力使之皆不過自然而然爾指𤣥篇云必知會合東西路切在沖和上下田蓋人之一身法天象地首即天也腹即地也但潜神内守而勿忘勿助調匀鼻息而勿縱勿拘自然一闔一闢一稟一受與天地施化之道無異若夫時至氣化機動鳴則火從臍下發水向頂中生其妙自有不期然而然者初不在勞神用力而後得也是道也乃天造地設一定而不可易者也魏公恐學者不明身中之隂陽上下遂以天地之施化水火之炎潤為喻可謂詳且明矣觀夫雌雄交媾之時剛柔相結而不可解得其節符非有工巧以制御之全真集云氣調神定呼交媾翠虚篇云譬如夫婦交媾時一㸃精血結成嬰蓋金丹之所謂交媾乃隂陽内感神氣交結曰雌雄曰夫婦皆譬喻也還源篇云神氣歸根處身心復命時這般真孔竅料得少人知當其神入氣中氣與神合得其節符真有剛柔相結而不可解之狀又豈有工巧以制御之但見其然而然吾亦不知其所以然而然妙哉妙哉若男生而伏女偃其軀稟乎胞胎受氣之初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交媾定制始先儲華谷袪疑說云闢氣為男闔氣為女一闔一闢男女攸分李玉谿註心印經云男女稟受同也但感合先後而分隂陽爾蓋陽氣聚面故男子面重生時必伏隂氣聚背故女子背重生時必仰豈獨生時為然其死也亦然故男子溺死必伏女子溺死必仰走獸溺死伏仰皆然此豈父母教其若是蓋於受氣之初一闢一闔一先一後已定之也今魏公講明清静之道乃及於男女之伏仰何也曰無他欲學者洞明吾身之隂陽上下而知造化自然之理而已坎男為月離女為日日以施徳月以舒光日改月化體不虧傷陽失其契隂侵其明晦朔薄蝕掩冐相包陽消其形隂凌生災乾之中爻交於坤而成坎於是坎為中男坤之中爻交於乾而成離於是離為中女然則離本乾體其中爻乃坤畫陽中有隂故有日之象坎本坤體其中爻乃乾畫隂中有陽故有月之象悟真篇云離居日位反為女坎配蟾宫却是男不會箇中顛倒意休將管見事髙談此蓋身中之隂陽顛倒學者誠未可以淺見窺也夫日以施徳夫道也月以舒光婦道也今以月為坎男則是婦為男矣以日為離女則是夫為女矣此其為顛倒也而所以日改月化體不虧傷者由隂陽之相資也夫日月之食數之交也日望月則月食月掩日則日食是故日食於朔月食於望然而有食有不食者交則食不交則不食也今魏公舉日月二者比喻丹道而拳拳於晦朔薄蝕其意蓋有在矣學者得不囘光返照尋吾身中之日月求吾身中之晦朔哉上清集云因看斗柄運周天頓悟神仙妙訣一㸃真陽生坎位㸃却離宫之缺自古乾坤這些離坎日日無休歇今年冬至梅花依舊凝雪先聖此日閉關不通來往皆為羣生設物物總含生育意正在子初亥末造物無聲水中起火妙在虚危穴如今識破金烏飛入蟾窟如此直指天機顯陳道要益足證魏公之言昭昭乎不我欺也男女相須含吐以滋雌雄錯雜以𩔖相求男女雌雄皆吾身中隂陽二物也二物氣𩔖相得自然一吐一含交結成胎上清集云自家身裏有夫妻說向時人須笑殺是道也學者當以清静無為求之不可以邪見喻也金化為水水性周章火化為土水不得行金生於坎宫氣而已矣蓋金化為水也因太陽真火伏烝於其下遂鎔化為水水性周章沛然孰能禦之然火勢既極則又化而為土火化為土則土尅水水見土則止故不得行也故男動外施女静内藏溢度過節為女所拘魄以鈐魂不得淫奢入藥鏡云水能流火能燄在身中自可驗是故調和鉛汞要成丹不可溢度過節今夫坎男動而施於外離女静而藏於内一或溢度過節則離女從而拘鈐之庻幾魂魄相制而不致乎淫奢也不寒不暑進退合時各得其和俱吐證符採藥時調火功不得疾不得緩但欲其和平而交媾爾復命篇云剛柔相會氣均匀妙在無傷兌震大要以和為貴也丹砂木精得金乃并元陽子大道歌云欲識丹砂是木精移來西位與金并盖汞性飛走最難降伏惟投入於鉛爐之内與鉛相合然後不飛不走也金水合處木火為侣四者渾沌列為龍虎龍陽數竒虎隂數耦天一生水位居北其象為𤣥武地二生火位居南其象為朱雀天三生木位居東其象為青龍地四生金位居西其象為白虎四者各居一方各為一象本不相渉也今曰金水合處木火為侣者陽龍元自離宫出隂虎還從坎位生也夫既各為一象則當舉四象而並稱之今乃不言朱雀𤣥武而獨以龍虎言之者南北為經東西為緯也夫所謂金水合處者以西四白虎之金降入水中也木火為侣者以東三青龍之木升入火中也此所以金不在西而與水合處於北木不在東而與火為侣於南白虎變為黑虎青龍化為赤龍也蓋金水木火之四者聚而為一則渾渾沌沌如太極之未分列而為二則震龍汞出自離鄉兌虎鉛生在坎方張紫陽深得其㫖遂一言以蔽之曰四象不離二體後之學者不知四象果為何物或以眼耳鼻舌為四象或以肝肺為龍虎體認既差源流益别又安識四象不離二體之妙哉肝青為父肺白為母心赤為女脾黄為祖腎黑為子子五行始三物一家都歸戊巳翠虚篇云肝心脾肺腎腸膽盡是空屋舊藩籬唾涕精津氣血液只可接助為階梯謂金丹乃無中生有之妙道非有形有質之物所可為也今魏公乃以五臟言何也曰非用五臟也特借五臟以比喻五行爾蓋肝青肺白言金木也心赤腎黑言水火也金生水木生火故以肝肺為父母心腎為子女而金木二者又從土中生故以脾為祖也夫既腎為子矣而以為五行之始何也曰腎屬水水數一一日之氣起於子生於腎然後傳及肝心脾肺也然而肝心脾肺腎之五者不名為五臟而名為三物又何也曰金水合處木火為侣與中央戊巳之土合而成三也蓋四象五行全藉土若無戊巳不成丹此其所以三物一家都歸戊巳也剛柔迭興更歴分部龍西虎東建緯夘酉刑徳並會相見歡喜刑主殺伏徳主生起二月榆死魁臨於夘八月麥生天罡據酉子南午北互為綱紀剛柔迭興者二氣相資運轉也更歴分部者周流經歴諸辰也龍西虎東建緯夘酉刑徳並會相見歡喜者象緯一動而夘酉相加金木不間隔也刑主殺伏者沈歸海底如秋氣肅殺歛萬物以入也徳主生起者般上南溟如春氣發生暢萬物以出也二月榆死魁臨於夘者二月建夘而月將為河魁河魁屬戌而戌中有辛榆死於此月由辛金之殺氣臨於夘也八月麥生天罡據酉者八月建酉而月將為天罡天罡屬辰而辰中有乙麥生於此月由乙木之生氣據於酉也子南午北互為綱紀者日行西陸謂之春而二月夘時西陸在東北陸在南日行東陸謂之秋而八月酉時東陸在西南陸在北也蓋南北為天地之經東西為天地之緯鼎中魁罡一轉則龍走西而虎走東子在南而午在北與二八月夘酉之造化無異故悟真篇謂兔雞之月及其時刑徳臨門藥象之也象也者像此者也魏公設此象以示人其理儘自明白奈何執文泥象者往往只就紙上搜索更不去身中尋思於是迷迷相引而無有出期殊不知魏公所謂龍西虎東子南午北即吾身之天地反覆也若能曉悟吾身天地反覆之妙則東西之所以建緯南北之所以互為綱紀皆可黙會其機矣又何用區區向外尋也哉一九之數終而復始一九之數即戴九履一之數也終而復始者自一而九自九而一往來上下周流不息也含元虚危播精於子含元虚危者日到虚危夜夜同而元氣肧胎於此也播精於子者子時氣到尾閭關而真精至此而生也金丹之妙含元於先天播精於後天何謂先天寂然不動窈窈㝠㝠太極未判之時是也何謂後天感而遂通恍恍惚惚太極已判之時是也先天惟一氣爾後天然後化為真精也翠虚篇云半斤真汞半斤鉛産在虚無太極先須趂子時當採取煉成金液入丹田其說是已蓋所謂虚危者亥子之間隂極陽生之時也子時者一陽動處是也過此以往則有一子母分胎路妙在尾箕牛斗女非洞曉吾身之隂陽深達天地之造化疇克知此哉關關睢鳩在河之洲窈窕淑女君子好逑雄不獨處雌不孤居𤣥武龜蛇蟠虯相扶以明牝牡竟當相須假使二女共室顔色甚姝令蘇秦通言張儀結媒發辯利舌奮舒美辭推心調諧合為夫妻弊髮腐齒終不相知若藥物非種名𩔖不同分劑參差失其紀綱雖黄帝臨爐太乙執火八公擣煉淮南調合立宇崇壇玉為階陛麟脯鳳腊把籍長跪禱祝神祇請哀諸鬼沐浴齋戒妄有所冀亦猶和膠補釡以硇塗瘡去冷加氷除熱用湯飛龜舞蛇愈見乖張金丹大道一隂一陽而已參之人事物理莫不皆然今魏公取關睢淑女配君子之義以喻身中男女之相匹又取𤣥武龜蛇蟠虯之義以喻身中牝牡之相須可謂廣譬曲喻纎悉不遺矣且如兌女艮男上下感應以相與則謂之咸離兌二女同居其志不同行則謂之睽以明隂陽貴乎相得不可以一偏也乃若爐火煅煉之事亦必隂陽兩齊儻藥物非其種𩔖分兩失其紀綱雖黄帝臨爐太乙執火八公淮南擣煉調合金玉以為壇陛麟鳳以為脯腊齋戒沐浴把籍長跪陳青詞拜朱章禱爾於上下神祇吾見其廢時亂日勞而無功猶如和膠泥以補破釡以硇砂而塗惡瘡與夫去冷而加氷除熱而用湯飛龜舞蛇愈見乖張矣或疑雄不獨處雌不孤居之說謂修丹不用婦人則為寡陽遂妄引此章以證其邪僻之謬論而反笑正道之迂闊多見其不知量也周易參同契發揮卷中
