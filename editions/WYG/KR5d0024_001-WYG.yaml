body:
  text: 周易參同契發揮卷上宋俞琰撰上篇乾坤者易之門户衆卦之父母闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通此乾坤所以為易之門户也乾生三男坤生三女男女構精萬物化生此乾坤所以為衆卦之父母也夫人之一身法天象地與天地同一隂陽也人知此身與天地同一隂陽則可與論還丹之道矣坎離匡郭運轂正軸坎月也離日也日月行於黄道晝夜往來循環無窮如匡郭之周遭也轂猶身也軸猶心也欲轂之運必正其軸修還丹者運吾身中之日月以與天地造化同途不正其心可乎牝牡四卦以為橐籥覆冒隂陽之道猶御者之執銜轡有凖繩正䂓矩随軌轍處中以制外數在律厯紀月節有五六經緯奉日使兼并為六十剛柔有表裏朔旦屯直事至暮䝉當受晝夜各一卦用之依次序既未至昧爽終則復更始乾純陽牡卦也坤純隂牝卦也坎隂中有陽離陽中有隂牝牡相交之卦也丹法位乾坤於上下列坎離於東西而乾坤之闔闢坎離之往來儼如橐籥之狀故曰牝牡四卦以為橐籥橐籥者虛器也橐即鞴囊籥其管也老子道徳經云天地之間其猶橐籥乎虚而不詘動而愈出盖太虛寥廓猶橐籥之體氣之闔闢往來猶橐籥之用知此則還丹之道思過半矣然是道也操則存舍則亡故必慎汝内閑汝外有如列子冲虛至徳真經所謂泰豆氏之御然後可以從事於此盖泰豆氏之御也齊輯乎轡衘之際而急緩乎唇吻之和正度乎胷臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進退履繩而旋曲中規矩煉丹之法亦猶是也數在律厯紀者廵行十二位應律之十二聲厯之十二月紀之十二年也月節有五六者以一月三十日分為六節也經乾坤南北之定位也緯坎離東西之妙用也奉日使者奉日之所使也其候與天同運随日升沉無少異也兼并為六十者易有六十四卦除乾坤坎離四卦之外恰有六十卦一日十二時用兩卦直事每一爻當一時兩卦計十二爻應律厯紀之數以一月三十日并之共得六十卦也以六十卦布於一月三十日内則朔日朝為屯暮為䝉晝夜十二時恰應兩卦十二爻之數自此朝需暮訟朝師暮比依次而用以至晦日用既濟未濟晦朔循環周而復始其間卦象内外剛柔之體或反或對皆不必執泥也張紫陽悟真篇云此中得意休求象若究羣爻謾役情盖非真以六十卦布於一月三十日之内也或者不悟此理惟執泥卦象之説乃謂日用兩時為火候從而凖則銖爻推測氣候汲汲焉日視土圭夜瞻刻漏豈不大謬哉日辰為期度動靜有早晚陳泥九翠虛篇云天上分明十二形人皆分作煉丹程即日辰為期度之謂也日即火也辰即候也人能以天上之日辰反而求之吾身則日臨之位即時辰也悟真篇云煉藥須知昏曉即動靜有早晚之謂也動者日出而作也靜者日入而息也盖吾一身之中自有日出日入之早晚其火候動靜一一暗合天度莫非用天樞潮候而為下功之時也春夏據内體從子到辰巳秋冬當外用自午訖戌亥卦有六爻下三爻為内上三爻為外試即屯䝉二卦明之朝用屯陽火上升之候也而屯之初九正當身中之子由内而外故曰春夏據内體從子到辰巳暮用䝉隂符下降之候也而䝉之上九正當身中之午由外而内故曰秋冬當外用自午訖戌亥然所謂春夏秋冬子午巳亥與夫内體外用之説皆譬喻也乃若泥象執文而行卦氣則徒自把乾坤為鼎器次摶烏兎藥來烹此豈謂身外之乾坤身外之烏兎哉學者當求之於身中可也今夫天位乎上地位乎下二氣則運行乎其中一升一降往來不窮猶橐籥也人受沖和之氣生於天地間與天地初無二體若能悟天地橐籥之妙此心沖虚湛寂自然一氣周流於上下開則氣出闔則氣入氣出則如地氣之上升氣入則如天氣之下降自可與天地齊其長乆子華子云古之知道者築壘以防邪䟽源以毓真深居靜處不為物攖動息出入而與神氣俱䰟魄守戒謹窒其兊専一不分真氣乃存上下灌注氣乃流通如水之流如日月之行而不休隂營其藏陽固其府源流泏泏滿而不溢沖而不盈夫是之謂乆生捨此而曰我自有登雲捷法則是旁蹊曲學非吾大丹之道也天地者乾坤之象也設位者列隂陽配合之位也易謂坎離坎離者乾坤二用二用无爻位周流行六虛往來既不定上下亦无常乾為天坤為地吾身之鼎器也離為日坎為月吾身之藥物也先天八卦乾南坤北離東坎西南北列天地配合之位東西分日月出入之門反而求之吾身其致一也乾坤其體也坎離其用也坎離二者周流升降於六虚往來上下盖無爻位吾身之坎離運行乎鼎器之内潛天而天潛地而地亦豈有爻位哉幽潛淪匿變化於中幽濳淪匿者神入氣中氣入臍中而沉歸海底去也變化於中者時至氣自化靜極機自發而抱出日頭來也陳希夷指𤣥篇云邈無踪跡歸𤣥武濳有機闗結聖胎此之謂也包裹萬物為道紀綱悟真篇云道自虚無生一氣便從一氣産隂陽隂陽再合生三體三體重生萬物張盖金丹之母不過先天一氣而已裂而為二分而為三散而為萬皆自此一氣中來故曰包裹萬物為道紀綱以無制有器用者空道徳經云三十輻共一轂當其无有車之用埏埴以為器當其无有器之用鑿户牖以為室當其无有室之用故有之以為利无之以為用林鬳齋註云轂車之容軸者也輻輪之股也轂惟虚中故可以行車埏埴陶者之器也虚而圓故可以成器户牖室中之通明處也此三者皆是譬喻虚者之為用故曰有之以為利無之以為用車器室皆寔有之利也而其所以為車為器為室皆虚中之用今魏公謂以無制有器用者空實用老子之說盖丹法以太虚為鼎爐而太虚之中自有天然妙用竒哉竒哉闗尹子云衣揺空得風氣噓物得水陳抱一註云知揺空得風則鼓吾橐籥可以生氣知噓物得水則胎吾之氣可以化精茍昧此而他求所謂鼎器則非虚無之道矣故推消息坎離沒亡息者進火之候坤三變而成乾也消者退符之候乾三變而成坤也今自朔旦震卦用事之後歴兊至乾望罷巽卦用事之後歴艮至坤其間不見坎離爻位是謂坎離沒亡歟曰坎離非沒亡也行乎六虚之間而往来不定爾言不茍造論不虚生引驗見效挍度神明推𩔖結字原理為徵坎戊月精離巳日光日月為易剛柔相當土王四季羅絡始終青赤白黒各居一方皆禀中宫戊巳之功坎外隂而内陽月之象也離外陽而内隂日之象也坎納戊戊陽土也離納己巳隂土也二土交合則隂陽相濟剛柔相當猶日月兩字合之而輳成易字也青赤白黒即木火金水也木火金水各居一方惟土居中央分旺辰戌丑未而羅絡一嵗之始終是故木得之以旺火得之以息金得之以生水得之以止四者皆禀其功也然是土也遍滿乎宇内本無定位焉在坎則為戊土在離則為己土在中宫則為戊己土在四季則為辰戌丑未土均是物也㫖哉悟真篇之詩有曰四象五行全藉土又曰只縁彼此懷真土遂使金丹有返還盖非真土調和則隂陽否隔剛柔離分不能成丹也嗚呼魏公作是書以發明斯道之祕無非引驗見效親到實詣之說復恐其說未足以取信於後人遂又挍度日月之神明以為法推原易卦之道理以為證可謂深切而著明矣又豈肯茍造無稽之言虚生無益之論以誑惑後之来者哉易者象也懸象著明莫大乎日月窮神以知化陽往則隂来輻輳而輪轉出入更卷舒易者象也即上文所謂日月為易是也夫魏公之為是說也將以指陳身中之隂陽而身中之隂陽則無形可求百姓日用而不知茍非假象托物將何以發明而使人窮其神知其化哉於是仰觀俯察乎天地之間惟有日月之象顯然著明故以其顯然著明者示人使之洞見天地之隂陽而黙識乎神化之妙則吾身之日用不知者自可以不言而喻也盖日月往来乎黄道之上一出一入迭為上下互為卷舒晝夜循環猶如車輪之運轉無有窮己人能反身而思之觸𩔖而長之則吾一身之中自有日月與天地亦無異矣韓逍遥内指通𤣥秘訣云法輪要轉常須轉只在身中人不見駕動之時似日輪日輪向我身中轉又云法輪轉得莫停留念念不離輪自轉何用外求哉易有三百八十四爻據爻摘符符謂六十四卦一部全易計三百八十四爻一斤大藥計三百八十四銖此丹道易道之相通而參同契所以作也爻者卦畫也符者卦之合體也易有六十四卦丹法以乾坤為鼎器以坎離為藥物以其餘六十卦為火候今以乾坤觀之始於屯䝉終於既濟未濟其間反體對體無一不相合於此見一隂一陽之謂道而古仙據爻摘符以比喻鼎器藥物火候可謂巧且備矣晦至朔旦震来受符當斯之時天地構其精日月相撢持晦至朔旦者晦朔之間也震来受符者乾交於坤而成震身中之一陽生也斯時神與氣交氣與神合有如天地之構精日月之合璧故曰當斯之時天地構其精日月相撢持天地即吾身之乾坤也日月即吾身之坎離也天地日月以時而相交故能陶萬彚而成嵗功乾坤坎離以時而相交故能奪造化而成聖胎魏公學者不明身中之隂陽造化遂借日月相交之時為喻非曰一月止有晦朔之間可以用功也悟真篇云日月三旬一遇逢以時易日法神功學者能知以時易日之妙則能天地之機而成大丹矣雄陽播𤣥施雌隂統黄化雄陽播𤣥施者天氣降而至於地也雌隂統黄化者地承天氣而生物也悟真篇云甘露降須天地合黄芽生要坎離交盖丹法之生藥與天地之生物相似皆不過隂陽二氣一施一化而𤣥黄相交爾渾沌相交接權輿樹根基隂陽二氣上下交接混而為一故謂之渾沌渾沌乃天地之郛郭萬物之胞胎也丹法以之為權輿而樹立根基則天地萬物皆在吾身而不用求之外矣經營養鄞鄂凝神以成軀鄞鄂即根蔕也丹法經營於此而囘光内照則神戀氣而凝氣戀神而住自然交結成胎如其神光内泄氣馬外馳則日月失道金汞異爐欲望成丹不亦逺乎白紫清珠玉葉丹髄歌云昔日遇師親口訣只要凝神入氣穴此所以稱之為神丹而號之曰神仙也衆夫蹈以出蝡動莫不由隂陽交接之道乃生生化化之源也不特人與禽獸由此而出雖蠉飛蝡動跂行喙息至微之𩔖莫不皆然故曰衆夫蹈以出蝡動莫不由是道也施之於人則生人存之於己則生藥但有聖凡逆順之分爾於是仲尼讚鴻濛乾坤徳洞虚稽古稱元皇闗雎建始初冠婚氣相紐元年乃芽滋嘗觀易首乾坤書稱稽古詩以闗雎為先禮以冠婚為重春秋以元年為第一義是知聖人之作經皆有所託始也煉丹而不究其始又安能洞曉隂陽深達造化哉聖人不虚生上觀顯天符天符有進退詘信以應時符者合也月行於天一月一度與日交合故謂之天符天符有進退屈信以應時者月自初一以後光漸進魂長魄消陽伸隂屈象一日之子至己十六以後光漸退魄長魂消隂伸陽屈象一日之午至亥也古之至人觀天之道執天之行遂借天符之進退隂陽之屈伸設為火候法象以示人蓋天地儼如一鼎器日月乃藥物也日月行乎天地間往來出沒即火候也人能即此反求諸身自可黙㑹火候進退之妙矣故易統天心復卦建始初易者一隂一陽之謂也天心北方子之中也復十一月之卦也復之為卦正當北方子位之中氣應冬至邵康節擊壤集冬至吟云冬至子之半天心無改移是也朱晦庵以為康節此詩最好蓋立冬是十月初小雪是十月中大雪是十一月初冬至是十一月中小寒是十二月初大寒是十二月中冬至子之半即十一月之半也人言夜半子時為冬至盖夜半以前一半屬子時今推五行者多不知之然數每從這處起略不差移此所以為天心今魏公為易統天心復卦建始初者陽氣潛萌於孟冬純隂之月而始於坤卦之下積成一畫之陽然後變為復卦也人固知十月為坤至十一月則五隂之下變一陽畫而為復殊不知十一月冬至無縁平白便生一畫之陽遽變為復盖十月小雪坤下爻己有陽生其中但一日之内一月之間方長得三十分之一必積之一月至十一月冬至始滿一畫為復然此亦譬喻也年以冬至為復月以朔旦為復日以子時為復無非借以發明身中造化殆不必泥於年月日時也翠虚篇云一月三旬一日同修丹法象奪天功蓋年與月同月與日同日與時同於是蹙年成月蹙月成日蹙日成時一時之中自有一陽来復之機是機也不在冬至不在朔旦亦不在子時非深達天地隂陽莫知𤣥機如是其祕也長子繼父體因母立兆基乾父下交於坤母之初爻而成震震為長男故曰長子繼父體震自坤體而生猶嬰兒生於母腹中故曰因母立兆基悟真篇云金公本是東家子送在西鄰繼體生與此同㫖知此則知煉丹不用尋冬至身中自有一陽生而不泥乎年月日時之說矣消息應鍾律升降據斗樞自子至巳為息自午至亥為消消息應鐘律者鐘律於一嵗十二月之内每月換一管一嵗換盡十二律吾身火候之消息亦猶是也自下而上為升自上而下為降升降據斗樞者斗樞於一日十二時之内每時移一位一日移遍十二辰吾身火候之升降亦猶是也指𤣥篇云寥寥九地移鐘管黯黯長天運斗魁盖不過取象比喻而已即非用律管之短長天罡之所指而為期度也三日出為爽震受庚西方月三日哉生明昏在西方庚位其象如震應震卦之納庚若以吾身之火候言之則所謂河車不敢暫留停之時是也八日兊受丁上弦平如繩月至八日為上弦昏在南方丁位其象如兊應兊卦之納丁以喻吾身陽火上升之半也十五乾體就盛滿甲東方月至十五與日相望昏在東方甲位其象如乾應乾卦之納甲以喻吾身陽火盛滿之候也蟾蜍與兔魄日月無雙明蟾蜍者月之精兎魄者日之光日月無雙明者日以昱乎晝月以昱乎夜日出則月沒月出則日沒晝夜遞炤而出入更卷舒也人之呼吸何異於是哉豈不見黄庭經云出日入月呼吸存盖呼吸即日月也蟾蜍視卦節兎者吐生光丹法以上半月為陽屬震兊乾下半月為隂屬巽艮坤故曰蟾蜍視卦節月為太隂日為太陽陽主吐隂主納月本無光受日之光而白故曰兎者吐生光七八道己訖屈折低下降七八即十五也陽火自震而升至於十五純乾則巳滿上半月之候其勢極矣其道危矣盖不容不屈曲折旋而低降也陳朝元玉芝書云九重城裏龍車發十二樓前虎駕囘即此義也十六轉受統巽辛見平明月至十六日既生魄晨在西方辛位明乍虧其象如巽應巽卦之納辛以吾身火候言之則隂受陽禪峯囘路轉之時也艮直於丙南下弦二十三月至二十三日為下弦晨在南方丙位明半虧其象如艮應艮卦之納丙以喻吾身隂符下降之半也坤乙三十日東方䘮其明月至三十日為晦晨在東方乙位明盡䘮其象如坤應坤卦之納乙以喻吾身隂符窮盡之候也節盡相禪與繼體復生龍魏公以一月三十日分為六節自朔旦至五日為第一節屬震六日至十日為第二節屬兊十一日至十五日為第三節屬乾十六日至二十日為第四節屬巽二十一日至二十五日為第五節屬艮二十六日至三十日為第六節屬坤六節既盡則日月合朔之後陽又受隂之禪復變為震震為龍一陽動於二隂之下震也重淵之下有動物豈非龍乎壬癸配甲乙乾坤括始終乾納甲壬坤納乙癸故曰壬癸配甲乙十干始於甲乙終於壬癸故曰乾坤括始終盖納甲者火候之取象也火候之抽添與月之盈虧無異今以六卦布於一月則震象三日月出於庚兊象上弦月見於丁乾象望日月滿於甲巽象十六日月虧於辛艮象下弦月消於丙坤象晦日月沒於乙不過借此以論身中六卦火候之進退非真以為一月三十日也何以明之蓋參以厯法則晝夜有短長若晝短日沒於申則月合於申望於寅晝長日沒於戌則月合於戌望於辰十二月間三日之月未必盡見庚十五日之月未必盡見甲合朔有先後則上下弦未必盡在八日二十三日望晦未必盡在十五日三十日今魏公謂三日出為爽震受庚西方十六轉受統巽辛見平明盖指二八月晝夜均平之時姑以取象而已非真以月出庚之時進火月虧辛之時退符也學者但觀月體之盈虧反而求之吾身則身中一陽生即三日月生之震象也二陽長即八日月弦之兊象也三陽滿即十五日月圎之乾象也一隂生即十六日月虧之巽象也二隂長即二十三日月弦之艮象也三隂足即三十日月沒之坤象也豈可拘以月出沒之方位而律以卦體爻畫之數與夫厯家盈縮短長之法哉七八數十五九六亦相當四者合三十易象索滅藏七火數也八木數也合之得十五九金數也六水數也合之亦得十五四者合之共得三十應一月三十日之數三十數終則日月合璧易象索然而滅藏也復命篇云一月一還為一轉一年九轉九還同唯憑二卦推刑徳五六囘歸戊巳中五六即三十也象彼仲冬節草木皆摧傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩廣太𤣥無形容虚寂不可覩匡郭以消亡謬誤失事緒言還自敗傷丹法所謂冬至所謂晦朔之間皆比喻隂極陽生之時也以一月言之則如月晦之夜月光索然而滅藏以一年言之則如仲冬之節草木索然而摧盡其義一也易曰雷在地中復先王以至日閉闗商旅不行后不省方蓋安靜以養其動而仰順乎天道也然而天道甚浩廣真機在於頃刻之間太𤣥無形容妙處在於窈㝠之内故當日中冬至之時必先閉塞其兊澄心守黙使金汞同歸於爐中如日月合璧之時𨼆藏其匡郭沉淪於洞虚則神凝氣聚金液乃結儻或忘其緘黙任重樓浩浩而出則是自取其傷敗也别序斯四象以曉後生盲四象即七八九六也即上文所謂七八數十五九六亦相當是也以七八九六合之則為三十應一月三十日之數皆設象比喻也魏公學者不得其説以盲引盲妄認三十日之盈虚消息為一月火候故又别序此七八九六之四象以曉其未曉者庶有以顯夫一月三十日之數皆譬喻而非真以月之三日進火月之十六退符也有如子午夘酉子申寅戌春夏秋冬分至啓閉晝夜晨昏還返歸居皆此義也學者若知七八九六即一月三十日之數則其餘泛引曲喻皆可黙而識之矣何必執文泥象哉八卦布列曜運移不失中中者黄道也八方布以八卦周囘列以二十八宿乃日月往来之行路也悟真篇云既驅二物歸黄道争得靈丹不解生作丹之時但心猿奔逸於外爾茍能收視返聼凝神片時使二物歸於黄道而不失其中則氤氲交媾結成一滴露珠而飛落丹田中矣元精眇難覩推度效符徵元精生於窈𡨕眇不可覩道徳經云窈兮𡨕兮其中有精其精甚真其中有信蓋大丹之道與造化相符天信至則瓊鐘一扣玉洞雙開此其徵也古歌云始青之下月與日兩畔同升合為一非洞曉天地之隂陽深達吾身之造化豈可俄而度也居則觀其象凖擬其形容作丹之時當外立表漏以測天運之晷刻内修真一以驗本身之刻漏庶不失天地之機然神定氣和則内外符合神昏氣躁則時刻差互不可不定也立表以為範占候定吉凶大丹火候不用時辰何必立表占候哉所以立表占候者失天人合發之機也若不㑹𤣥機而自朝至暮從事於土圭刻漏以為火候則又謬之甚矣發號順節令勿失爻動時地雷震動巽門開龍向東潭踴躍来此身中一陽爻動之時也此時暖氣冲融心覺恍惚便堪進火勿可緩也珠玉集還源篇云萬籟風初起千山月乍圓急須行政令便可運周天此之謂也指𤣥篇云䃱磹光中扶赤子鼓鼙聲裏用將軍亦此之謂也上察河圖文下序地形流中稽於人心參合考三才施栖真三住銘序云與日月而周囘同天河而輪轉輪轉無窮夀命無極謂大丹之道與天道相參合也施栖真靜中吟云妙用如江河周流無窮已長養𤣥谷芝灌溉瑶池水謂大丹之道與地道相參合也夫大丹之道所以與天地相參合者何哉皆在乎此心黙為之運用也古之修丹者仰以觀於天文俯以察於地理中以稽於人心於是虛吾心運吾神回天闗轉地軸上應河漢之昭囘下應海潮之升降天地雖大造化雖妙而其日月星辰之著明五行八卦之環列皆為吾掇入於一身之中或為吾之鼎爐或為吾之藥物或為吾之火候反身而觀三才皆備於我盖未嘗外吾身而求之他也擊壤集觀易吟云一物其来有一身一身還有一乾坤能知萬物備於我肯把三才别立根天向一中分造化人於心上起經綸天人安有兩般義道不虚行只在人淵乎其有㫖哉動則依卦變靜則循彖辭道徳經云致虚極守靜篤萬物並作吾以觀其復夫物芸芸各復歸其根歸根曰靜靜曰復命至矣哉此萬物之所以復命也吾身之金丹大藥其胚胎於至靜之中而産於隂極之時乎易曰至哉坤元萬物資生乃順承天坤厚載物徳合无疆葢坤為地純隂之卦也地能翕受天氣故百昌皆産於土丹法含光返照之時潜神於内與純隂之月閉塞成冬略無少異復命篇云受得真仙訣隂中煉至陽盖謂此也然靜極必有動以繼之頃之一陽動於六隂之下一變而為復再變為臨三變為泰四變為大壯五變為夬至六變為純乾則陽氣周遍於六虚而現出深潭日一輪矣乾坤周施行天地然後治乾坤之用坎離是也天地得坎離運用於其間所以隂陽交泰而和氣致祥天地一日而非坎離則造化或幾乎熄矣大丹妙用法乾坤安有異於乾坤者哉可不慎乎御政之首一陽纔動作丹時猶人君御政之首也發號施令可不慎乎管括微宻闓舒布寳管括微宻者眼含其光耳凝其韻鼻調其息舌緘其氣疊足端坐潜神内守不可一毫外用其心也葢眼既不視䰟自歸肝耳既不聼精自歸腎舌既不聲神自歸心鼻既不香魄自歸肺四肢既不動意自歸脾然後䰟在肝而不從眼漏魄在肺而不從鼻漏神在心而不從口漏精在腎而不從耳漏意在脾而不從四肢孔竅漏五者皆無漏矣則精神魂魄意相與混融化為一氣而聚於丹田也迨夫一息換鼻吾心恍然則龍虎衝闗大路開而一渠流轉入瓊漿矣要道魁杓統化綱紐丹道之要全在乎斗斗者所以幹運一身之隂陽統攝一身之萬化猶網之有綱衣之有紐也葢人身三田分於三處若得斗柄之機幹運則真氣上下循環如天河之流轉此之謂要道也若夫復命篇云驅囘北斗轉天罡手握南辰入洞房是又要之又要者也爻象内動吉凶外起悟真篇云受氣之初容易得抽添運用切防危葢一陽生於身内是謂受氣之初得之固易然於此時下手則吉凶悔吝生乎動不可毫髪差殊也五緯錯順應時感動四七乖戾誃離仰俯五行要攅簇金火要同爐亦在人一念間返本還源爾否則鼎中列宿皆差違而天地懸隔矣文昌統録詰責台輔百官有司各典所部史記天官書云斗魁戴匡六星曰文昌宫今曰文昌統録者絳宫天子統坤乾也人身之中安有所謂文昌者哉無非譬喻也天有三台四輔丹有三龍四虎詰責台輔者甲乙無令失庚辛莫要差也天有衆星分野丹有衆卦火符百官有司各典所部者按一年二十四氣列周天二十八宿而鼎爐火候宻推排也由是言之則天之萬象森羅皆在吾一身中矣日含五行精月受六律紀五六三十度度竟復更始日有十五剛而五柔月有十二管六管隂而六管陽以丹道言之日即火也日含五行精者一物含五彩也月即藥也月受六律紀者白金烹六卦也五六三十度度竟復更始者太陽一日行一度行至三十度則又與太隂交合周而復始未嘗暫停也原始要終存亡之緒始月朔也終月晦也存亡之緒者晦朔之間隂將盡而猶未盡陽將生而猶未生也然所謂晦朔乃譬喻爾非真謂三十日之終初一日之始也或君驕溢亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法刺譏詰過貽主君乃神也臣乃氣也作丹之時汞歸土釡身心寂不動葢身動則氣散心動則神散須是凝神聚氣心息相依然後靈胎可結不然則身中之弦望有盈縮而乖變凶咎矣推求其故葢由心君放肆而違道於是氣亦邪佞而行不順軌故曰執法刺譏詰過貽主辰極處正優游任下復命篇云北斗南辰下眉毛眼睫邊灰心行水火定息採真又云精氣元為本神靈共一家但能擒五賊自可結三花當其含光黙黙之時要在綿綿若存任其自然不可勞其神也明堂布政國無害道史記天官書云東宫蒼龍房心心為明堂在人身則洞房紫極靈門户是也黄庭經云明堂金匱紫房間上清真人當吾前黄裳子丹氣頻煩借問何在兩眉端於此垂光下照則人君猶坐明堂而布政而通道於九夷八蠻也復命篇云洞門常寂照蓬島鎮長春與此同㫖内以養己安靜虚無王重陽全真集云𤣥闗妙用不難窮只在無言靜黙中葢心安而虛道自来居虚極靜篤則元陽真氣自復也原本𨼆明内照形軀全真集云如通須是捜元有要見還應向内觀葢返本還源囘光内照乃修煉之大端先儒謂道家養生之法收視返觀如金水潛光於内誠哉是言也閉塞其兊築固靈株兊口也靈株坎宫也閉塞其兊則上不泄築固靈株則下不漏揚子太𤣥經云藏心於淵美厥靈根葢神不外馳則和氣充周美在其中也三光陸沉温養子珠三光洞房之靈象也人能撮聚三光返照於其内則中央正位産𤣥珠矣黄庭經云洞房靈象斗日月三光煥照入子室明眼之士請試思之視之不見近而易求金丹大藥只在目前豈不近耶奈何視之不見摶之不得雖近猶逺也若得法度求之則不過片餉功夫便有滿目黄華顯露夫何逺之有悟真篇云功夫容易藥非遥説破人須失笑笑也者笑其近而易求而人自索之於髙逺也復命篇云分明只在眼睛前自是時人不見夫惟其不見也於是舍内務外或採日精月華或煉金石草木或行房中之術正所謂道在邇而求諸逺事在易而求諸難悲夫黄中漸通理潤澤達肌膚丹田有物而一氣流通則和順積中而英華發外也初正則終脩立末可持表端則影直源深則流長得其一則萬事畢矣一者以掩蔽世人莫知之大道之祖不出一氣而成變化析而為黒白分而為青黄喻之曰日月名之曰龍虎有如許之紛紛是皆隂陽二字也其實即一物也人如神水華池之名爐土釡之號皆一處也或曰冬至子時或曰晦朔之間人不知以為一陽来復必在冬至子時日月合璧必在晦朔之間於是檢尋厯日輪刻搯時謬之甚矣抑孰知攅年蹙月攅月蹙日攅日蹙時而一時之中自有一年一月之造化哉然一時即一處也一處即一物也故凡冬夏二至春秋兩分夘酉甲庚晦朔弦望子午己亥子申寅戌二十四氣七十二候一年交合一月周回離坎之時兎雞之月巽乾之穴二八之門朝屯暮䝉晝姤夜復盡在此一中出翠虛篇云後来依舊去參人勘破多少野狐精箇箇不知真一處總是旁門不是真世之知此一者能有幾人哉上徳无為不以察求下徳為之其用不休道徳經云上徳无為而无以為下徳為之而有以為今曰上徳无為不以察求者神守於𤣥宫而黙黙無為也下徳為之其用不休者氣騰於牝府而綿綿不絶也葢借老子之説以發坎離兩宂之秘也上閉則稱有下閉則稱无无者以奉上上有神徳居此兩孔穴法有无亦相須上閉則稱有者離宫有象藏真水也下閉則稱無者坎户無形𨼆赤龍也無者以奉上上有神徳居者元神栖於本宫則氣皆随之而升上所以妙在八門牢鎖閉也悟真篇云長男乍飲西方酒少女初開北地花若使青蛾相見後一時闗鎖住黄家即上田元神所居之宫也此兩孔穴法有無亦相須者下不閉則火不聚上不閉則藥不升也悟真篇云送歸土釡牢封閉次入流珠厮配當故必相須而後可也何謂流珠土釡即坎離兩穴之異名也知白守黑神明自来白者金精黑者水基白者金也黑者水也丹法以水為基而金精生於水中所以知白者惟守其黑守黑則白自現也守之何如即如猫之守窟以待鼠至其身不動其目不瞬而此心惟鼠是務更無他念也神明者天機也如欲盜其機必先虚其心心虛則神凝神凝則息定息定則兩畔同升共一斤而神眀自来也離騷逺遊篇云無滑而䰟兮彼將自然壹氣孔神兮於中夜存虚以待之兮無為之先與此同㫖紫陽朱子註云葢廣成子告黄帝不過如此實神仙之要訣也水者道樞其數名一隂陽之始𤣥含黄芽五金之主北方河車故外黑内懷金華被褐懷玉外為狂夫水者道之樞隂陽之始也何者天一生水居五行之首也水一加以土五是為水之成數其𤣥含黄芽之象乎𤣥含黄芽者水中産鉛也鉛為五金之主在北方𤣥㝠之内得土而産黄芽黄芽即金華也金華乃之精英故體外黑而金華𨼆於其中猶至寳藏于褐夫之懷也北方河車即帝車也以其随天河而輪轉故稱河車今夫真生於水中得真火煅煉而出則河車不敢暫留停運入崑崙峯頂也金為水母母𨼆子胎水者金子子藏母胞金生水故曰金為水母水者金子水中有金故曰母𨼆子胎子藏母胞學者若知水中金之義則知産藥之川源矣真人至妙若有若無髣髴大淵乍沉乍浮真人元神也若有若無者綿綿若存用之不勤也髣髴大淵乍沉乍浮言真人往来於大淵㣲茫髣髴浮沉不定也蕭紫虛金丹大成集云崑崙山上黄華路時引元神去復還葢大淵即崑崙也進退分布各守境隅丹法自子而進自午而退進退分布各守境界不相涉入楊虚白金丹純粹吟云子午爐前分進退乾坤鼎内别浮沉是也採之𩔖白造之則朱白者白金也朱者朱汞也採之𩔖白者採北方坎宫之白金以為丹母而白金與朱汞乃同𩔖相從者也造之則朱者每日運火抽去鉛氣而添汞於其間也陳黙黙崇正篇云内守河車居北闕由来天一水為先合符須得周天火立義還同渡岸船般運有功連晝夜斡旋至妙體璣璇修丹上士如明此方識真不用學者徒知以汞交結為藥而不知抽添汞之火功則雖結丹頭不能免其不耗散也煉為表衛白裏貞居煉為表衛者真火運用於外爐也白裏貞居者金丹安處於内爐也内爐有丹須得外爐之火晝夜煉養然後成熟郝廣寧太古集云頂運驪珠光自現腹藏祕寳粲然安豈非火運於外而丹藏於内哉方圓徑寸混而相扶先天地生巍巍尊髙旁有垣闕狀似蓬壺環匝闗閉四通踟蹰守禦固宻閼絶姦邪曲閣相連以戒不虞方圎徑寸謂泥丸宫也今人但謂心為方寸殊不知人身三田其中皆虚一寸而氣脈皆相通也混而相扶謂頭有九宫而泥丸居其中黄庭經云泥丸九真皆有房方圎一寸處此中是也先天地生謂泥丸一穴乃一身萬竅之祖竅此竅開而衆竅齊開也巍巍尊髙謂泥丸宫在崑崙峯頂乃元神所居之位上應𤣥都是萬神會集之鄉也旁有垣闕者七竅旁羅於其外而洞房黄闕皆在其前也狀似蓬壺者猶海上有三神山而蓬莱居其上也環匝闗閉者收視返聽而謹窒其兊也四通踟蹰者元和内運一氣流通而朱雀遶瓊臺而翺翔也守禦固宻者如龍養珠心不忘如雞抱卵氣不絶也閼絶姦邪者任從魔境侵但自運斤斧也曲閣相連以戒不虞者神若出便收来而雙童長守洞門也可以无思難以愁勞譚長真水雲集云絲頭莫向靈臺掛内結神胎管得仙葢心無為則氣和氣和則至寳結矣心有為則氣亂氣亂則英華散矣是故可以无思不可以愁勞也神氣滿室莫之能留守之者昌失之者亡動静休息常與人俱真積力乆太和充溢動静休息常須謹守守之則昌失之則亡不可須㬰離也是非歴藏法内視有所思履斗步罡宿六甲次日辰隂道厭九一濁亂㺯元胞食氣鳴腸胃吐正吸外邪晝夜不卧寐晦朔未常休身體日疲倦恍惚狀若癡百脈鼎沸馳不得清澄居累土立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心歡而意悦自謂必延期遽以夭命死腐露其形骸舉措輙有違悖逆失樞機諸術甚衆多千條有萬餘前却違黄老曲折戾九都三千六百法養命數十家泯泯棼棼不可枚舉有如闔目内視歴五臟以存思履斗步岡按日辰而祭甲是謂金丹之道哉至若行隂者以九淺一深為火候而致元胞之攪亂食氣者以吐故納新為藥物而使腸胃之虚鳴坐頑空則苦自晝夜不眠打勤勞則不顧身體疲倦或揺頭撼腦提拳努力於是百脉沸馳而變出癰疽者有之或累土立壇朝祠暮祭於是夜夢鬼交而陷於妖魅者有之始焉此心喜悦自謂必可延期一旦中道夭亡不免形骸腐壞是皆操持悖謬明違黄帝之文舉措乖訛全失老君之㫖執迷不悟以至於此其獲戾也又誰之咎歟是故王良器作破迷歌陳泥丸作羅浮吟歴舉世間旁門諸術之謬滔滔二三千言葢後人不得正𫝊而錯行邪徑之失也今之學者更能以王陳二公之言過目一遍必當見其失而内自省矣明者省厥㫖曠然知所由魏公作此參同契一書粲然如昏衢之燭炤然如迷海之鍼葢欲使後之明者因言㑹意曠然洞達知所以修煉之由也魏公此心可謂仁矣或者乃視之為紙上語而更不著眼是誠自暴自棄豈不惜哉勤而行之夙夜不休丘長春鳴道集云不是朝昏坐行功扭揑成盖修煉九轉金液大丹與旁門小安樂法不同是必謝絶人事専心致志夜以繼日勤而行之乃能成功彭真一不云乎志士又須撤聲色去嗜慾棄名利投靈山絶常交結仙友𨼆宻潛修晝夜無怠方可希望或不如是則虚勞動爾真一此説厥亦明甚或者昧此惟欲日用兩時為火候聞吾晝夜不休之説則莫不驚笑以為不勝其勞且煩盖亦弗思甚矣翠虚篇云執著之人得不真朝行暮輟又非誠切不可輕信日用兩時為火候之説昔者皇甫履道見王三一置籌壺問曰安用曰欲知子午二正爾曰十二時中當無令間斷何止子午耶要之丹道與天道一也天道有一息不運乎天道無一息不運則丹道詎可有一息間斷哉馬丹陽漸悟集云師恩深重終難報誓死環墻煉至真環墻者所以絶人往來而専心修煉也服食三載輕舉逺遊跨火不焦入水不濡能存能亡長樂無憂道成徳就濳伏俟時太乙乃召移居中洲功滿上昇膺籙受圖修丹只是片餉功夫今曰服食三載何耶翠虛篇云片餉功夫修便現老成須是過三年葢片餉功夫只是結丹之時而所謂三載者乃一年入室之後更須温養不可遽然逺出也鍾離正陽指𤣥三十九章云孩兒幼小未成人須藉孃孃養育恩其説是己若過此三載以後則如煙雲行步如飛可以輕舉可以逺遊大浸稽天而我不溺大旱金石流土山焦而我不熱存亡在我而長樂無憂矣然温養事畢更當濳伏人間積功累徳以開度羣迷方可翩然而往是故闕靈根囑皇甫履道接引後學金華洞山戒楊虚白不得幽栖必功濟羣品乃仙去豈容獨善其身哉火記不虚作演易以明之古有火記六百篇何其多耶彭真一還丹金鑰匙云火記六百篇篇篇相似然則所謂六百篇者亦猶六十卦也葢火候之數小而言之則為六十卦演而伸之則為六百篇六十卦為一月之候而六百篇者十箇月之候也故曰火記不虚作演易以明之偃月作鼎爐白虎為熬樞汞日為流珠青龍與之俱舉東以合西䰟魄自相拘偃月爐鉛爐也其位在坎白虎居之流珠宫汞鼎也其位在離青龍居之白虎為熬樞者白虎𨼆丹田而火從臍下發也青龍與之俱者驅青龍下就於白虎也東西即坎離也䰟魄即日月也龍虎之出處與鉛汞之所産初無兩途王易𤣥赤龍大丹訣云若辨龍随虎兼知汞在鉛學者若知驅龍就虎之祕則知以汞投鉛之説矣復命篇云師指青龍汞配歸白虎鉛兩般俱㑹合水火煉經年又云龍虎一交相眷戀坎離纔媾便成胎溶溶一掬乾坤髄著意求他啜取来葢丹法至簡至易但舉東方青龍之䰟以合西方白虎之魄則東西既無間隔自然龍虎交媾而䰟魄相投産紫金也金碧龍虎經王保義註䟽云煉至藥不出水火水火既交則鼎内龍虎之氣便相和洽而成金液其説明矣作丹之時茍能虚心靜嘿凝神入於氣穴則東西配合金木交并南北混融水火既濟而四象五行㑹聚都在一方凝結又何勞用力哉上弦兊數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾銖有三百八十四亦應卦爻之數上弦之時兊卦用事月生一半之明故曰上弦兊數八下弦之時艮卦用事月生一半之魄故曰下弦艮亦八合兩弦而觀之則乾坤鼎器成立而藥物火候盡在其中矣二八應一斤易道正不傾者月有上下二弦上弦金半斤計一百九十二銖下弦水半斤計一百九十二銖總而計之共得三百八十四銖易有六十四卦卦有六爻陽爻一百九十二隂爻一百九十二總而計之共得三百八十四爻魏公借此以論丹道之妙不過取其隂陽兩齊而配合相當爾葢非真有所謂三百八十四銖真有所謂三百八十四爻也悟真篇云二八相當自合親陳素陽至道篇云我𨼆黙中調二八葢二八即是兩箇八兩輕重均平不偏不頗之義若使凖則銖爻而手持念珠數呼吸此乃自取辛苦豈至簡至易之道哉廼若復命篇云方以𩔖聚物羣分兩畔同升共一斤金丹大成集云二八門中達者稀弦前弦後正當時盖謂身中巽門非此上弦八兩下弦八兩之謂也金入於猛火色不奪精光自開闢以来日月不虧明金不失其重日月形如常金本從日生朔旦受日符金返歸其母月晦日相抱𨼆藏其匡郭沉淪於洞虚金復其故性威光鼎乃熺世間萬物入火皆壞惟真金不壞盖五行相生至金而極而金之為寳鎔之得水擊之得火其柔象木其色象土水火木土四性俱故真金經百煉而愈堅未嘗失其本體之重自開天闢地以来不知㡬千萬年而日月之形如常未嘗虧其明盖隂陽之精互藏其宅各得其所安故日月之形萬古不變且懸象著明莫大乎日月丹術著明莫大乎金火金即月也火即日也今人但知金為月之光而不知月之光本生於日也夫月為太隂本有質而無光其盈虧也以受日光之多少月之朔也始與日合越三日而明生八日而上弦其光半十五日而望其光滿既望而漸虧二十三日而下弦其虧半三十日而晦其光盡方其朔旦之初與日相離受日之光而生明其體漸白及其晦也則與日相包魄存而光泯其體盡變為黑今以丹道言之則金本從日生朔旦受日符者太隂真金生於坤宫本由太陽真火所化其受氣之初亦猶月受日光自朔旦而始也金返歸其母月晦日相包者金在坤宫與火相守亦猶月晦之夜日月相撢持也𨼆藏其匡郭沉淪於洞虚者神氣深入乎其根漸漸沉歸海底如月魄之不見也金復其故性威光鼎乃熺者月體本黑受日之光而白今焉與日相包而隠藏其匡郭則復其本體之黑矣但守其黑勿問其白守之之乆神明自來俄傾光芒透鼎火力熾盛則三日庚生兊户開黑銀炋出白銀来也子午數合三戊巳數稱五三五既和諧八石正綱紀子水一午火二子午之數合而成三土數五故中央戊巳稱五三與五併之則成八故云八石三五既和諧者水火土三者合為一也且土剋水水剋火豈和諧者今土為水火之媒在其間調停配合使水火結為夫婦所以和諧也八石正綱紀者水火土三者合為一則紀綱正萬目張矣呼吸相含育佇息為夫婦陽升隂降天地之呼吸也天地呼吸於其内是以長乆人能效天地呼吸於其内亦可與天地同其長乆金丹大成集云呼出心與肺吸入腎與肝呼則接天根吸則接地根呼則龍吟雲起吸則虎嘯風生呼吸風雲凝成金液兹盖一氣自然之呼吸非口鼻之呼吸也李長源混元寳章云只就真人呼吸處放教姹女往来飛人能虚心凝神囘光内照於真人呼吸處随其升降順其自然而存之少焉呼吸相含育兀然自佇則打成一片結為夫婦也何謂真人呼吸處廖蟾輝三乗内篇云前對臍輪後對腎中央有箇真金鼎即真人呼吸處也黄庭經云後有宻户前生門出日入月呼吸存人惟念不到此故呼吸亦不在此莊子南華真經云真人之息以踵衆人之息以喉盖在喉則近而短促其息淺淺接踵則長而綿延其息深深修煉至於其息深深則我命在我不為大冶陶鑄矣還源篇云心下腎上處肝西肺左中非腸非胃腑一氣自流通如此明明直指復何疑哉復何疑哉黄土金之父流珠水之母水以土為鬼土填水不起朱雀為火精執平調勝負水盛火消滅俱死歸厚土三姓既合㑹本性共宗祖土居中央故稱黄土土生金故曰黄土金之父流珠乃汞也以其走動不定故稱流珠流珠入於水中則結成真金金生水故曰流珠水之母土本生金金本生水今也土入於水中則水為土所制矣水為土所制則不能載金而升上故曰水以土為鬼土填水不起若得南方朱雀之火猛烹極煅之則火盛水沸其金随水而上騰矣盖朱雀乃南方火精執衡司夏今坎水方為土鬼制伏火能烹而沸之使之升上故曰朱雀為火精執平調勝負及夫水沸上騰入於南方離宫則離火反為坎水所剋火為水剋而消滅則水又不可太濫於是又以土剋水水得土則止故曰水盛火消滅俱死歸厚土水火遇土謂之三性三性既已㑹合則混而為一俱歸於坤宫故曰三性既合㑹本性共宗祖也巨勝尚延年還丹可入口金性不敗朽故為萬物寳術士服食之壽命得長乆巨勝胡麻也服之尚能延年金液九轉大還丹乃金精壯盛之時竊取天地正氣以結成聖胎豈不能長生歟又况金性堅剛經萬年而不朽故為萬物中之至寳宜乎神仙以此為重所以不曰水火木土之丹而獨名之曰金丹也土遊於四季守界定規矩土無定位周流於辰戌丑未之間在辰為季春在未為季夏在戌為季秋在丑為季冬春夏秋冬皆是土遊之地故曰土遊於四季土能竭水藏火守於水則水不流守於火則火不燄今以之守於坤而採藥守於乾而運火故曰守界定規矩金砂入五内霧散若風雨金砂之升鼎也穿兩腎導夾脊過心經入髄海衝肺腧度肝歴脾復還於丹田當其升時滃然如雲霧之四塞䬃然如風雨之暴至恍然如晝夢之初覺涣然如沈疴之脱體精神𡨕合如夫婦之交接骨肉融和如澡浴之方起是皆真景象也非譬喻也復命篇云不知將謂氣得後自然真盖非親歴則莫能知之熏烝達四肢顔色恱澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰真人得丹之後晝夜温養無令間斷則真氣熏烝達於四肢自然神清氣爽顔色恱澤髮白返黑齒落更生老翁復為壯夫耆嫗又成姹女自此改形度世跳出樊籠號為真人焉抑嘗論之人與天地並立為三才則與天地相為終始可也今焉天地無終窮而人之生年不滿百何耶盖人在天地間不過天地間一物耳以其靈於物故特謂之人豈能與天地並哉若夫竊天地之機以修成金液大丹則與天地相為終始乃謂之真人既為真人則超凡入聖無復向来之形矣逍遥物外永謝塵世之厄矣胡粉投火中色壞還為鉛氷雪得温湯解釋成太𤣥金以砂為主禀和於水銀變化由其真終始自相因欲作服食仙宜以同𩔖者植禾當以黍覆雞用其卵以𩔖輔自然物成易陶冶魚目豈為珠蓬蒿不成檟𩔖同者相從事乖不成寳是以燕雀不生鳯狐兎不乳馬水流不炎上火動不潤下胡粉本黑鉛燒就若投之火中則復還為鉛氷雪乃隂氣結成若沃以温湯則解化為水何者返本還源其理不容不然也煉金之法以砂為主而和以水銀盖水銀生於砂中與砂為同𩔖之物所以終始相因而成變化者由其真也悟真篇云竹破須將竹補宜覆雞當用卵為之萬般非𩔖徒勞力争似真合聖機盖謂真汞得真鉛則一隂一陽氣𩔖相感是為同𩔖譬猶植禾當以其黍覆雞必用其卵以𩔖相從則其道自然不勞於力而成變化若使舍其同𩔖而别求他物則猶魚目之不可為珠蓬蒿之不能成檟𩔖既不同安有變化亦猶燕生燕雀生雀使之生鳯則不能生矣狐乳狐兎乳兎使之乳馬則不能乳矣火性炎上使之潤下可乎水性潤下使之炎上可乎所以欲作服食仙宜以同𩔖者𩔖同者相從事乖不成寳也然吾身自有一天地自有一隂陽而還源篇乃云奪它天地髄交姤片時中而必須竊取天地之氣乃日月聖父靈母之氣吾身之氣乃骨血凡父母之氣故以真父母之氣變化凡父母之身為純陽真仙則與天地同夀也或人自昧求同𩔖不知自已同乾坤却向身外覔同𩔖妄指童女為真鉛遂託黄帝𤣥素之事餙其邪説以逢士夫之欲於是富家貴宦行其術而往往䧟於死亡者有之盖不特唐相國夏侯孜之一人也是故葛稚川抱朴子以為氷盃盛湯羽苞蓄火陶隐居真誥以為抱玉赴火金棺𦵏狗洞㣲子目之為狗猪行狀李玉谿稱之為地獄種子古今丹書所以皆極口痛罵此術者以其害人而終亦自害其身也南華真經云無勞爾形無揺爾精乃可以長生未聞有所謂御女之說誰生厲階至今為梗誣汚前真迷誤後學其旁門諸術中害道之最尤者歟世間多學士髙妙負良才邂逅不遭遇耗火亡貨財據按依文説妄以意為之端緒無因縁度量失操持擣治羌石膽雲母及礜磁硫黄燒豫章泥汞相煉飛鼓鑄五石銅以之為輔樞雜性不同𩔖安肯合體居千舉必萬敗欲反成癡僥倖訖不遇聖人獨知之穉年至白首中道生狐疑背道守迷路出正入邪蹊管窺不廣見難以揆方来悟真篇云饒君聰慧過顔閔不遇真人莫强猜只為丹經無口訣教君何處結靈胎盖世間髙才好學之士不為無人而求其遇真師得正𫝊者或寡矣彼有燒煉三黄四神之藥妄意以為道在於是殊不知五金八石乃世間有形有質之物其種𩔖不同其性質各異安肯合體而並居哉故凡為此術者莫不千舉萬敗欲成癡何則端緒無因縁度量失操持故也指𤣥三十九章云訪師求友學燒丹精選朱砂作大還將謂外丹化内藥元来金石不相闗盖神仙金液大還丹乃無中生有之至藥而所謂朱砂水銀者不過設象比喻而已柰何世人不識真鉛汞將謂凡砂及水銀往往耗火費財卒無成功遂至皓首茫然反起虚無之嘆嗚呼真道簡而不繁至言淡而無味人誰信之人誰行之甚至得正𫝊而中道生疑於是出正入邪蹊者有矣内指通𤣥祕訣云多恃聰明强是非縱聞法要自相違之人也背大道而守迷路管窺天而不廣見烏足與論方来無窮之𤣥奥哉若夫至聖不過伏羲始畫八卦效法天地文王帝之宗循而演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功徳不相殊制作有所踵推度審分銖伏羲法天地而作易始畫八卦其先天一圖乾天在上坤地在下離日坎月則列於東西震雷巽風艮山兊澤則居於四隅是豈無所踵而然哉文王循卦體而演易乃作爻辭其後天一圖震巽二木生離火繼以坤土藏之兊乾二金生坎水繼以艮土止之又豈無所踵而然哉孔子踵羲文而讚易遂作十翼在當時雖無帝王之位而萬世為帝王之師是乃庶聖之雄者也是三君子皆古之大聖人也伏羲生於䆳古文王生於商末孔子生於晚周迭興御時步驟雖有優劣而以功徳較之則前聖後聖其歸一揆盖不相殊也且如八卦之畫爻辭之演十翼之作篇無閒言言無閒字推度重輕極為詳審盖其制作皆有所踵也今夫魏公作此參同契一書而必假易之卦象以發明其說可謂有所踵矣有形易忖量无兆難慮謀作事令可法為世定此書素无前識資因師覺悟之皓若搴幃帳瞋目登高臺事之有形有兆者可以忖量可以慮謀金液太丹乃無形無兆之事不可忖量不可慮謀也茍不示之以言則後世何所取法此參同契所以作也然參同契之作也豈魏公自出己見哉不過因師授之說而為之爾西升經云學不得明師安能解疑難盖世間一法一術尚須磬折求師然後得其㫖况此金液大丹乃長生超脫之道學者得不低心參訪以期感遇哉葛穉川神仙𫝊云劉政求養生之術勤尋異聞不逺千里茍有勝已雖奴客必師事之今之人果能如劉君之不恥下問則自有真仙踵門㸃破丹穴一旦得其口訣羣疑盡釋皓若搴帷帳而撤其掩蔽豁如登高臺而眺乎曠逺心目為之開明豈不大快也歟火記六百篇所趣等不殊悟真篇云契論經歌講至真不將火候著於文要知口訣通𤣥處須共神仙子細論後學不悟真筌見有所謂火記六百篇之說則莫不惘然自失以為火候如此其繁且難殊不知六百篇亦猶六十卦耳六十卦為一月之候六百篇乃十箇月之候盖一月六十卦卦卦一般十箇月六百篇篇篇相似故曰所趣等不殊也文字鄭重說世人不熟思尋度其源流幽明本共居竊為賢者談曷敢輕為書結舌欲不語絶道獲罪誅寫情著竹帛又泄天符猶豫増歎息俯仰輙思慮陶冶有法度未忍悉陳敷略其綱紀枝條見扶疎古今丹書汗牛充棟千名萬字引喻無窮得不謂之鄭重乎然而尋度其源流則不過一隂一陽而已此兩者同出而異名古仙皆傾肝瀝膽以告世人而世人福縁淺薄自不暇熟思耳今夫魏公作此一書指陳鼎器之出處藥物之川源火候之法度與夫存亡有無主客先後之祕言言徹厎字字著實盖為世之賢者設豈肯輕為著述以釣人虚譽耶當知書為曉者傳事為識者貴農夫得彤弓以驅鳥南人得衮衣以負薪金丹大道惟賢者而後樂此匪我知者可多談哉太上𤣥科曰遇人不𫝊失天道妄𫝊非人泄天寳𫝊得其人身有功妄𫝊七祖受冥考所以魏公將結舌而噤無一語則絶道脉而獲罪若寫情而著之竹帛則又泄天符而得譴於是猶豫增歎息俯仰輙思慮本欲明明直說以告學者實不敢輕泄真機遂姑述藥物火候之大略以使後人因言而㑹意則庶乎此道不泯其所𫝊也既不敢明於言又不忍祕於黙故未免舉其宏綱撮其機要以陶冶法度散於三篇之中而有如枝條之扶疎也以金為隄防水入乃優遊金計有十五水數亦如之臨爐定銖兩五分水有餘二者以為真金重如本初其土遂不入二者與之俱三物相含受變化狀若神以金為隄防水入乃優遊者以上弦半斤金為外爐東南半璧之隄防然後下弦半斤水自西而下入於北方内爐則其勢不迫而優游自如也金計有十五者自初一至十五也即上弦金半斤之謂也水數亦如之者自十六至三十也即下弦水半斤之謂也丹法先以文升後以武降不如是則不能深達於九泉之下故曰臨爐定銖兩五分水有餘也夫金水各半合成二八一斤之數一闔一闢往来不窮乃吾身之真隂陽也然水要半斤有餘金又不可虧其半斤之重故曰二者以為真金重如本初也其土遂不入者周回鼎器間只有上弦半斤金下弦半斤水而土則無位也其所謂不入非不入也土無定位無所往而不入也且如天地二十四位其間即無戊己豈果無戊己哉盖自壬子至於乾亥往来不定上下無常無非戊己所遊之地也二者與之俱者遍鼎器之間皆土而金水二者與之偕行也金水與土偕行則三物互相含受混而為一矣混而為一則縳住青山萬頃雲撈出碧潭一輪月而變化之狀如神矣至道篇云升降名為金水運時巽曰真風盖升者金也降者水也而所以為之升降者土也雖然金水土三物不過皆設象比喻耳究而言之大道從来絶名相真仙本自無花草何金水之有哉何土之有哉下有太陽氣伏烝須臾間先液而後凝號曰黄轝焉玉芝書曰凡煉丹随子時陽氣而起火其火力方全餘外别時起火其火不然盖子時太陽在北方而人身氣到尾閭闗於此時而起火則内外相合乃可以盗天地之機而成丹其初太陽在下水火交媾二氣絪緼烝而為液次則水中火發陽氣漸熾其液方凝於其中逼出金華是名真鉛及其運用而上升則騰騰若車轝行於黄道之上故號之曰黄轝焉嵗月將欲訖毁性傷夀年臘月三十日天運將周則日窮于次月窮于紀若以丹道言之則人身自有一周天與天地無以異也形體為灰土狀若明窻塵古歌云用不用鉛須向鉛中作及至用鉛時用鉛還是錯又云鉛為芽母芽為鉛子既得金華捨鉛不使其㫖深矣人徒知子時腎氣生得火烹煉凝而成液遂認為真鉛而欲取以㸃化離宫之真汞殊不思既成液矣則有形有質其體重濁安能逆流而升上神仙之作丹不過於此時發火於其下以感其氣爾火力既盛其氣滃然上騰與山川之雲起相似逮夫升入泥丸然後化為甘雨下入重樓盖未嘗用其質也丹法所謂取清捨濁正謂此也清者浮而在上所謂狀若明窗塵是也濁者沉而在下所謂形體為灰土是也煉外丹者取其飛結於鼎盖之上者號曰明窗塵魏公以此發明内丹欲學者觸𩔖而長之也擣治并合之馳入赤色門擣治并合之者兩處擒來共一爐一泓神水結真酥也馳入赤色門者奪得兎烏精與髄急須收入鼎中燒也金丹大藥産在坤種在乾乾居上為鼎坤居下為爐非猛烹極煅則不能出爐非倒行逆旋則不能升鼎悟真篇云兩手捉來令死鬭化成一塊紫金霜又云河車不敢暫留停運入崑崙峯頂兹盖後天下手功夫與先天産藥之時不同其中復有觀心吸神二用皆助火候之力者古仙往往祕而不言人誰知之或泥於下手之説從而按摩導引般運轆轤徒爾勞神用力又安識運神火以觀真心鼓巽風以吸真神之妙用哉固塞其濟㑹務令致完堅金丹大成集云知時下手採將來固濟神廬勿輕泄又云搬歸頂上結三花牢閉玉闗金鎻盖金砂升鼎之時須是固濟謹宻然後聖胎完堅也炎火張於下龍虎聲正勤指𤣥三十九章云只消閃入華池鼎真火掀天煅一場漸悟集云因燒丹藥火炎下故使黄河水逆流此乃烹煉之火不得不炎也悟真篇云虎躍龍騰風浪麄中央正位産𤣥珠翠虚篇云龍吟虎嘯鉛汞交灼見黄芽并白雪盖丹田之火熾盛則雲蒸霧滃泥丸風生而宛有龍吟虎嘯聲也彭鶴林元樞歌云得訣歸來試煉看龍爭虎鬬片時間九華天上人知得一夜風雷撼萬山歴試者當自知之始文使可修終竟武乃陳採藥之初凝神聚氣調勻鼻息呼吸應手逮夫神氣之入乎其根閉極則失於急縱放則失於蕩惟使其綿綿續續勿令間斷然後神乆自凝息乆自定少焉巽户轟雷龍騰虎躍則驅回尾穴連空熖趕入天衢直上奔也王保義云文火乃發生之火武火乃結實之火盖始焉發生終焉結實始文終武不可以一途取也候視加謹慎審察調寒温候視加謹慎者塞兊垂簾含光黙黙候天地之氣將至然後定息以採之聚火以烹之須當視其老嫰不可輕易也悟真篇云大都全藉修持力毫髮差殊不作丹豈可輕易哉審察調寒温者調停火力審察謹緩以漸而猛不可荒忙驟進也復命篇云火候直須牢稳審吹噓全藉巽方風豈可驟進哉周旋十二節節盡更親觀十二節乃周天十二辰在吾身則火候方位是也夫十二節火候自子而升至午而降環鼎器之外如天有十二辰周焉十二節皆已行遍周天則天岡復指於子故曰周旋十二節節盡更親觀翠虚篇云震卦行歸西兊鄉三陽姹女弄明璫巽風吹動珊瑚樹入艮歸坤又一陽與此同㫖氣索命將絶休死亡魄魂夫修煉金丹將求長生今魏公乃謂氣索命將絶休死亡魄魂何也翠虚篇云促將百脉盡歸源脉住氣停丹始結盖金液凝結之際璇璣玉衡一時停輪而日魂月魄皆沉淪於北方海底而索然㓕藏故曰氣索命將絶休死亡魄魂所謂死者非死也此時歸根復命神凝精結八脉俱住呼吸俱無其氣索然如絶也絶後重甦則上清集所謂這回大死今方活是也鳴呼欲知大藥結成時六脉都停氣不馳此等景象茍不曾親歴烏能强言哉色轉更為紫赫然成還丹翠虚篇云脫黄著紫因何事只為河車數轉深盖九轉火候數足則還丹赫然光明變化紫金之色也服之以一丸刀圭最為神翠虚篇云採之煉之未片餉一氣眇眇通三闗三闗來往氣無窮一道白脉朝泥丸泥丸之上紫金鼎鼎中一塊紫金團化為玉漿流入口香甜清爽遍舌端吞之服之入五内臟腑暢甚身康安盖還丹入口如之甘香蔢之清凉所謂刀圭者刀頭圭角些子爾及其成功則千變萬化妙不可測非旁門小術可得而擬倫也稱之為神宜哉推演五行數較約而不繁易曰天一地二天三地四天五地六天七地八天九地十乃五行生成數也子華子云天地之大數莫過乎五莫中乎五盖五為土數位居中央合北方水一則成六合南方火二則成七合東方木三則成八合西方金四則成九九者數之極也天下之數至九而止以九數言之五居一二三四六七八九之中實為中數也數本無十所謂土之成數十者乃北方之一南方之二東方之三西方之四聚於中央輳而成十也故以中央之五散於四方而成六七八九則水火木金皆賴土而成若以四方之一二三四歸於中央而成十則水火木金皆返本還源而㑹於土中也吁𤣥哉悟真篇云二物總因兒産母五行全要入中央混元寳章云四位分明顛倒用五行同起復同歸皆發明此義夫五行生成之數雖三尺童子亦能誦而知之求其義實則幾人能知其落處也既不知其落處又安能得其實用於此見道要𤣥微天機深逺達者惟簡惟易而迷者愈繁愈難也舉水以激火奄然滅光明日月相薄蝕常在晦朔間水盛坎侵陽火衰離晝昬隂陽相飲食交感道自然邵康節皇極經世書云日月之相食數之交也日望月則月食月掩日則日食猶水火之相剋也今夫舉水以激火則火為水所尅而火光奄然而滅太隂掩太陽則陽為隂所勝而陽光當晝而暗何者隂陽相交則必至相食此乃道之自然也魏公借日月交食之機以明丹道之妙而又舉水火相尅之説以並言之可謂詳矣雖然日月交食常在晦朔之間煉金丹者盜天地奪造化得不求其所謂晦朔之間乎名者以定情字者縁性言金來歸性初乃得稱還丹復命篇云一物分為二能知二者名二者即金木也金與木本無二體故以金為名則以木為字以木為性則以金為情其實即一物爾盖金公本是東家子送在西鄰寄體生未可以稱還丹也惟以之傾入於東陽造化爐中歸家與青娥相見則産箇明珠似月圓乃得稱還丹也或曰寂然不動而情復乎性故稱還丹是則是矣然非魏公此章金情木性之本義也吾不敢虚説倣傚聖人文古記顯龍虎黄帝美金華淮南煉秋石王陽嘉黄芽古記之龍虎黄帝之金華淮南之秋石王陽之黄芽無非託號以寓其微意而已今夫魏公之作是書豈肯鑿空駕虚以肆其臆説盖亦倣傚古人之微意也朱子謂其用字皆根据古書誠非虚説賢者能持行不肖母與俱鬼谷子從子華子遊者十有二年業成而辭歸子華子戒之曰今汝之所治吾無間然矣然子之志則廣取而汎與也汝之後夫擇者也其將有剥汝之外郛而自築之宮庭者矣登汝之車而乘之以馳騁於四郊者矣取汝之所以為璧者毁裂而五分之者矣夫道固惡於不𫝊也不𫝊則妨道又惡於不得其所𫝊也不得其所𫝊則病道今汝則往矣而思所以慎厥與也則於吾無間然矣今魏公謂賢者能持行不肖無與俱其慮亦深矣盖不肖則必佻薄佻薄則必無義其不闗射羿之弓者鮮矣復命篇云此道至神至聖無令漏泄輕為全憑徳行兩相宜言語須防避忌當知金丹大道惟可𫝊與賢者苟非其人則不惟不可與語雖逺之可也嗚呼古今出世者𫝊載皆英傑控鶴御煙霞固非愚與拙彼不肖者何足以知之古今道由一對談吐所謀子得一萬事畢大哉一乎其千經萬論之原千變萬化之祖乎信矣哉天下無二道聖人無二心而萬卷仙經語總同金丹即此是根宗也學者加勉力留念深思惟至要言甚露昭昭不我欺魏公謂學者能反覆玩味此書一旦心領神㑹則知予至要之言果為甚露而昭昭然無一毫之欺隠也噫魏公接引後學之心盖切矣學者得不信受魏公此説誦持魏公此書而留念深思之哉周易參同契發揮卷上
