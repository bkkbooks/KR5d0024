  text: 欽定四庫全書子部十四
  hash: sha256:59b6c5006a29a1c169640e5600631b30d9a17b0b2b0283c6e596da3e89cb6da6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0024_WYG_000-1a, image: WYG1058/WYG1058-0625a.png}
body:
  text: 周易參同契發揮道家𩔖提要臣等謹按周易參同契發揮三卷釋疑一卷宋俞琰撰琰有周易集説已著録是書以一身之水火陰陽發揮丹道雖不及彭曉陳顯微陳致虚三注為道家専門之學然取材甚博其釋疑三篇考核異同較朱子本尤詳備明白雲霽道藏目録謂二書共十四卷焦竑國史經藉志則作十二卷毛晉津逮秘書以琰注與曉等三家注合為一編已非其舊又併其釋疑佚之此本每卷俱有圖乃至大三年嗣天師張與封所刻實祗三卷附以釋疑一卷考琰易外别𫝊自序亦稱丹道之口訣細㣲俱載於參同契發揮三篇白雲霽所記或併其他書數之焦竑所記悉輾轉販鬻于他書沿訛襲謬益不足據矣乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀重刋周易參同契發揮序昔者聖人之作易也肇自庖犧氏受河圖而畫卦文王重之而繫卦辭周公推六位吉凶而繫爻辭孔子因大小象而作十翼其本原則繇太極動而生陽靜而生陰兩儀既分四象攸立動靜互為其根而生五行因陰陽竒偶之交而成八卦黄帝命大橈作甲子其十干十二支不過探五行之情而亦不出於八卦之方位卦重而為六十四爻分而為三百八十四於是有天道焉有地道焉有人道焉三才道備則盈天地間為萬物者莫不有理有氣有象有數其盈虚消長進退存亡莫不入於聖人範圍之内而察識其所以然之故故其為書廣大悉備因以之設教按五行八卦立為推步占筮之法足以開物成務以前民用焉蓋易為君子謀而人不可以不用乎易也世人不體天地運行不息之理不探五行生尅制化之情不循卦爻往來進退之位𡨕行妄動未能反之於身不知修鍊為何物其保七尺軀而全歸者鮮矣況望其長生久視於天地間哉彼神僊者流其能長生久視者以有還丹之道耳然古之仙人必有心傳口授一時秘訣多不輕泄以故世罕有述焉間有不由大道任其私智謂曲徑之斜捷易行旁門之淫僻可致甚者服燥藥飲熱餌視為神丹卒以喪身閼壽又烏能保其長生哉至後漢魏公伯陽以為還丹之道不可惑於邪説必本諸易道然後可也蓋易道具陰陽動靜之機該卦爻變易之妙生生不息化化無窮今也返觀吾身亦一天地耳吾得一元之氣亦天地之氣耳天地之能長存吾獨不能効之乎此參同契之書所以作也參者謂與易參考之而不謬同者謂與易同合之而不違契者謂與易契黙而識之而自㑹也予昔聞古仙有鍊丹之法丹成可以長生沖飛故天下之名山勝處皆有爐竈之異跡存焉吁山中之竒石有偶𩔖爐竈者耳及觀是書乃知以爐竈鍊丹為妄夫仙家引導修鍊之説運之在内不假乎外者也取之在己不假乎物者也若金之為寶也欲其真粹不雜不偽非資鉛汞用火以鍊之又何以得其真粹堅剛其質為丹同天地為不朽哉今參同契假以此義以吾身之乾坤為鼎器以坎離日月為藥物凝吾神聚吾氣使龍虎媾精交用進火候以竢其變化則丹道可成也然此書紫陽朱夫子嘗為之考訂註釋闕疑尚多雖云有頭緒猶未得其作料孔穴況其下於朱子究之而易得哉至元世有全陽子俞公玉吾始研精是書初則未得其竅求之甚難至真積力久信之彌篤則有若神告而自悟於是博採諸真人秘訣較之是書無有不符於易之説故為是書發揮添一註脚則丹道之明如指諸掌但言還丹之道至簡至易不過俯而就人然又言必待三年九轉則又似易而實難又欲人久於其功可也是則學道希仙之士其可以俄而度淺而窺又當尋其户牖察其關鍵鼔槖籥進火候守龍虎以待交媾則黄芽自長玉英自呈還丹之道其庶幾矣若是可以沖舉可以長存可以乗長雲於八極之間冒剛風於九霄之上逈與世隔超居神洲永階仙阼百世一下來遊人間長生度人人莫測其所之其俯視塵世蜉蝣旦莫蠛蠓起伏真不直一笑耳周易參同契發揮序
