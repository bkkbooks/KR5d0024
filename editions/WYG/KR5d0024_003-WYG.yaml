body:
  text: 周易參同契發揮宋俞琰撰下篇惟昔聖賢懷𤣥抱真無視無聽抱神以靜廣成子之懷𤣥抱真也專氣致柔能如嬰兒老子之懷𤣥抱真也乃若女媧氏煉五色石以補天冉相氏得其環中以隨成此又列禦冦漆園吏之丹法也學者勿謂夙有仙骨方可希求要之但辦肯心無不可者聖賢何人哉予何人哉有為者亦若是志道之士誠能發勇猛心辦精進力勤而行之夙夜不休則時至而氣自化水到而渠自成又何患乎煑頑石之不爛磨鐵杵之不為針也哉但恐學而不遇遇而不得雖得真訣復不能守朝為而夕欲其成坐修而立望其效升勺之利未堅而鐘石之費相尋根核之據未極而冰霜之毒交攻如是則雖有廣成老子為之師列子莊子為之友亦末如之何也已矣馬丹陽金玉集云煉氣作生涯怡神為日用常教龍虎調不使馬猿弄又云觀天行大道黙然得交泰本師傳口訣無為功最大蓋古之修丹者一念不生萬法俱忘澄澄湛湛惟道是從於靜定之中抱沖和之氣出息微微入息綿綿上至泥丸下至命門周流不已神氣無一刻之不相聚及其内丹將成則元氣兀然自住於丹田中與天地分一氣而治昔者黄帝閒居大庭之館三月内視蓋用此道也此道至簡至易於一日十二時中但使心長馭氣氣與神合形乃長存與日月而周囘同天河而輪轉輪轉無窮壽命無極指𤣥篇云但能息息皆相顧換盡形骸玉液流其説是已至若呼而不得神宰則一息不全吸而不得神宰亦一息不全要在心與息常相依神與氣常相守念念相續打成一片然後形神俱妙與道合真靈源大道歌云神是性兮氣是命神不外馳氣自定仙樂集云氣神相見性住命定蓋不可斯須少離也常人則不然氣雖呼吸於内神嘗縈役於外自幼而趨壯自壯而趨老未嘗有一息駐於形中遂使神與氣各行而不相守卒之宅舍空虚牆壁頽毁而主人不能以自存此豈天地殺之鬼神害之哉失道而自逝也施栖真鍾吕傳道集云所呼者自己之元氣從中而出所吸者天地之正氣自外而入若其根源牢固元氣不損則呼吸之間尚可奪天地之正氣茍或根源不固精竭氣弱上則元氣已泄下則本宫無補所吸天地之正氣隨呼而出身中之元氣不為己之所有而反為天地之所奪是故仙人多云採鍊貴及時鼎器一敗則不可救藥蘇子由晚年問養生之説於鄭仙姑仙姑曰君器敗矣難以成道蓋藥材貴乎早年修煉若至晚景行持則老來精虧氣耗鉛枯汞少縱能用力惟可住世安樂爾翠虚篇云分明只在片言間老少殊途有易難蓋謂此也或曰吕純陽五十歳而始聞道馬自然劉朗然皆得道於六十四歳之後何也曰屋破修容易藥枯生不難但知歸復法金寶積如山顧吾平日所養何如爾服煉九鼎化跡隱淪九鼎火候之九轉也九轉火候數足則變化蹤跡憑虚御空而逍遥乎天地之間也吕純陽窰頭坏歌云九年火候都經過忽爾天門頂中破真人出現大神通從此天仙來相賀此之謂也含精養神通德三元三元上中下之三田也含養之久力到功深則精神内藏和氣充周於一身而百骸萬竅無不貫通自然如天河之流轉混元寶章云歳久不勞施運用火輪水軸自環是也夫所謂含精養神者外不役其形骸内不勞其心志也蓋神太用則歇精太用則竭日復一日斵喪殆盡而與草木俱腐豈不大可哀乎是故修丹者虚其心忘其形守其一抱其靈故能固其精保其氣全其神三田精滿五臟氣盈然後謂之丹成譚景升化書云悲則雨淚辛則雨涕憤則結癭怒則結疽心之所欲氣之所屬無所不育邪茍為此正必為彼是以大人節悲辛誡憤怒得灝氣之門所以收其根知元神之囊所以韜其光若蚌内守若石内藏所以為珠玉之房誠至論也精溢腠理筋骨緻堅腠理皮膚之間也修煉至於精溢腠理則血皆化為膏矣翠虚篇云如今通身是白血已覺四季無寒熱蓋修煉之功莫大乎填腦腦者髓之海腦髓滿則純陽流溢諸髓皆滿然後骨實筋堅永無寒暑之憂也衆邪辟除正氣常存人之所以能修煉而長生者由其能盜天地之正氣也人之所以能盜天地之正氣者由其有呼吸也呼至於根吸至於蔕是以能盜天地之正氣歸之於丹田也人之呼吸猶天地之呼吸也皇極經世書云冬至之後為呼夏至之後為吸此天地一歳之呼吸也張觀物註云冬至之後陽長隂消舒萬物以出故為呼夏至之後隂長陽消斂萬物以入故為吸若自日言則子以後為呼午以後為吸天之一年一日僅如人之一息是以一元之數十二萬九千六百年在大化中為一年而已今以丹道言之一日有一萬三千五百呼一萬三千五百吸一呼一吸為一息則一息之間潛奪天運一萬三千五百年之數一年三百六十日四百八十六萬息潛奪天運四百八十六萬年之數於是換盡穢濁之軀變成純陽之體始而易氣次而易血次而易脈次而易肉次而易髓次而易筋次而易骨次而易髮次而易形積九年而閲九變然後隂盡陽純而與天地齊年兹其為長生超脱之道也今魏公謂衆邪辟除正氣常存者晝夜運火煉盡隂氣變為純陽而正氣常存乃能長生也翠虚篇云透體金光骨髓香金筋玉骨盡純陽煉教赤血流為白隂氣銷磨身自康蓋純陽者為仙純隂者為鬼隂陽相半者為人人能煉陽以銷隂乃可以為純陽之仙若有纖毫隂氣煆煉未盡則不得謂之純陽也累積長久化形而仙大矣哉丹道之法天也難矣哉丹功之不息也何以言之隂符經云觀天之道執天之行盡矣夫天之所以長且久者以其晝夜之運也人能觀天之道反而求之吾身亦如天道晝夜之運則長生久視之道實在於此捨此更無他道也蓋晝夜之運即天之道也人以藐然六尺之軀乃能法天之道而與天道同其運則其為道也豈不大矣哉易曰天行健君子以自彊不息夫子作象之意欲使知道君子象天行之健也天之所以常行而不已者以其健爾健則能行之無已君子欲其行之不息當法乾健以自彊其志斯可矣蓋不息者人之所難也天道之運晝夜而不息人而象天道晝夜之運而不息豈不難矣哉然而天下之大事必作於其細天下之難事必作於其易合抱之木生於毫末九層之臺起於累土千里之行始於足下是故聖人圖難於其易為大於其細亦在夫積久之功耳黄庭經云仙人道士非有神積精累氣乃成真故自片餉結胎之後百日而功靈十月而胎圓一年而小成三年而大成以至九年功滿人事皆盡然後可以遺世獨立羽化而登仙蓋未有不自積累長久而得之者若曰不必積久功夫而可以平地登仙則猶一鍬而欲掘九仞之井一步而欲登億丈之城豈有是理哉通𤣥真經云寸步不休跛鼈千里累土不止丘山從成臨河欲魚不如歸而織網故夫人之學道不患不成惟患不勤不患不勤惟患無久逺之心蓋久逺之心最為難也吳宗𤣥𤣥綱論云知道者千而志道者一志道者千而專精者一專精者千而勤久者一是以學者衆而成者寡也若知者能立志立志者能絶俗絶俗者能專精專精者能勤久未有學而不得者也世降俗末去聖逾逺學者毎以躁競之心涉希靜之塗意速而事遲望近而應逺皆莫能相終夫既立志不堅信道不篤朝為而夕改始勤而中輟悦於須臾厭於持久乃欲與天地齊年不亦愚乎内觀經云知道易信道難信道易行道難行道易得道難得道易守道難若使不難則滿市皆神仙矣安足為異耶吕純陽詩云三畆丹田無種種種時須假赤龍耕曾將此種教人種不解營治道不生兹豈道之逺人哉人自逺道爾人徒見悟真篇云赫赤金丹一日成古仙實語信堪聽若言九載三年者盡是推延欵日程遂執此以訕笑累積長久之説殊不究紫陽此詩蓋引用韓逍遥之語以曉夫世之不知有一日見效之妙而徒事三年九載之勤者爾非曰一日便可登仙更不用累積長久之功也嘗試論之上清集云教我行持片餉間骨毛寒心花結成一粒紅渠言即此是金丹又云開禧元年中秋夜焚香跪地口相傳朅爾行持三兩日天地日月軟如綿又云縱使功夫汞見鉛不知火候也徒然大都全藉周天火十月聖胎方始圓雖結丹頭終耗失要知火候始凝堅如此則金丹之小效固可以片餉見之而金丹之大功蓋不止於一日矣抑嘗以古人之説攷之如王易𤣥云九轉一年功壽可同天地又云火運經千日爐開見八瓊又如韓逍遥云十月滿足麗乎二儀又云三年法天行道永世無為金質王韓二公皆唐之得道真仙也肯妄言哉又如吕純陽云千日功夫不暫閒河車搬載上崑山又云才得天符下玉都三千日裏積功夫又如劉海蟾云爐閉八關終九五藥通七返是三年又云九轉功成千日候已知名姓列仙都夫洞賔之與海蟾乃列仙中之錚錚者肯妄言哉不特此也又如陳朝元云含養胞胎須十月焚燒丹藥在三年又云九年還返無差錯煉取純陽作至真又如王良器云大將天法烹千日恁時除假只留真又云靈芝種滿三丹田千日功夫延萬年又如薛紫賢云四象包含歸戊巳精勤十月産嬰孩又云昇騰須假至三年攜養慇懃多愛戀又如劉虚谷云顔容可定因三住胎息成功合一周又云大功欲就三千日妙用無虧十二時又如陳黙黙云候簇成須百日功夫煉就是三年又如李長源云勿謂丹成消一日到頭須下數年功又如陳翠虚云片餉功夫修便現老成須是過三年又云千朝火候知時節必定芽成汞自乾諸公之説豈皆謬為此論以誑惑後人者丘長春磻溪集云假使福輕魔障重挨排功到必周全吾黨其勉諸憂憫後生好道之倫隨傍風采指畫古文著為圖籍開示後昆露見枝條隱藏本根託號諸石覆謬衆文學者得之韞櫝終身子繼父業孫踵祖先傳世迷惑竟無見聞遂使宦者不仕農夫失耘商人棄貨志士家貧吾甚傷之定録此文字約易思事省不繁披列其條核實可觀分兩有數因而相循故為亂辭孔竅其門智者審思以意參焉指𤣥三十九章云求仙不識真鉛汞閒讀丹書千萬篇蓋丹書所謂鉛汞皆比喻也在學者觸𩔖而長之爾殆不可執文泥象舍吾身而求之外也載惟古之聖賢憂憫後世有好道之士不得其説遂為之隨傍風采指畫古文著為圖籍以開示之實欲使學者有可以為遡流尋源之地也然其著書立言往往隱藏本根不肯明言其事惟託五金八石為號以露見枝條而已後之得其書者不究其旨徒爾韞櫝終身以至子子孫孫世世迷惑燒竭朱汞竟無所得遂使在官者棄官服田者廢田商人失其本業志士無以聊生甚可傷也魏公傷其如是遂乃定録此參同契一書傳行於世其間分兩有數不妄發一句因而相循不閒着一字枝條一披核實隨見可謂字約而易思事省而不繁矣或者見其三篇之多疑其太贅殊不知三篇即一篇也一篇即一句也以一句口訣散布於三篇之内所以錯亂其辭孔竅其門者不敢成片漏泄也智者誠能審而思之以意參之必當自悟焉法象莫大乎天地兮𤣥溝數萬里道之大無可得而形容若必欲形容此道則惟有天地而已矣天地者法象之至大者也有𤣥溝焉自尾箕之間至栁星之分界斷天盤不知其幾萬里也修丹者誠能法天象地反而求之吾身則身中自有一壺天方知魏公之所謂𤣥溝吾身亦自有之蓋不用求之於天也何謂𤣥溝天河是也河鼔臨星紀兮人民皆驚駭河鼓天河邊之星也其位在斗牛之間星紀天盤之丑位也河鼓臨星紀則驅囘尾穴連空焰趕入天衢直上奔正當其斬關出路之時一身之人民豈不竦然驚駭翠虚篇云曲江之上金烏飛姮娥已與斗牛歡即河鼓臨星紀之謂也又云山河大地發猛火於中萬象生風雷即人民皆驚駭之謂也晷景妄前却兮九年被凶咎晷景即火候也前却即進退也九年即九轉也以九年蹙而小之則一月一還為一轉翠虚篇謂九轉功夫月用九是也更蹙而小之則一刻之中自有小九轉金丹大成集謂九轉功夫在片時是也晷景妄前却兮九年被凶咎者火候之進退不可毫髪差殊然後九轉之間穏乗黄牝馬而可保无咎反是則九轉之間翻却紫河車而凶咎隨至矣悟真篇云大都全藉修持力毫髪差殊不作丹信不可不慎也皇上覽視之兮王者退自後太上素靈經云人身有三一上一為身之天帝中一為絳宫之丹皇下一為黄庭之元王夫上一天帝即泥丸太一君也中一丹皇即絳宫天子也下一元王即丹田元陽君也今魏公謂皇上覽視之者運神火照入坎中以驅逐坎中之真陽也王者退自後者真陽因火逼而出位於坎也於此駕動河車則真陽飛騰而起以㸃化離宫之真隂矣關楗有低昂兮周天遂奔走天形如彈丸晝夜運轉周匝無休其南北兩端一髙一下乃關楗也人身亦然天關在上地軸在下若能囘天關轉地軸上下相應則一息一周天也江河無枯竭兮水流注於海海乃百川所歸之地江河之水所以注於海而無枯竭者名山大川孔穴相通而往來相循環也人身亦然一氣流通則八路之水皆逆流奔注於元海中也天地之雌雄兮徘徊子與午午者天之中也子者地之中也子午為隂陽相交水火相會之地日月至此勢必徘徊今人以太陽當天謂之停午即徘徊之義也以丹道言之上升下降一起一伏亦徘徊於子午蓋與天地同途初無異也寅申隂陽祖兮出入終復始斗指寅而天下春陽氣自此而發生暢萬物以出斗指申而天下秋隂氣自此而肅殺斂萬物以入則知寅申者隂陽之祖萬物出入之門也以丹道言之自寅而出自申而入周而復始與天地豈有異哉循斗而招揺兮執衡定元紀殳記天官書云北斗七星杓攜龍角衡殷南斗魁枕參首用昬建者杓夜半建者衡平旦建者魁又云斗為帝車運乎中央臨制四郷分隂陽建四時均五行移節度定諸紀皆繫乎斗索隱曰春秋運斗極云斗第一天樞第二璇第三璣第四權第五衡第六開陽第七揺光一至四為魁五至七為杓今魏公謂循斗而招揺兮執衡定元紀者吾身之天罡所指起於子而周歴十二辰也夫斗居天之中猶心居人身之中是故天以斗為機人以心為機丹法以心運火候猶天以斗運十二辰也翠虚篇云奪取天機妙夜半看辰杓一些珠露阿誰運到稻花頭蓋謂此也升熬於甑山兮炎火張於下白虎唱導前兮蒼龍和於後甑山即崑崙山也藥升之時金爐火熾玉鼎湯煎虎先嘯龍後吟猶夫倡而婦隨也金丹大成集云夜深龍吟虎嘯時急駕河車无暫歇須臾搬入泥丸頂進火玉爐烹似雪蓋發明此義也朱雀翺翔戲兮飛揚色五彩遭遇羅網施兮壓止不得舉嗷嗷聲甚悲兮嬰兒之慕母顛倒就湯鑊兮摧折傷毛羽朱雀火也顛倒運於鼎中驅趂五行因成五彩翺翔於上為網羅所罩則風雲滿鼎鳴作嬰兒之聲也既被網羅壓止而不得飛舉遂斂身束羽伏於鼎中也赤龍大丹訣云朱鳥愛髙飛蟾蜍捉住伊號雖稱姹女啼不過嬰兒赫赫威從盛冥冥力漸衰即此説也元陽子大道歌云青龍逐虎虎隨龍赤禽交會聲嗈嗈調氣運火逐離宫丹砂入腹身自沖亦此義也刻漏未過半兮龍鱗甲鬛起五色象炫燿兮變化无常主潏潏鼎沸馳兮暴湧不休止接連重疊累兮犬牙相錯拒形如仲冬冰兮闌干吐中乳崔嵬以雜厠兮交積相支拄刻漏未過半兮龍鱗甲鬛起者採之煉之未片餉一氣眇眇通三關而黄雲成陣白羊成隊金錢金花金鱗紛紛而來也五色象炫燿兮變化无常主者風揺寶樹光盈目雨打瓊花雪滿衣而彤霞紫霧變現不一也潏潏鼎沸馳兮暴湧不休止者丹田火熾泥丸風生而三宫氣滿有如飯甑烝透之時熱湯沸湧於釡中也接連重疊累兮犬牙相錯拒形如仲冬冰兮䦨干吐鍾乳崔嵬以雜厠兮交積相支拄者一抽一漸凝漸聚澆灌黄芽出土而自然結蘂復生英也翠虚篇云辛苦都來只十月漸漸採取漸凝結學者誠能潛心内煉晝夜无倦則丹體逐時時不定火功一夜夜无差如上景象當一一自見之也陰陽得其配兮淡泊自相守悟真篇云陰陽同𩔖歸交感二八相當自合親蓋真息綿綿勿令間斷則陰陽自得其配虚心凝神純一不雜則陰陽自然相守也青龍處房六兮春華震東卯白虎在昴七兮秋芒兑西酉朱雀在張二兮正陽離南午三者俱來朝兮家屬為親侣本之但二物兮末乃為三五三五并危一兮都集歸一所治之如上科兮日數亦取甫周天二十八宿東方七宿謂之蒼龍西方七宿謂之白虎周天十二次東方三次中間一次曰大火西方三次中間一次曰大梁大火居東方三次之中在辰屬卯在卦屬震在四時屬春在五行屬木而房五度大又居大火之中故曰青龍處房六兮春華震東卯也大梁居西方三次之中在辰屬酉在卦屬兑在四時屬秋在五行屬金而昴七度又居大梁之中故曰白虎在昴七兮秋芒兑西酉也朱雀在張二兮正陽離南午者張乃南方之宿其象為朱雀也然張有十八度而特言其二者蓋以周天三百六十五度自北方虚危之間平分天盤為兩段而危初度正與南方張二度相對也三者俱來朝兮家屬為親侣者青龍白虎朱雀三方之正氣皆歸於𤣥武之位而房六昴七應水火之成數張二危一又應水火之生數猶家屬之相親也本之但二物兮末乃為三五三五并危一兮都集歸一所者端原其本即是水火二物而已二物運於鼎中遂列為三五三五即房六昴七張二也三家相見并而歸於危一則結成嬰兒也治之如上科兮日數亦取甫者修煉大丹當依上法度而行迎一陽之候以進火而妙用始於虚危也先白而後黄兮赤色通表裏名曰第一鼎兮食如大黍米先白而後黄者初如玉液飛空雪漸見流金滿故廬也赤色通表裏者靈光神熖燒天地風雷雲霧盈山川也名曰第一鼎者以九轉火候言之此為起初第一轉也食如大黍米者丹頭纔方結就僅如黍米之大也自然之所為兮非有邪偽道金丹大道古仙往往以為自然夫既曰自然則有何法度有何口訣但付之自然足矣又安用師授為哉曰非然也夫丹之法至簡至易其神機妙用不假作為不因思想是故謂之自然然必收視返聽潛神于内一呼一吸悠悠綿綿不疾不緩勿令間斷然後神歸氣中氣與神合交結成胎蓋非一味付之自然也金碧龍虎經云自然之要先存後亡夫先存後亡者先存神入於氣穴而後與之相忘也如是為之則神自凝氣自聚息自定即非澄心入寂如槁木死灰也蓋澄心入寂如槁木死灰以之入道則可以之修真則未也指𤣥篇云自然功績自然偏説自然來不自然蓋謂此也乃若時至而氣化機動而鳴則於自然之中又有烹煉進火之訣存焉悟真篇云始於有作人爭覺及至無為衆所知但見無為為要妙豈知有作是根基學者茍未知丹法之有作而便求無為自然是何異於不耕不耘而坐待豐稔者哉若山澤氣烝兮興雲而為雨天降時雨山川出雲人皆知其然矣而不知在天之雨即山澤之氣所化蓋山澤之氣烝而上升於天於是化而為雲由是隂陽和洽所以成雨及其成雨則又還降於地吾身之金丹作用與此更無少異魏公設此象以示後學可謂巧於譬喻矣泥竭遂成塵兮火滅化為土泥乃近水之土性本重滯而居下及曝而乾之則土性竭而燥裂化為埃塵矣火乃虚明之物因麗於木而有煙焰及煙消焰冷則火性滅而煨燼化為灰土矣知乎此然後可以論陰陽反覆之道若檗染為黄兮似藍成緑組皮革煮為膠兮麴蘖化為酒同𩔖易施功兮非種難為巧悟真篇云萬般非𩔖徒勞力爭似真鉛合聖機蓋真汞得真鉛則氣𩔖相感妙合而凝猶夫婦之得耦故謂之同𩔖𩔖同則如檗之染黄藍之染緑皮以為膠麴以為酒不勞於力自然成真若舍此而别求他物則非其種𩔖徒費功夫爾惟斯之妙術兮審諦不誑語傳於億世後兮昭然而可考煥若星經漢兮昺如水宗海世間旁門小術何啻三千六百家惟此一門乃天寶大羅飛仙金液九轉大還丹清靜無為之妙術其法至簡至易雖愚夫愚婦得而行之亦可以超凡入聖是以天戒至重不許輕授於非其人而世之參學者不有夙縁契合未易遭遇也今夫魏公不袐天寶作此三篇之書言言詳審字字諦當煥若星之經漢昺如水之宗海真億代學仙者之龜鑑也指𤣥篇云多少經文句句真流傳只是接髙人悟解篇云非干大道神仙惜自是凡流不志心或者乃信盲師之説而妄謂神仙誑語神仙肯誑語耶夫古仙留丹書於世蓋將接引後學其間論議昭然可考未遇者固可於此探討既悟者亦可於此印證古之得道者莫不皆然劉海蟾謂恣遊洞府遍討仙經幸不違盟果諧斯願楊虚白謂名山異境歴斗而靡不經遊祕訣神方淵奥而素曾躭翫陳黙黙謂歴覽羣書參叩髙士足跡幾𩔖雲水反而思之所得盡合聖詮蓋未有自執己見而不訪道友獨守師説而不讀丹書者也善乎施栖真之説曰古人上士始也博覽丹書次以遍參道友以道對言所參無異論以人念道所師無狂徒後之學者豈可謂口訣不在紙上而竟不留念哉若曰我自有師傳密旨其言藥物火候乃古今丹書之所無而參同契之所不言則亦妄人也已矣思之務令熟兮反覆視上下千周粲彬彬兮萬遍將可覩神明或告人兮心靈忽自悟探端索其緒兮必得其門戸讀書百遍其義自見百遍且然況千遍萬遍哉是故誦之萬遍妙理自明縱未得師授口訣久之亦當自悟其悟多在夜深或靜坐得之蓋精思熟味反覆玩誦蓄積者多忽然爆開便自然通此之謂神明或告人兮心靈忽自悟也管子曰思之思之又重思之思之不通鬼神將通之非鬼神之力也精誠之極也此説是己近世張紫陽以悟真篇授扶風馬處厚侍郎且囑之曰願公流布此書當有因書而㑹意者故其自序有云此悟真篇中所歌詠大丹藥物火候細微之旨無不備悉儻好事者夙有仙骨覩之則智慮自明可以尋文悟解其諄諄勉後學之辭與魏公同一意嚮蓋所謂神告心悟畢竟有此理也不然二公何苦立此空言以厚誣天下後世也哉天道無適莫兮常傳與賢者譚景升以化書授宋齊丘齊丘殺景升并竊其書自名之尋亦不得善終此傳非其人而彼此致禍者也吳世雲以道授許旌陽旌陽又得諶母之至道復授於吳厥後皆得道成此傳得其人而彼此致福者也蓋天道無親常與善人茍非其人道不虚行豈得無禍福於傳授賢否之間乎嗚呼世道不古愈降愈下善人吾不得而見之矣得見有恒者斯可矣鼎器歌圍三五徑一分圍三徑一此吾身之大寶鼎也三才位其中五行運其中鉛汞土居其中隂符經謂爰有其器是生萬象即此物也金丹種種𤣥妙皆不出乎此若曰不在吾身而在他人則非清淨之道矣口四八兩寸脣口四八者四象八卦皆在其中也兩寸脣者具兩儀上下之界分也長尺二厚薄勻鼎長一尺二寸以應一年十二月周天火候鼎身腹令上中下等均勻不可使之一偏也腹齊正坐垂温坐之時以眼對鼻以鼻對臍身要平正不可欹側開眼須要半垂簾不可全閉全閉則黒山鬼窟也氣從鼻裏通關竅不可息麄息麄則火熾火熾則藥飛矣陰在上陽下奔陰上陽下水火既濟也還源篇云娑竭海中火崑崙山上波誰能知運用大意要黄婆向微黄婆運用之功則水曰潤下火曰炎上何由既濟哉首尾武中間文首尾晦朔也中間月望也晦朔乃陰極陽生之時故用武火月望乃陽極陰生之時故用文火然所謂晦朔月望亦譬喻耳却不可只就紙上推究也始七十終三旬二百六善調勻三旬即三十也七十三十與二百六十合之則三百六十應一年周天數也修煉而至於百日數足則聖胎方靈聖胎既靈此後二百六十日善能調勻氣候常使暖氣不絶則丹功自成翠虛篇云温養切須常固濟巽風常向坎中吹行坐寢食總如如惟恐火冷丹力遲他無艱辛也陰火白黄芽鉛自子至巳為陽火之候自午至亥為陰火之候酉居西方西方屬金故曰陰火白悟真篇云蟾光終日照西川是也土中産鉛鉛中産銀銀自鉛中煉出結成黄芽名為真鉛金碧龍虎經云煉鉛以求黄色是也兩七聚輔翼人兩七東方蒼龍七宿西方白虎七宿也人中央人位也兩七聚輔翼人者龍蟠虎媾㑹聚於中央也若然則南海之儵北海之忽相遇於渾沌之地矣此所以烹而成丹也悟真篇云三家相見結嬰兒又曰五行全要入中央其斯之謂歟贍理腦定昇𤣥腦為上田乃元神所居之宫人能握元神棲于本宫則真氣自昇真息自定所謂一竅開而百竅齊開大關通而百關盡通也作丹之時脫胎而入口功成之後脫胎而出殻皆不外此静中吟云我修崑崙得真訣毎日修之無斷絶一朝功滿人不知四面皆成夜光闕兹蓋修持日久功夫贍足非一朝一夕之故也子處中得安存嬰兒處於胎中得坤母慇勤育養則得以安存矣來去遊不出門門者𤣥牝之門也來去遊者呼吸之往來也往來不出乎𤣥牝之門則陰陽氣足自通神也漸成大情性純行住坐卧綿綿若存則日復一日漸凝漸聚胎氣既凝嬰兒顯相而情性愈純熟也却歸一還本元大丹之道抱元守一而已其始入也在乎陰陽五行其終到也歸乎混沌無極此之謂歸一還元也相愛敬如君臣一年處室夙夜匪懈愛之敬之如臣子之事上也至一周甚辛勤還金篇云快活百千刧辛勤一二年自古蓋未有不辛勤入室一年而能平地登仙者也靈源大道歌云他年功滿乃逍遥初時修煉須勤苦勤苦之中又不勤閒閒只要養元神其説有味哉有味哉密防䕶莫迷昬翠虚篇云晝運靈旗夜火芝抽運用切防危若無同志相規覺時恐爐中火候非蓋道髙一寸魔髙一尺百刻之中切忌昬迷在修煉之士常惺惺耳途路逺極幽𤣥若達此會乾坤運用於𤣥牝之間一日行八萬四千里之路豈不途路逺耶其大無外其小無内迎之不見其首隨之不見其後豈不極幽𤣥耶人能達此則可以驅馳造化顛倒陰陽會吾身之乾坤矣刀圭霑靜魄䰟刀圭丹頭也䰟魄龍虎也運入崑崙峯頂而化為玉漿流入口則風恬浪靜虎伏龍降也得長生居仙村丹成之後散誕無拘繫翛然道轉髙不問山林之與朝市皆可以棲隱今魏公不曰在市居朝而曰居仙村者畢竟山林是靜縁也樂道者尋其根根者天地之根也金丹之基也翠虚篇云一纔識破丹基處放去收來總是伊似非至人指授莫有識之者樂道之士有能尋而得此抑何其幸耶審五行定銖分五行順則生人逆為丹用法度不可不審也火數盛則燥水銖多則濫斤兩不可不定也諦思之不須論深藏守莫傳文悟真篇云近來透體金光現不與凡人話此規靜而思之此道乃千聖所袐得之者但藏之胸膺自受用足矣何乃輕泄慢漏孜孜焉語人哉雖然自為計則得矣其如天下後世何此參同契所以作也御白鶴兮駕龍鱗逰太虛兮謁仙君受圖籙兮號真人胎圓功成之後須當調神出殻或跨白鶴或乘火龍超度三界難徑上元始天自此逍遥快樂與天齊年號之曰真人雖然凡所有相皆是虚妄何白鶴龍鱗之有哉若言他是佛自已却成魔又奚仙君之有哉當知白鶴龍鱗皆自我神通變化而仙君亦是自己三清何勞上望或者不達此理乃晝夜妄想以待天詔至有為黑虎所銜巨蟒所吞者豈不痛哉宋人鑿井而得一人之力相傳以為人自土中出許旌陽舉家成道後人以為拔瓦屋入於雲中甚矣世之好譎怪也然此可為智者道難與俗人言其維哲人告之話言順德之行其維愚人覆謂我僭吾安得夫圓機之士而與之極論哉吁序參同契者敷陳梗槩不能純一泛濫而説纖微未備闊畧髣髴今更撰録補塞遺脱潤色幽深鉤援相逮旨意等齊所趣不悖故復作此命三相𩔖則大易之情性盡矣參三也同相也契𩔖也謂此書借大易以言黄老之學而又與爐火之事相𩔖三者之隂陽造化殆無異也魏公憫後學之不悟於是作此一書以敷陳大道之梗槩然恐漏泄𤣥機遂不敢成片敷露未免傍引曲喻泛濫而説又恐闊畧髣髴不能備悉纖微復述鼎器歌於後凡篇中文辭之遺脱者皆於此歌補塞之義理之幽深者皆於此歌潤色之使三篇之言鉤援相逮旨意等齊庶幾後之覽者便得徑路不悖其所趣也翠虚篇云道要無中養就鬼箇中别有真端的都縁簡易妙天機散在丹書不肯泄今夫魏公之所以敷陳不已至于再至于三其意不過亦如此不然則大丹之要一言半句足矣又安用覼縷為哉大易情性各如其度黄老用究較而可御爐火之事真有所據三道由一俱出徑路道無不在頭頭俱是三聖如其度以作易黄老究其妙以作丹爐火盜其機而為燒煉之術或著於言或修於身或寓於物此皆仰觀俯察明陰陽配合之法逺取近用得造化變通之理於是有此三道三道殊塗而同歸此其所以為三相𩔖枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤道者萬物之本猶木之根株也發而為枝莖於是有三聖之易散而為華葉於是有爐火之術至於結為果實而返本還源此黄老之所以不失其素而修煉金液内丹養成聖胎也魏公以此三者互相𩔖之道鼎立而言豈故好為此鄭重實欲使學者洞曉陰陽深達造化也其言出於誠心厥亦審而不誤矣鄶國鄙夫幽谷朽生挾懷樸素不樂權榮棲遲僻陋忽畧利名執守恬淡希時安平宴然閒居乃撰斯文魏公生於東漢名伯陽號雲牙子㑹稽上虞人也今言鄶國者隱其辭也本髙門之子世襲簪裾惟公不仕修真潛黙養志虚無博贍文詞通諸緯候恬然守素惟道是從毎視軒裳為糠秕焉不知師授誰氏而得大丹之訣乃約周易撰此參同契三篇又恐言之未盡復作鼎器歌以補塞三篇之遺脱潤色三篇之幽深密示青州徐景休從事徐乃隱名而註之至桓帝時復以授同郡淳于叔通遂行於世嗟夫是書闡明道要發露天機其體認真切如此其講貫該博如此兹蓋非茍知之亦允蹈之者也而魏公猶以鄙夫朽生自處至人之謙晦蓋如此歌敘大易三聖遺言察其所趣一統共倫務在順理宣耀精神神化流通四海和平表以為厯萬世可循序以御政行之不繁引内養性黄光自然含德之厚歸根返元近在我心不離己身抱一無舍可以長存配以服食雄雌設陳挺除武都八石棄捐審用成物世俗所珍羅列三條枝莖相連同出異名皆由一門伏羲畫八卦因而重之文王設卦觀象繫辭焉以明吉凶孔子又贊之以十翼蓋將順性命之理而彌綸天地之道也是故表以為厯則坦然可循是為萬世法序以御政則行之不繁足為百王之軌範易道可謂大矣黄帝觀天之道而執天之行老子含德之厚而比於赤子陰符三百餘字道德五千餘言反覆議論無非發明造化自然之妙是故世之修丹者必以黄老為宗黄老可謂至矣乃若服食之法得其陰陽配合之妙以制伏鉛汞則二黄之𩔖先可掃除其餘衆石亦皆可棄審其用而煅煉之或為黄或為白則成物於天地間豈不為世俗所珍爐火可謂竒異矣大易也黄老也爐火也三條羅列枝莖相連同出異名皆由一門此之謂三相𩔖非徒累句諧偶斯文殆有其真礫硌可觀使予敷偽却被贅愆命參同契微覽其端辭寡意大後嗣宜遵魏公作鼎器歌以繼於三篇之後其文字礫礫硌硌粲然可觀豈徒抽黄對白諧耦斯文以為觀美哉殆有至真之理存乎其間也若謂以妄偽之説誑惑後人則稍知道者所不肯為曾謂魏公為之乎又況天鑒昭昭禍福不逺何苦以偽言誤天下後世而自取欺天之罪哉蓋鼎器歌之作所以補塞三篇之遺脱潤色三篇之幽深也其辭雖三字為句似乎簡短其意則廣大兼該靡所不備真所謂坦然明白可舉而行者也後學不於此而取信將奚之焉委時去害依託丘山循遊寥廓與鬼為鄰化形為仙淪寂無聲百世一下遨遊人間敷陳羽翮東西南傾湯遭阨際水旱隔并柯葉萎黄失其華榮各相乗負安穩長生此乃魏伯陽三字隱語也委與鬼相乗負魏字也百之一下為白白與人相乗負伯字也湯遭旱而無水為昜阨之厄際為阝阝與昜相乗負陽字也魏公用意可謂密矣元豐間吕吉甫守單州吕洞賔至天慶觀索筆書二詩其一云野人本是天台客石橋南畔有住宅父子生來只兩口多好歌而不好拍時吕守之壻余中釋之曰天台客賔也石橋洞也兩口吕也歌而不拍乃吟詩也吟此詩者其吕洞賔乎是知古仙立言於世惟務發明斯道以接引後人初不欲彰己之名也讚序參同契者辭陋而道大言微而旨深列五帝以建業配三皇而立政若君臣差殊上下無準序以為政不至太平服食其法未能長生學以養性又不延年至於剖析陰陽合其銖兩日月弦望八卦成象男女施化剛柔動靜米鹽分判以易為證用意健矣故為立注以傳後賢惟曉大象必得長生强己益身為此道者重加意焉此篇以讚序名乃後人讚序魏公此書之辭又曰故為立注以傳後賢其非魏公本文也審矣朱晦菴云或云後序或云魏君讚詳其文意乃是注之後序彭序云魏君密示青州徐從事令箋注徐隱名而注之至桓帝時復傳授於同郡淳于叔通因得行于世恐此是徐君語也其注則不復存矣彭真一云按諸道書或以真契三篇是魏公與徐從事淳于叔通三人各述一篇斯言甚誤且公於此再述云今更撰錄補塞遺脱則公一人所撰明矣況唐蜀真人劉知古者因述日月𤣥樞論進于𤣥宗亦備言之則從事箋注淳于傳授之説更復奚疑愚嘗紬繹是説竊歎世代寥逺無從審定是耶非耶皆不可知忽一夕於靜定中若有附耳者云魏伯陽作參同契徐從事箋注簡編錯亂故有四言五言散文之不同既而驚悟尋省其説蓋上篇有乾坤坎離屯蒙中篇復有乾坤坎離屯蒙上篇有七八九六中篇復有七八九六上篇曰日辰為期度中篇則曰謹候日辰上篇曰震受庚西方中篇則曰昴畢之上震出為徵其間言戊己與渾沌者三言三五與晦朔者四文義重複如此竊意三人各述一篇之説未必不然而經註相雜則又不知孰為經孰為註也愚欲以四言五言散文各從其𩔖分而為三庶經註不相混殽以便後學參究然書既成不復改作姑誦所聞於卷末以俟後之明者周易㕘同契發揮卷下
