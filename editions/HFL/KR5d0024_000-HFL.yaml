front:
  text: 周易參同契釋疑序世傳周易參同契上中下三篇合而觀之其辭錯亂本不可以分章也彭眞一因爲解註遂并魏公後序分爲九十章以應火候之九轉外餘鼎器歌一篇以應眞鉛之得一前輩謂此書詞韻皆古奥雅難通讀者淺聞妄輙更改故比他書尤多舛誤彭公爲之分章解義誠可謂佐佑眞經矣然承誤註釋或取斷章大義雖明而古文闕裂如易統天心可不愼乎之類皆合與下文連屬而彭本乃截爲上章不成文理意者彭義亦爲近世淺學妄更所以若是兼又有錯簡如象彼仲冬節一章不當在審而不誤之下類如雞子一章不當在各自獨居之下陳抱一嘗以象彼仲冬節一章移於子當右轉之前亦未爲得鄭虚一所校自謂詳備而亦有錯處如中而相干金水合處與鬼爲鄰之類蓋不當改而鄭乃改中爲午水爲木鬼爲仙去本義遠矣然晦爽定爲昧爽鼓下定爲鼓鑄粉提定爲服之厥亦當理愚嘗合諸本參訂之雖皆出於先正數君子讎校而其間更有大叚舛誤如三五併危一兮都集歸一所蓋謂房六張二昴七三方之氣併在北方危一都會集而歸於一處也舊本乃以危一作爲一歸一作歸二非惟失魏公本㫖於理亦自不通此無他蓋因危一訛作爲一遂疑其重復而誤改之耳至若補塞遺脫等語即魏公自序也所謂補塞遺脫乃指鼎器歌也魏公恐篇中所述尚有遺脫故復作此以補塞之如首尾武中間文贍理腦定昇玄之說篇中皆不普顯言而此歌遂陳之也嘗詳其序中數句以姓名櫽括於其間首初一句又拈出參同契者四字蓋此章爲魏公白序明矣按彭公註本此序置在鼎器歌後彭公以鼎器歌辭理勾連字句零碎分章不得遂移此序附於三篇之末分爲九十章以應陽九之數退鼎器歌獨存於後以應水一之數此倒置之失實自彭公始也五相類即非五相類乃三相類也三相類者大易黄老爐火三者之陰陽造化互相似也所謂三道由一俱出徑路又曰羅列三條枝莖相連同出異名皆由一門是也外有讃序一篇或云後序或云魏公讃後人莫知所從遂總名之曰讃序晦菴朱子詳其文意以爲註之後序註亡而序存耳近世註釋者皆祖朱子此說因而削去不録然舊本既載不容不存愚今併書之以附于卷末蓋不欲棄其舊也嗚呼由魏公至于今千有餘歲去古日益遠傳訛日益衆或有識者悼古文之久翳而爲之剔僞辯眞衆必愕眙非詆而笑其僣妄於是寧結舌不語而終莫敢著筆爲是書任其責雖然其如後人何此鄭虛一所以甚爲是書惜也愚區區晩學幸遇明師獲承斯道之正傳兼得是書之善本歷試以還講明粗熟朞年而書成深恐推之未盡言之未詳改竄凡更三四藁又恐後人無以折衷遂合蜀本越本吉本及錢唐諸家之本互相讎校以爲定本其諸參錯不齊則有朱子考異一書在兹不復贅云時五星聚丑之年金精滿鼎之日林屋洞天紫庭眞逸全陽子書周易參同契釋疑
