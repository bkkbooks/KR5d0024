  - {type: variant, offset: 709, length: 235, content: 名之曰讃序晦菴朱子詳其文意以爲註之後序註亡而序存耳近世註釋者皆祖朱子此說因而削去不録然舊本既載不容不存愚今併書之以附于卷末蓋不欲棄其舊也嗚呼由魏公至于今千有餘歲去古日益遠傳訛日益衆或有識者悼古文之久翳而爲之剔僞辯眞衆必愕眙非詆而笑其僣妄於是寧結舌不語而終莫敢著筆爲是書任其責雖然其如後人何此鄭虛一所以甚爲是書惜也愚區區晩學幸遇明師獲承斯道之正傳兼得是書之善本歷試以還講明粗熟朞年而書成深恐推之未盡言之未詳改竄凡更三四藁又恐後人無以折衷遂合蜀本越本吉本及錢唐諸家之本互相讎, WYG: 纂官臣紀昀臣陸錫熊臣孫士毅總}
