  - {type: variant, offset: 169, length: 2, content: 用此, WYG: 明如指諸掌但言還丹之道至簡至易不過俯而就人然又言必待三年九轉則又似易而實難又欲人久於其功可也是則學道希仙之士其可以俄而度淺而窺又當尋其户牖察其關鍵鼔槖籥進火候守龍虎以待交媾則黄芽自長玉英自呈還丹之道其庶幾矣若是可以沖舉可以長存可以乗長雲於八極之間冒剛風於九霄之上逈與世隔超居神洲永階仙阼百世一下來遊人間長生度人人莫測其}
