  - {type: variant, offset: 179, length: 177, content: 也一本以牝牡四卦爲震兊巽艮非是以爲橐籥凝神子陳會眞註本以作互猶御者之執銜轡有準繩正規矩隨軌轍處中以制外謂如御者處於車中而能制御馬之進退以合乎規繩也蓋與中篇龍馬就駕明君御時意同舊本猶御者之執銜轡有凖繩作猶工御者執銜轡凖繩墨非是前輩乃承誤注釋以爲猶工者之於繩墨規矩御者之於銜轡軌轍誤矣兼并爲六十謂日用兩卦一月三十日兼并爲六十卦也一本作兼并爲六十四非是用之依次, WYG: 發揮}
