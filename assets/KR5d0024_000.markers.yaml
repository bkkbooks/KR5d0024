  - {type: variant, offset: 999, length: 0, content: '', WYG: 發揮序昔者聖人之作易也肇自庖犧氏受河圖而畫卦文王重之而繫卦辭周公推六位吉凶而繫爻辭孔子因大小象而作十翼其本原則繇太極動而生陽靜而生陰兩儀既分四象攸立動靜互為其根而生五行因陰陽竒偶之交而成八卦黄帝命大橈作甲子其十干十二支不過探五行之情而亦不出於八卦之方位卦重而為六十四爻分而為三百八十四於是有天道焉有地道焉有人道焉三才道備則盈天地間為萬物者莫不有理有氣有象有數其盈虚消長進退存亡莫不入於聖人範圍之内而察識其所以然之故故其為書廣大悉備因以之設教按五行八卦立為推步占筮之法足以開物成務以前民用焉蓋易為君子謀而人不可以不用乎易也世人不體天地運行不息之理不探五行生尅制化之情不循卦爻往來進退之位𡨕行妄動未能反之於身不知修鍊為何物其保七尺軀而全歸者鮮矣況望其長生久視於天地間哉彼神僊者流其能長生久視者以有還丹之道耳然古之仙人必有心傳口授一時秘訣多不輕泄以故世罕有述焉間有不由大道任其私智謂曲徑之斜捷易行旁門之淫僻可致甚者服燥藥飲熱餌視為神丹卒以喪身閼壽又烏能保其長生哉至後漢魏公伯陽以為還丹之道不可惑於邪説必本諸易道然後可也蓋易道具陰陽動靜之機該卦爻變易之妙生生不息化化無窮今也返觀吾身亦一天地耳吾得一元之氣亦天地之氣耳天地之能長存吾獨不能効之乎此參同契之書所以作也參者謂與易參考之而不謬同者謂與易同合之而不違契者謂與易契黙而識之而自㑹也予昔聞古仙有鍊丹之法丹成可以長生沖飛故天下之名山勝處皆有爐竈之異跡存焉吁山中之竒石有偶𩔖爐竈者耳及觀是書乃知以爐竈鍊丹為妄夫仙家引導修鍊之説運之在内不假乎外者也取之在己不假乎物者也若金之為寶也欲其真粹不雜不偽非資鉛汞用火以鍊之又何以得其真粹堅剛其質為丹同天地為不朽哉今參同契假以此義以吾身之乾坤為鼎器以坎離日月為藥物凝吾神聚吾氣使龍虎媾精交用進火候以竢其變化則丹道可成也然此書紫陽朱夫子嘗為之考訂註}
