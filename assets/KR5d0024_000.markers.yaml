  - {type: variant, offset: 357, length: 5893, content: 一本依作如既未至昧爽即下文晦至朔旦之謂也一本昧作晦非是蓋既未即月晦昧爽即月朔若以爲既未至晦爽則猶言晦至晦爽於文義大謬矣春夏據内體從子到辰巳秋冬當外用自午訖戌亥蓋以兩卦並言前一卦屬春夏自子至巳陽自下而升也後一卦屬秋冬自午至亥陰自上而降也若只以一卦言則一卦止有六爻以十二時配之恰欠其半畢竟日用兩卦直事須當以兩卦並言得其序一本序作理變化於中晦菴朱子註本變化作升降一本作升降變化於其中包袤蓋用文子通玄眞經語舊本作包囊非是以無制有乃是制造之制非制御之制也大丹之法於無中造出有來故曰以無制有如作制御之制發明而以無爲神爲汞爲離以有爲氣爲鉛爲坎此亦是一說然非魏公本㫖愚嘗反覆考之蓋因龍虎經有所謂有無相制朱雀炎空於是後人更不究上下文之義竟以制造之制作制御之制說了又如中篇謂剛柔斷矣不相涉入言剛柔不相侵逾也故繼之曰五行守界不妄盈縮却與後章剛柔離分之義不同或又泥乎龍虎經有所謂剛柔抗衡不相涉入非火之咎譴責於土之說亦未免以剛柔離分之義說了令人相傳皆謂魏伯陽因龍虎經而作參同契故不得不祖龍虎經之說殊不知龍虎經乃是櫽括參同契之語實出於魏公之後晦菴朱子云後人見魏伯陽傳有龍虎上經一句遂僞作此經大槩皆是體參同契而爲之其間蓋有說錯了處愚向者未得其說亦弗敢便以朱子此論爲然後來反覆玩味以參同契相對互考其說乃覺龍虎經之破綻旁出而眞是櫽括參同契之語也蓋魏公之作參同契乃是假借同易爻象發明作丹之祕非推廣龍虎經之說若果推廣龍虎經之說則當曰龍虎參同契不得謂之周易參同契也然而龍虎經亦是好文字是故蔡季通深喜其言如曰元君始鍊汞神室含洞虚又曰自然之要先存後亡誠爲至論但不是魏公以前之書耳器用者空李抱素註本者作皆爲徴一本徴作證相當一本當作合非是始終一本作終始非是皆稟中宫一本禀作在一本作中宫所稟非是之時一本時作際統黄化一本作化黃包鄞鄂朱子考異作根鄂鄂即萼也詩云鄂不韡鞾是此鄂字或作垠堮或作圻堮或作新鍔皆非是稱元皇一本稱作當元年一本年作炁乃芽滋一本作芽乃生一本作乃牙滋復卦建始初或疑與關雎建始初重複遂改初爲萌朱子謂此乃不謂古韻者妄改之也又如下文九六亦相當或疑與剛柔相當重復而改當爲應皆非是日月無雙明謂日出則月没月出則日没晝夜遞照迭爲出没也一本無作炁非是蓋古先無字皆作无如易所謂无妄无咎皆此无字一本作煥炳而成雙兎者吐生光一本作兔魄吐精光一本作兎魄吐生光東方喪其明舊本作東北喪其明蓋因易有東北喪朋之語遂相承其誤習之而弗察也按坤卦云西南得朋東北喪朋蓋謂坤位西南西有兊南有離巽皆陰卦也以陰從陰故云得朋若東北則震艮坎乾皆陽卦也故云喪朋今魏公謂坤乙三十日東方喪其明蓋言三十日之晨太陰没於東方乙位即非用坤卦東北喪朋之說何以明之蓋西方庚辛南方丙丁東方甲乙乃一月六節内太陰昏見晨没之地王保義所謂月有三移是也今夫月之三日昏見于西方庚至十六則晨没于西方辛八日昏見于南方丁至二十三則晨没于南方丙十五日昏見于東方甲至三十則晨没于東方乙其理蓋曉然矣豈得乙爲東北耶自古甲之與乙俱列于東方即不在東北今以乙爲東北則乾體就之時曷不謂之盛滿甲東北耶甲近東北且不謂之東北何況乙在甲之前而又近東南其非東北也明矣九六亦相當上文復卦建始初下已釋之易象索滅藏謂三十日之夜日月之象俱沉於北方也一本易象作陽炁非是象彼仲冬節至以曉後生盲舊本錯於後序陳抱一移置子當右轉之前皆非是按此章凡押兩傷字并上文易象索滅藏連之則又押兩藏字蓋古人多用重韻後人不曉往往妄亂遷改遂使文意不連屬如上文關雎建始初與復卦建始初又如剛柔相當與九六亦相當皆重韻也豈可遽以重韻而害其正文哉商旅一本商作賈浩廣一本廣作曠眇難覩一本覩作覿符徴一本徴作證節令一本節作時中稽於人心一本心作情依卦變一本作循卦節循彖辭一本循作因彖作象非是乾坤用施行天地然後治一本治作理一本作天下然後治此二句似乎引用乾卦乾元用九天下治之文然按上文坎離者乾坤二用則是坎離爲乾坤之用非謂用九用六也如上文東方喪其明亦非用坤卦東北喪朋之義蓋魏公之爲是書大率皆是假借正不必牽泥也可不愼乎一本作可得不愼乎非是魁杓一本杓作柄誃離即别離也一本作移離一本作坎離仰俯他本皆作俯仰朱子謂當作仰俯乃叶韻今從之統録一本統作總日含五行精一本含作合非是詰過貽主一本作結過移主辰極處正一本處作受一本正作政布政一本作政德終脩一本脩作循一本作中美以掩蔽一本以作已有無亦相須謂水火二氣相資而成造化也有無或作金炁或作吟炁皆非是進退分布一本進退作退而非是採之類白一本採作望一本作搖白裏一本作包裏相扶一本扶作拘相連一本連作通是非歷藏法謂此道非歷五臟存思之法也若以是非兩宇作是是非非之義則誤矣次日辰一本次作以非是累土一本作周回而意悅一本作意悅喜跨火不焦入水不濡道成之後法身則然若以血肉之軀投𢌿水火則豈特焦濡而已哉移居一本居作名非是功滿一本滿作成非是偃月按下文曰汞日則偃疑作鉛音聲相傳之訛耳作鼎爐舊本作作法非是艮亦八一本作亦如之虧明一本明作傷金本從日生朔旦受日符謂月之光從日而生每月朔旦與日相合也蓋金火即日月也舊本日作月非是若以爲金本從月生則猶日月本從月生此何義理數稱五一本數作號含育一本作貪欲佇息謂凝佇呼吸之息二者合而爲一如夫婦之交合也一本息作思一本作恩皆非是執平一本執作氣土遊於四季守界定規矩諸本皆在壽命得長久之下惟鄭虚一本却在本性共宗祖之下金以砂爲主禀和於水銀即是直指凡砂凡汞之造化以譬喻丹法之造化却非假借外一物以比並内一物相對而言也以黍一本黍作粟非是其卵一本卵作子非是泥汞一本汞作澒鍊飛一本飛作治一本作持鼓鑄一本鑄作下非是雜性不同類一本類作種僥倖訖不遇聖人獨知之朱子本無此十字生狐疑一本生作坐始畫八卦效法天地一本作始畫八卦象效法天地圖一本作晝八卦效天圖皆非是循而一本作結體庶聖謂無位之聖人也孔子是已一本作聖者與非是三君一本君作聖令可法一本令作誠爲世定此書謂金丹大道無形無兆無以使後人取法故定此參同契一書于世與中篇定録斯文義同舊本作爲世定詩書非是竊爲一本爲作待輙思慮一本作綴斯愚非是金計有十五水數亦如之即前章所謂上弦兌數八下弦艮亦八也蓋上弦金半斤下弦水半斤以兩弦相合而觀之則成一月三十日之數却與水中金之義不同一本金計有十五作金數十有五其土遂不入二者與之俱三物相含受變化狀若神此三物即是金水土三件金水二者與土合而爲一故曰三物相含受若又添水火言則成五物矣或以三物爲金火木以二者爲水火冗雜殆甚非至論也一本其土作其三二者作火二又作水二皆非是濤治一本作鑄冶致堅完一本致作緻炎火張於下龍虎聲正勤與下篇升熬於甑山兮炎火張設下白虎倡導前兮蒼龍和於後實同一義舊本龍虎作晝夜非是始文使可修一本作始初文可修親觀一本作相親一本作須親服之一本作粉提一本作粉捏一本作提粉皆非是一丸一本丸作元一本作粒皆非是刀圭即是刀頭圭角些子而已言其不多也若以刀爲金圭爲二土巧則巧矣然非魏公之本旨也較約一本較作簡光明一本明作榮非是薄蝕一本作激薄顯龍虎一本顯作題嘉黄芽一本嘉作加中篇釋疑偕以造化一本偕作須一本作始元基一本作玄基一本作元模六十卦用張布爲輿一本用作周非是不邪一本邪作陂傾危國家一本作家國傾危卦日一本日作月六十卦用各自有日一本六十卦用作餘六十卦非是在義設刑舊本在作立日辰一本辰作夜用心一本作逆賊一本作迸散巳口一本巳作鼎之來一本來作中剛柔斷矣不相涉入上篇以無制有下已釋之晦朔之間合符行中至始於東北箕斗之郷蓋晦朔之間乃是亥後子前日月於此而隱藏箕斗之鄕乃是艮後寅前日月自此而旋起以比喻丹法之妙與天地日月同途也或者徑以艮後寅前爲晦朔之間爲一陽生採藥之候則相去遠矣旋而右轉嘔輪吐萌謂陽火自腰間旋斗歷箕上至玄關則光耀透于簾帷之外也一本旋而作左旋昴畢之上震出爲徴蓋謂月初生見於西方其象如震以喻身中火候也若以月出方位論先天八卦方位則先天之震不在西火候之震亦不在西既不識其落處徒見其說之相戾耳和平一本和作初其統一本其作陰六五坤承謂六五三十日却非謂坤卦六五爻也陽數已訖訖則復起推情合性轉而相與諸本皆在爲道規矩之下惟朱子本在世爲類母之下非是周流六爻一本流作章非是難以一本以作可滋彰一本彰作亨生光一本生作正非是漸進一本漸作寖成泰一本成作承運而一本而作移榆莢一本莢作葉非是振索一本索作京陽終於巳中而相干謂四月屬巳律應中吕也霞山子詹谷註本中而作中吕一本中作午非是午爲蕤賔爲一本作主遯世去位一本作遯去世位非是其精一本其作眞陰伸陽屈毁傷姓名謂七月屬申律應夷則也伸即申也傷即夷也舊本毁傷作没陽一本作没揚皆非是消滅一本滅作息非是至神一本至作其一本神作坤衰盛一本衰作更非是承御一本承作汞千秋一本秋作載一無一本無作元非是流布一本流作雲類如雞子至肉滑若飴舊本差在後蓋疑其重韻而妄掇之也今移正之類如一本類作狀相扶一本扶作符乃具一本具作俱若飴舊本飴作鉛朱子本改正作飴新鍔上篇已釋之恒爲一本作築固一本作築完一本作築垣于斯之時情合乾坤一本作爰初之時由乎乾坤拘則水定水五行初一本作則水定火五行之初道無形象舊本無作之蓋古者無字是此无字之與无草寫則相似故誤作之字也一本象作狀眞一難圖一本一作其至懸一本作玄且非是耳目口三寳一本作耳目已之寳非是發揚一本揚作通視覽一本覽作聽傾鴻濛一本作順以鴻念念舊本作無念證驗自椎移舊本作證難以椎移非是寖以一本作以浸洞無極一本洞作潤非是谷中一本作中宫一本作客中皆非是任杖一本作拄杖没水一本没作投獲黍一本獲作穫不見功一本不作無至約一本至作事非是蓋草書至事之相似也遂相銜嚥咀嚼相吞奮本彭眞一註及紹興間劉水年本皆在慈母育養孝子報恩之下朱子謂今按二句自屬下文俱相貪併之下四句相承語意連屬不當在此愚按此章以母子之情爲喻蓋所謂遂相銜嚥如慈烏反哺之義正當在此今依舊本移正之三五寫一即上篇子午數合三戊己數稱五是也蓋與悟眞篇三五一不同一本爲作與非是子當右轉謂虎向水中生也午乃東旋謂龍從火裏出也子午即水火也子當右轉者金水合處蓋從右轉至於子也午乃東旋者木火爲侣乃自東旋至於午也天道左旋右轉還丹之道與天道一同若曰子從右轉而加酉午從東旋而加卯則是右旋左轉與天道背馳矣東旋一本東作左主客一本客作定貪併一本併作便一本作榮皆非是各得其性一本得作有性作功如審一本審作有得成正道一本作得爲成道父主禀與一本主作生非是牝雞一本牝作肥施化之道一本道作功一本作精非是受氣之初一本之作元日改月化蓋用莊子語一本作日受月化非是又疑日受月化礙理遂改爲月受日化亦非是水性周章一本水性作和融木火爲侣謂龍從火裏出東三南二同成五也金水合處謂虎向水中生北一西四共成之也張紫陽謂四象不離二體正是此意或用先天離坎加於後天震兌以發明此說不惟失魏公本旨蓋與身中造化大段相反一本金水作金木木火作水火謬之甚矣列爲一本列作合一本作引心赤爲女一本脫此四字子五行始一本脫此四宇一本子作居建緯一本緯作位虚危一本作抱眞執火一本作降坐調合一本作執火妄有所冀一本作冀有所望以硇一本硇作下篇釋疑惟昔聖賢懷玄抱眞至憂憫後生好道之倫隨傍風采指晝古文著爲圖籍開示後昆露見枝條隱藏本根蓋謂古之聖賢既得此道以懷玄抱眞復憂憫後生好道之士不得其說遂爲之隨傍風采援古證今著爲圖籍以開示之又不敢直直敷露於是託號五金八石而發明之也所謂著爲圖籍託號諸石乃指古之聖賢如此非謂後生好道之人如此也此章彭眞一陳抱一皆體認錯了惟朱子註獨得其旨三元一本元作光非是精溢一本作津液非是化形一本化作變覆謬衆文謂反覆謬亂其文而不敢徑直漏泄也一本謬作冒非是傳世一本傳作舉不仕一本仕作遂故爲亂辭一本爲作非非是玄溝一本溝作遠退自後舊本後作改非是關楗有低昂兮周天遂奔走周天兩字舊本皆作周炁朱子疑周炁無義理遂改爲害炁亦非是害字與周字蓋相似炁字與天字頗相近也江河無枯竭兮水流注於海舊本無作之非是之元之誤中篇道無形象下已詳釋之一本河作准終復始一本作復終始一本作復更始張於一本於作設白虎一本虎作礬非是蒼龍一本龍作液非是壓止一本止作之龍鱗甲鬛一本龍作魚甲作狎非是接連一本作雜遝自相守一本自作而房六一本六作七非是正陽一本陽作陰非是三五并危一兮都集歸一所蓋謂房六昴七張二三方之氣并北方危一都會集而歸於一處也中間極有造化蓋南北張危月也東西房昴日也危一合房六則爲水之生成數張二合昴七則爲火之生成數房六在東張二在南木火爲侣六與二合而成八昴七在西危一在北金水合處七與一合而成八應二八一斤之數所謂本之但二物者此也一本并危一作并爲一又一本作之與一皆非是一本一所作二所亦非是當知魏公之作是書無一語不合造化若以爲三五之與一兮都集歸二所則造化何有哉又况二所之說尤其大謬縱使果謂之二所則當言分不當言集既謂之集則當言一所不當言二所也取甫詹霞山註本作甫取赤色通表裏一本作赤黑達表裏黍米一本黍作稻非是若山澤氣烝兮一本作山澤氣相烝兮非是億世一本世作代而可考一本而作自心靈一本心作魂忽自悟一本忽作乍受圖籙一本作録天圖非是鼎器歌釋疑徑一分舊本徑作十長尺二一本尺二作二尺非是腹齊正朱子云按齊即古臍字一本作腹三齊非是首尾武中間文蓋謂晦朔爲首尾月望爲中間也首尾即是一處中間亦即是一處若言巳爲陽子尾午爲陰亥首巳午兩向爲中間則是兩箇首尾兩箇中間矣一說以進陽火則子丑寅爲首辰巳爲尾退陰符則午未申爲首戌亥爲尾中宫爲中間則是兩首兩尾一中間其說皆未穩兩七聚一本聚作竅非是贍理腦一本贍作瞻一本作膽皆非是序釋疑三相類謂大易黄老爐火三者之陰陽造化互相似也自彭眞一以木三火二土五金四水一畫爲五位相得而各有合之圖故後人皆祖彭氏此說竟以爲魏公本文而並作五行之相類說了沿襲至今無有辯之者皆不恩魏公所言相類者果爲何事況易所謂五位相得而各有合盖合五行之生成數今彭氏止用生數爲得謂之五位相得而各有合或以爲木三火二爲一五金四水一爲一五與中央土五共成三五則猶可謂之三五相類今言五行之相類則水自一數火自二數金木土之數各各不同安取其爲相類哉一本作互相類似亦可取終不若三相類之說爲甚明也蓋詳其下文有曰三道由一俱出徑路又曰羅列三條枝莖相連同出異名皆由一門其爲三相類居然可見矣鄶國鄙夫魏公自謂也魏公乃㑹稽上虞人今不曰會稽而曰鄶國者不欲顯言其本貫也若直謂之會稽則是後人改之之辭非魏公本文也挾懷村素一本作懷朴抱素不樂權榮謂不肯愛樂權勢榮耀也樂字當作去聲一本權作懽非是利名一本利作令宴然閒居一本作遠客燕閒察其所趣一本所作㫖共倫一本倫作論施化一本施作神歸根一本根作愚非是我心一本心作形八石一本八作五成物一本物作功委時去害依託丘山循遊寥廓與鬼爲鄰至各相乘負安穩長生十六句乃是櫽括魏伯陽三字各相乘負者如委鬼相乘負爲魏人白相乘負爲伯阝易相乘負爲陽是也一本鬼作仙阨作厄各相乘負安穩長生作吉人相乘安隱長生又一本作吉人相乘負安穩可長生皆非是又一本東西南傾作東西南北水旱隔并作水旱兵革讚序釋疑立政一本作御極米鹽蓋用史記天官書語米鹽分判猶言黑白分明也一本米鹽作坎離非是以易一本易作經立注一本注作法非是爲此一本此作吾周易参同契釋疑終, WYG: ''}
