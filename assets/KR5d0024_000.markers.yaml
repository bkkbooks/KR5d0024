  - {type: variant, offset: 62, length: 104, content: 又在轂之外以輳於轂者也一本軸作輻非是牝牡四卦蓋繳上文乾坤門户坎離匡郭之句總言之也此四卦乃鼎器藥物後言六十卦乃火候也如中篇謂四者渾沌亦是繳上文乾剛坤柔坎離冠首之句後又日六十卦用張布爲輿恰成六十四卦六十四卦皆爲吾, WYG: ''}
